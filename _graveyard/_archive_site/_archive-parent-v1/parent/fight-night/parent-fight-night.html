<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fight Night — Sandman</title>
  <link rel="stylesheet" href="parent-fight-night.css">
</head>

<body>

<div id="fightNight">

  <!-- LEFT FIGHTER -->
  <div class="corner left">
    <img id="redPhoto" class="fighter-photo" src="" alt="">
    <div id="redName" class="fighter-name"></div>
    <div id="redScore" class="fighter-score">0</div>
  </div>

  <!-- CENTER PANEL -->
  <div class="center">
    <div id="eventLabel">Main Event</div>
    <div id="roundTimer">2:00</div>
    <div id="roundLabel">Round 1</div>
  </div>

  <!-- RIGHT FIGHTER -->
  <div class="corner right">
    <img id="greenPhoto" class="fighter-photo" src="" alt="">
    <div id="greenName" class="fighter-name"></div>
    <div id="greenScore" class="fighter-score">0</div>
  </div>

</div>

<!-- DECISION BANNER -->
<div id="decisionBanner">
  <div id="decisionText"></div>
</div>

<script type="module" src="parent-fight-night.js"></script>

</body>
</html>
