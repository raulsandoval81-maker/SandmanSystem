<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Path to Glory — Zero2Hero Quest</title>
  <style>
    :root{
      --bg:#0b1117; --panel:#12161d; --ink:#e6eefc; --muted:#9fb0c4;
      --frame:#242a36; --gold:#ffd33d; --accent:#FFD700;
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial}
    .wrap{max-width:1100px;margin:0 auto;padding:24px}
    h1{margin:6px 0 4px;font-size:1.8rem}
    h2{margin:0 0 12px;text-align:center;color:var(--gold);font-size:1.6rem}
    .muted{color:var(--muted)}
    .card{background:var(--panel);border:1px solid var(--frame);border-radius:12px;padding:16px}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
    .btn{appearance:none;border:1px solid #394253;border-radius:10px;padding:.5rem .8rem;background:#0e1218;color:#e9eef7;font-weight:700;cursor:pointer;transition:transform .05s, box-shadow .12s, background .12s}
    .btn:hover{background:rgba(255,255,255,.06);box-shadow:0 0 0 1px rgba(255,255,255,.08) inset}
    .btn-accent{border-color:var(--accent);color:var(--accent)}
    .btn-link{text-decoration:none;display:inline-flex;align-items:center}
    ul{list-style:none;margin:0;padding:0}
    li{
      display:flex;justify-content:space-between;align-items:center;
      padding:.6rem .9rem;margin:.4rem 0;border-radius:12px;letter-spacing:.3px;
      font-weight:800;font-size:1.05rem;border:2px solid var(--frame)
    }
    .tier-label{font-size:1.06rem}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
<main class="wrap">
  <!-- New header card -->
  <section class="card">
<!-- Full-width gray banner with drop shadow -->
<div style="background:#333; color:#ffd633; text-align:center;
            font-weight:800; font-size:1.3rem;
            padding:14px 0; margin:0 0 20px 0;
            box-shadow:0 2px 6px rgba(0,0,0,0.4);">
  _Zero2Hero 0r _Quest2Legend
</div>
    <p style="text-align:center; color:var(--muted); font-size:1.05rem;">
      From Shadow to Legend — every step is earned. Youth climb from the bottom, 
      then merge into Teen/Adult tiers. One journey, two ladders, same destination.
    </p>
  </section>

  <!-- Existing ladder content -->
  <h2>XP Ranks & Colors</h2>
  <section class="card">
    <ul id="ladder"></ul>
  </section>
</main>
<div style="margin-top:30px; text-align:center;">
  <button onclick="history.back()" 
          style="padding:10px 18px; border-radius:8px; font-weight:700;
                 border:1px solid #FFD700; background:#222; color:#FFD700;
                 cursor:pointer;">

<div class="pager" style="display:flex;justify-content:center;margin:2rem 0;">
  <a href="tour-system.html" class="btn btn-accent">← Back to System</a>
</div>

  <script>
    // Youth 0–8 ladder (Shadow → Junior Legend)
    const LADDER_YOUTH = ["Shadow","Recruit","Combatant","Competitor","Warrior","Champion","Commander","Sandman","Hero"];

    // Teen / Foundry4 0–4 ladder (Apprentice → Legend)
    const LADDER_F4 = ["Apprentice","Warrior","Champion","Veteran","Legend"];

    // Youth color map (includes Junior Legend explicitly)
    const BELT_YOUTH = {
      "Shadow":        { text:"#000000", bandStart:"#FFFFFF", bandEnd:"#FFFFFF", outline:"#CCCCCC" },
      "Recruit":       { text:"#000000", bandStart:"#FFFF99", bandEnd:"#FFFF99", outline:"#CCCC66" },
      "Combatant":     { text:"#FFFFFF", bandStart:"#FF9933", bandEnd:"#FF9933", outline:"#CC6600" },
      "Competitor":    { text:"#FFFFFF", bandStart:"#33A653", bandEnd:"#1F803E", outline:"#1F5C1F" },
      "Warrior":       { text:"#FFFFFF", bandStart:"#3366CC", bandEnd:"#1A4FB3", outline:"#001F33" },
      "Champion":      { text:"#FFFFFF", bandStart:"#6D33EE", bandEnd:"#3D06EE", outline:"#2A109F" },
      "Commander":     { text:"#FFFFFF", bandStart:"#DE8A22", bandEnd:"#BF6A12", outline:"#993300" },
      "Sandman":       { text:"#000000", bandStart:"#FFD700", bandEnd:"#E6C200", outline:"#B38F00" },
      "Hero": { text:"#FFFFFF", bandStart:"#000000", bandEnd:"#000000", outline:"#FFFFFF" } // black with white rim
    };

    // Teen / Foundry4 color map
    const BELT_F4 = {
      "Apprentice": { text:"#000000", bandStart:"#FFFFFF", bandEnd:"#F5F5F5", outline:"#CCCCCC" },
      "Warrior":    { text:"#FFFFFF", bandStart:"#0e1a2a", bandEnd:"#0f3f92", outline:"#1E60FF80" },
      "Champion":   { text:"#FFFFFF", bandStart:"#3D06EE", bandEnd:"#1A02E9", outline:"#2A109F" },
      "Veteran":    { text:"#FFFFFF", bandStart:"#663300", bandEnd:"#663300", outline:"#331A00" },
      "Legend":     { text:"#FFFFFF", bandStart:"#000000", bandEnd:"#000000", outline:"#000000" } // solid black
    };

    function renderRow(tierName, map){
      const c = map[tierName] || { text:"#fff", bandStart:"#15151F", bandEnd:"#151525", outline:"#242a36" };
      return `
        <li style="
          background:linear-gradient(90deg, ${c.bandStart}, ${c.bandEnd});
          border:2px solid ${c.outline};
          color:${c.text};
        ">
          <span class="tier-label">${tierName}</span>
        </li>`;
    }

    (function renderFullLadder(){
      const journey = [
        ...LADDER_YOUTH.map(n => ({ name:n, kind:"y" })),
        ...LADDER_F4.map(n => ({ name:n, kind:"f4" })),
      ];
      const rows = journey
        .slice()
        .reverse() // visual top = last tier
        .map(({name, kind}) => kind === "y" ? renderRow(name, BELT_YOUTH) : renderRow(name, BELT_F4))
        .join("");
      document.getElementById("ladder").innerHTML = rows;
    })();

    // Back button: prefer history, else fallback
    document.getElementById('goBackBtn')?.addEventListener('click', () => {
      if (history.length > 1) history.back();
      else location.href = './xp-teen.html';
    });
  </script>
  <!-- Full-width gray banner with drop shadow -->
<!-- Footer Brand -->
<footer style="margin-top:40px; padding:14px; background:#111; text-align:center; border-top:2px solid #333;">
  <span style="color:#ffd633; font-weight:700; font-size:1.1rem;">
    Sandman Combat System™
  </span>
</footer></div>

</body>
</html>
