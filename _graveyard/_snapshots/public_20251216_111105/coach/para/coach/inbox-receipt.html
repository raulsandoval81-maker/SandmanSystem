<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Message Sent • Para-Comms</title>

  <link rel="stylesheet" href="/communications/shared/comms.css"/>

  <style>
    .wrap {
      max-width: 700px;
      margin: 40px auto;
      text-align: center;
      color: var(--text);
    }

    h1 {
      font-size: 1.6rem;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
      font-size: 1rem;
      box-shadow: 0 4px 14px rgba(0,0,0,.35);
    }

    .ok {
      color:#7af59a;
      font-weight:700;
      margin-bottom:16px;
      font-size:1.1rem;
    }

    .back-link {
      display:inline-block;
      margin-top: 22px;
      padding:10px 18px;
      background:#0e1935;
      border:1px solid #27304a;
      border-radius:10px;
      color:var(--gold);
      text-decoration:none;
      transition:.2s;
    }
    .back-link:hover {
      background:#1a2a55;
      border-color:var(--gold);
    }
  </style>
</head>

<body>

<div class="wrap">

  <h1>Message Sent</h1>

  <section class="panel">
    <p class="ok">✔ Your message has been delivered to the coaching staff.</p>

    <p>Coaches will review and respond as soon as possible.</p>

    <a href="/coach/parent-landing.html" class="back-link">← Back to Parent Home</a>
  </section>

</div>

<script type="module" src="/communications/inbox-receipt.js"></script>

</body>
</html>
