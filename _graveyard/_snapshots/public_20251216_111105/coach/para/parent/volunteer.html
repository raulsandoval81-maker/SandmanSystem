<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Volunteer Sign-Up</title>

<link rel="stylesheet" href="/para/shared/comms.css"/>

  <style>
    :root{
      --bg:#0a1833;
      --panel:#111c35;
      --line:#27304a;
      --brand:#ffdd48;
      --text:#f0f4f8;
      --muted:#9aa4b1;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:22px 14px 40px;
    }

    .parent-header{
      background:#04173a;
      color:#ffdd48;
      padding:10px 14px;
      border-bottom:1px solid rgba(15,23,42,.9);
    }
    .parent-header-inner{
      max-width:920px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .parent-brand{
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
      font-size:.95rem;
    }

    .hero{
      margin-top:8px;
      padding:18px 16px 14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:linear-gradient(150deg,#0a1833 0%,#111c35 45%,#050814 100%);
      box-shadow:0 8px 22px rgba(0,0,0,.45);
    }
    .hero-title{
      margin:0;
      color:var(--brand);
      font-size:1.35rem;
    }
    .hero-sub{
      margin:4px 0 0;
      font-size:.9rem;
      color:#e2e8f0;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
      margin-top:14px;
      line-height:1.55;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
    }
    label{
      display:block;
      font-size:.9rem;
      color:var(--muted);
      margin-bottom:8px;
    }
    input,select,textarea{
      width:100%;
      margin-top:3px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#020617;
      color:var(--text);
      padding:8px 9px;
      font-size:.92rem;
    }
    textarea{resize:vertical;min-height:80px;}

    .vol-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .vol-btn-main{
      border:none;
      border-radius:999px;
      background:var(--brand);
      color:#111827;
      font-weight:700;
      padding:8px 14px;
      cursor:pointer;
      font-size:.9rem;
    }
    .vol-btn-ghost{
      border-radius:999px;
      border:1px solid #27304a;
      background:transparent;
      color:#e5e7eb;
      padding:8px 14px;
      font-size:.9rem;
      cursor:pointer;
    }
    .vol-btn-link{
      align-self:center;
      font-size:.85rem;
      color:#ffdd48;
      text-decoration:none;
    }
    .vol-status{
      margin-top:8px;
      font-size:.85rem;
      color:var(--muted);
    }

    .footer-hard{
      margin-top:40px;
      padding:26px 10px 34px;
      background:transparent;
      text-align:center;
    }
    .footer-inner{
      max-width:900px;
      margin:0 auto;
    }
    .footer-brand{
      color:#94a3b8;
      font-size:.82rem;
      margin-bottom:12px;
    }
    .footer-links{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:14px 18px;
      font-size:.88rem;
    }
    .footer-links a{
      color:#ffdd48;
      text-decoration:none;
    }
    .footer-links a:hover{
      text-decoration:underline;
    }

    @media(max-width:640px){
      .wrap{padding:18px 12px 32px}
      .hero-title{font-size:1.2rem}
      .parent-header-inner{padding-inline:2px}
      .parent-brand{font-size:.85rem}
    }
  </style>
</head>
<body>

<header class="parent-header">
  <div class="parent-header-inner">
    <div class="parent-brand">Lompoc HS Wrestling</div>
  </div>
</header>

<main class="wrap">

  <section class="hero">
    <h1 class="hero-title">Volunteer Sign-Up</h1>
    <p class="hero-sub">Thank you for supporting our program. Please share how you can help.</p>
  </section>

  <section class="panel">
    <form id="volunteerFormPage">

      <label>
        Parent / Guardian Name
        <input type="text" name="parentName" required/>
      </label>

      <label>
        Phone / Teléfono
        <input type="tel" name="phone" placeholder="(555) 555-5555"/>
      </label>

      <label>
        Athlete Name / Nombre del atleta
        <input type="text" name="athleteName"/>
      </label>

      <label>
        Task / Tarea
        <select name="task">
          <option value="">Select one…</option>
          <option value="rides">Rides / Transporte</option>
          <option value="snacks">Snacks / Team Food</option>
          <option value="score">Score Table / Mesa</option>
          <option value="fundraiser">Fundraising</option>
          <option value="tournament">Tournament Help</option>
          <option value="events">Team Events</option>
          <option value="other">Other</option>
        </select>
      </label>

      <label>
        Notes / Notas
        <textarea name="notes" rows="3" placeholder="Availability, skills, ideas..."></textarea>
      </label>

      <div class="vol-actions">
        <button type="submit" class="vol-btn-main">Submit</button>
        <button type="button" class="vol-btn-ghost" id="volClearPage">Clear</button>
        <a href="/para/index.html" class="vol-btn-link">Back to Para-Comms</a>
      </div>

      <p class="vol-status" id="volStatusPage"></p>
    </form>
  </section>

</main>

<footer class="footer-hard">
  <div class="footer-inner">
    <p class="footer-brand">Braves Wrestling • United. Focused. Relentless.</p>
    <nav class="footer-links">
      <a href="/coach/meeting/meeting-summary.html">Meeting Summary</a>
      <a href="/coach/meeting/policy.html">Policy & Acknowledgement</a>
      <a href="/para/index.html">Para-Comms Home</a>
      <a href="/para/announcements.html">Announcements</a>
      <a href="/coach/meeting/handouts/index.html">Handouts Index</a>
      <a href="/para/parent/parent-landing.html">Parent Home</a>
    </nav>
  </div>
</footer>

<script>
  const VOLUNTEER_ENDPOINT =
    "http://127.0.0.1:5001/sandmandashboard/us-central1/submitVolunteer";

  const form     = document.getElementById("volunteerFormPage");
  const clearBtn = document.getElementById("volClearPage");
  const statusEl = document.getElementById("volStatusPage");

  clearBtn.addEventListener("click", ()=>{
    form.reset();
    statusEl.textContent = "";
  });

  form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    const data = Object.fromEntries(new FormData(form).entries());
    data.timestamp = Date.now();
    data.season = "2025-26";

    try {
      const res = await fetch(VOLUNTEER_ENDPOINT, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
      });

      if (!res.ok){
        statusEl.textContent = "❌ Error submitting. Please try again.";
        return;
      }

      statusEl.textContent = "✅ Submitted! Thank you for volunteering.";
      form.reset();
      setTimeout(()=> statusEl.textContent = "", 2500);

    } catch(err){
      console.error(err);
      statusEl.textContent = "❌ Network error. Try again.";
    }
  });
</script>

</body>
</html>
