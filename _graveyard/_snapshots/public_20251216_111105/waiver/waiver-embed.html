<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Preview Waiver</title>

  <style>
    body{
      margin:0;
      background:#0b1017;
      color:#fff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto;
      display:flex;
      flex-direction:column;
      height:100vh;
    }

    header{
      padding:12px 16px;
      background:#121821;
      border-bottom:1px solid #1f2734;
      color:#ffdd48;
      font-weight:600;
    }

    iframe{
      border:none;
      flex:1;
      width:100%;
    }
  </style>
</head>
<body>

<header id="file-name">
  Loading...
</header>

<iframe id="pdf-view"></iframe>

<script>
  const params = new URLSearchParams(window.location.search);
  const file = params.get("file");
  document.getElementById("file-name").textContent = file;
  document.getElementById("pdf-view").src = file;
</script>

</body>
</html>
