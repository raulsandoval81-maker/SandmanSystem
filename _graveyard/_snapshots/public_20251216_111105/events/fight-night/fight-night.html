<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FIGHT NIGHT — Sandman System</title>
  <link rel="stylesheet" href="fight-night.css">
</head>

<body>

<div id="stage">

  <!-- ===================== SPOTLIGHT ====================== -->
  <div id="spot"></div>

  <!-- ===================== VS CARD ======================== -->
  <div id="vsCard">
    <div class="corner red-corner">
      <div class="name" id="fnRed">RED ATHLETE</div>
      <div class="score" id="fnRedScore">0</div>
    </div>

    <div class="vs">VS</div>

    <div class="corner green-corner">
      <div class="name" id="fnGreen">GREEN ATHLETE</div>
      <div class="score" id="fnGreenScore">0</div>
    </div>
  </div>

  <!-- ===================== FLAMES ========================= -->
  <div id="flameLeft"></div>
  <div id="flameRight"></div>

  <!-- ===================== ACTION FEED ===================== -->
  <div id="fnFeed"></div>

</div>

<script type="module" src="fight-night.js"></script>

</body>
</html>
