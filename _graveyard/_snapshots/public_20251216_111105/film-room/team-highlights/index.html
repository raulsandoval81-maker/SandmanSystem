<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Highlights | Sandman Film Room</title>

  <style>
    :root { --bg:#05070c; --panel:#0b1017; --border:#1b2330; --brand:#ffdd48; --text:#f1f5f9; --muted:#94a3b8; }
    body{ margin:0; background:var(--bg); color:var(--text); font-family:system-ui; }
    .wrap{ max-width:1100px; margin:0 auto; padding:36px 20px 80px; }

    h1{ margin:0 0 6px; color:var(--brand); font-size:2rem; text-shadow:0 0 10px rgba(255,221,72,.25); }
    .subtitle{ color:var(--muted); margin-bottom:28px; }

    .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:22px; }
    .card{
      background:var(--panel); border:1px solid var(--border); padding:24px;
      border-radius:16px; color:var(--text); text-decoration:none;
      transition:.25s; cursor:pointer;
    }
    .card:hover{ transform:translateY(-4px); border-color:var(--brand); box-shadow:0 0 12px rgba(255,221,72,.12); }

    .card h2{ margin:0 0 6px; color:var(--brand); font-size:1.25rem; }
    .card p{ margin:0; color:var(--muted); line-height:1.4; }

    .back { display:inline-block; margin-bottom:20px; color:var(--brand); text-decoration:none; }
  </style>
</head>

<body>
  <main class="wrap">

    <a class="back" href="../index.html">← Back to Recon</a>

    <h1>Team Highlights</h1>
    <div class="subtitle">Moments that define the season, the grit, and the culture.</div>

    <section class="grid">

      <a class="card" href="moment.html">
        <h2>Moments</h2>
        <p>Big wins · Big comebacks · Emotional turning points.</p>
      </a>

      <a class="card" href="season.html">
        <h2>Season Highlights</h2>
        <p>Best-of collections for the team and for parents.</p>
      </a>

      <a class="card" href="../index.html">
        <h2>← Back to Recon</h2>
        <p>Return to the recon hub.</p>
      </a>

    </section>
  </main>
</body>
</html>
