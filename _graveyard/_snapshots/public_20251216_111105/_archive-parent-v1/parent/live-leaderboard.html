<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Sandman Leaderboards</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="assets/css/site.css"/>
  <style>
    :root { color-scheme: dark; }
    body{
      margin:0;
      background:#05070c;
      color:#f8fafc;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    .wrap{max-width:1100px;margin:0 auto;padding:18px 14px 40px;}
    h1{margin:0 0 6px;color:#ffdd48;text-shadow:0 0 8px rgba(255,221,72,.2);}
    .muted{color:#94a3b8;font-size:.75rem;margin-bottom:1rem;}

    /* Top nav */
    .top-nav{
      background:#0f141b;
      border-bottom:2px solid #ffd633;
      padding:.75rem 1.5rem;
      position:sticky;
      top:0;
      z-index:1000;
    }
    .nav-container{
      max-width:1200px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      gap:.5rem;
    }
    .nav-logo{
      font-size:1.25rem;
      font-weight:700;
      color:#ffd633;
      text-transform:uppercase;
      letter-spacing:1px;
    }
    .nav-links{
      display:flex;
      gap:1.5rem;
      flex-wrap:wrap;
      justify-content:center;
    }
    .nav-links a{
      text-decoration:none;
      font-weight:500;
      color:#f3f4f6;
      transition:color .2s;
    }
    .nav-links a:hover{color:#ff4d4d;}
    @media (min-width:900px){
      .nav-container{flex-direction:row;justify-content:space-between;}
    }

    .filter-bar{
      background:#0b1017;
      border:1px solid #1d2430;
      border-radius:14px;
      padding:10px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:14px;
    }
    .filter-group{
      display:flex;
      gap:4px;
      align-items:center;
    }
    .filter-group label{
      font-size:.7rem;
      color:#e2e8f0;
      white-space:nowrap;
    }
    .filter-group select,
    .filter-group input{
      background:#0f172a;
      border:1px solid #1f2937;
      border-radius:8px;
      padding:4px 6px;
      color:#fff;
      font-size:.75rem;
    }

    .list{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:10px;
    }

    .card{
      background:#0b1017;
      border:1px solid rgba(255,255,255,.02);
      border-radius:12px;
      padding:10px 10px 12px;
      box-shadow:0 0 15px rgba(0,0,0,.2);
    }
    .card-head{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:flex-start;
      margin-bottom:6px;
    }
    .name-line{
      font-weight:700;
      font-size:.9rem;
    }

    /* public ID chip (no virtues) */
    .tag-chip{
      display:inline-block;
      background:rgba(148,163,184,.18);
      border:1px solid rgba(148,163,184,.5);
      border-radius:999px;
      padding:1px 7px 2px;
      font-size:.65rem;
      margin-right:4px;
      text-transform:uppercase;
      letter-spacing:.04em;
      color:#e2e8f0;
    }

    .xp-num{
      font-weight:800;
      font-size:1.1rem;
      color:#ffdd48;
      text-align:right;
    }

    /* rank chips */
    .rank-badge{
      display:inline-block;
      padding:3px 7px 4px;
      border-radius:999px;
      font-size:.6rem;
      text-transform:uppercase;
      letter-spacing:.05em;
      margin-top:2px;
    }
    .rank-shadow{background:#0f172a;color:#e2e8f0;}
    .rank-recruit{background:#facc15;color:#111;}
    .rank-combatant{background:#fb923c;color:#111;}
    .rank-competitor{background:#22c55e;color:#05130a;}
    .rank-warrior{background:#0ea5e9;color:#051218;}
    .rank-champion{background:#a855f7;color:#f8f5ff;}
    .rank-commander{background:#ea580c;color:#111;}
    .rank-sandman{background:#f59e0b;color:#111;}
    .rank-hero{background:#000;color:#fff;border:1px solid #fff;}
    .rank-apprentice{background:#e2e8f0;color:#111;}
    .rank-veteran{background:#6b7280;color:#111;}
    .rank-legend{background:#000;color:#fff;border:1px solid #fff;}

    /* lifestyle lane */
    .rank-c{background:#1f2937;color:#e5e7eb;}
    .rank-mentor{background:#16a34a;color:#05130a;}
    .rank-scholar{background:#06b6d4;color:#051218;}
    .rank-advisor{background:#f59e0b;color:#111;}
    .rank-mastery{background:#111827;color:#f9fafb;border:1px solid #f9fafb;}

    .xp-slot{margin-top:4px;}
    .xp-meta{font-size:.65rem;color:#94a3b8;margin-top:4px;}

    /* Footer */
    .footer{
      background:#0f141b;
      border-top:2px solid #ffd633;
      padding:1rem 1.5rem;
      margin-top:2rem;
    }
    .footer-container{
      max-width:1200px;
      margin:0 auto;
      display:flex;
      gap:1rem;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
    }
    .footer-title{font-weight:700;color:#ffd633;}
    .footer-links{
      display:flex;
      gap:1.25rem;
      flex-wrap:wrap;
    }
    .footer-links a{
      color:#f3f4f6;
      text-decoration:none;
      font-weight:500;
    }
    .footer-links a:hover{color:#ff4d4d;}
    .footer-lock-note{
      background:#1a1f29;
      border-top:1px solid #333;
      padding:0.5rem;
      margin-top:0.75rem;
      text-align:center;
      color:#ffd633;
      font-weight:600;
      font-size:0.95rem;
    }

    @media(max-width:640px){
      .filter-bar{flex-direction:column;align-items:flex-start;}
      .list{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="top-nav">
    <div class="nav-container">
      <div class="nav-logo">Sandman System</div>
      <nav class="nav-links" aria-label="Primary">
        <a href="overview.html">Overview</a>
        <a href="programs.html">Programs</a>
        <a href="schedule.html">Schedule</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <h1>Public Leaderboards</h1>
    <p class="muted" id="status">
      Month-by-month Skill Points for Sandman athletes. IDs and initials only — no full details.
    </p>

    <div class="filter-bar">
      <!-- TRACK -->
      <div class="filter-group">
        <label for="track">Track</label>
        <select id="track">
          <option value="foundry8">Foundry 8, Combat</option>
          <option value="foundry4">Foundry 4, Combat</option>
          <option value="foundry4-lifestyle">Foundry 4, Lifestyle</option>
        </select>
      </div>

      <!-- MONTH -->
      <div class="filter-group">
        <label for="month">Month</label>
        <input id="month" type="month">
      </div>

      <!-- SEARCH -->
      <div class="filter-group">
        <label for="search">Athlete</label>
        <input id="search" type="search" placeholder="search by name…">
      </div>

      <!-- RANK (dynamic) -->
      <div class="filter-group">
        <label for="rank">Rank</label>
        <select id="rank"></select>
      </div>

      <!-- TOP N -->
      <div class="filter-group">
        <label for="topN">Top</label>
        <select id="topN">
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="all">All</option>
        </select>
      </div>
    </div>

    <section class="list" id="cards">
      <div class="card"><p class="muted">Loading…</p></div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-container">
      <span class="footer-title">Coach Zone 🔒</span>
      <nav class="footer-links" aria-label="Coach Zone">
        <a href="coaches.html">Coach Hub</a>
        <a href="ceremonies.html">Ceremonies</a>
        <a href="leaderboards.html" aria-current="page">Leaderboards</a>
        <a href="tools.html">Tools</a>
      </nav>
    </div>
    <div class="footer-lock-note">
      🔒 Coaches Only — login required for full XP detail and tools
    </div>
  </footer>

  <script type="module">
    import {
      db, collection, query, orderBy, onSnapshot, doc, getDoc
    } from "./assets/js/firebase-init.js";

    // --- Try to import helper relatively; if it fails, use an inline fallback ---
    let renderMiniXpBar;
    try {
      ({ renderMiniXpBar } = await import("./assets/js/xp-bar-mini.js"));
    } catch (e) {
      // Fallback mini progress bar (simple, no dependencies)
      renderMiniXpBar = ({ container, xp, cap, stripesTotal=4, tierName="" }) => {
        const pct = Math.max(0, Math.min(100, Math.round((xp / (cap||1)) * 100)));
        const wrap = document.createElement("div");
        wrap.style.background = "#0f172a";
        wrap.style.border = "1px solid #1f2937";
        wrap.style.borderRadius = "8px";
        wrap.style.padding = "4px";
        wrap.style.position = "relative";

        const bar = document.createElement("div");
        bar.style.height = "10px";
        bar.style.borderRadius = "6px";
        bar.style.width = pct + "%";
        bar.style.background = "#ffd633";
        bar.style.boxShadow = "0 0 10px rgba(255,214,51,.35)";
        wrap.appendChild(bar);

        // stripes (visual 4-slice)
        if (stripesTotal > 0) {
          for (let i=1;i<stripesTotal;i++){
            const tick = document.createElement("div");
            tick.style.position="absolute";
            tick.style.top="2px";
            tick.style.bottom="2px";
            tick.style.left = (i*(100/stripesTotal))+"%";
            tick.style.width="1px";
            tick.style.background="#1f2937";
            wrap.appendChild(tick);
          }
        }

        const lbl = document.createElement("div");
        lbl.style.fontSize=".62rem";
        lbl.style.color="#94a3b8";
        lbl.style.marginTop="4px";
        lbl.textContent = `${pct}% toward tier cap`;
        container.innerHTML = "";
        container.appendChild(wrap);
        container.appendChild(lbl);
      };
    }

    // ---------- DOM -----------
    const trackEl = document.getElementById("track");
    const monthEl = document.getElementById("month");
    const searchEl= document.getElementById("search");
    const rankEl  = document.getElementById("rank");
    const topNEl  = document.getElementById("topN");
    const cardsEl = document.getElementById("cards");
    const statusEl= document.getElementById("status");

    // ---------- STATE ----------
    let unsub = null;
    let cache = [];
    const nameCache = new Map();
    const tagCache  = new Map();
    const rankCache = new Map();

    // ---------- CONFIG ----------
    const monthKey = (d=new Date())=>{
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      return `${y}-${m}`;
    };
    if (!monthEl.value) monthEl.value = monthKey();

    // Tier caps (XP)
    const CAPS = {
      foundry8: { T0:800, T1:1000, T2:1200, T3:1400, T4:1600, T5:1800, T6:2000, T7:2200, T8:2400 },
      foundry4: { T0:1200, T1:1400, T2:1600, T3:2200, T4:2400 },
      "foundry4-lifestyle": { T0:800, T1:1200, T2:1600, T3:2000, T4:2400 }
    };

    // Tier -> rankKey per track
    const TIER_TO_RANK = {
      foundry8: {
        T0:"shadow", T1:"recruit", T2:"combatant", T3:"competitor", T4:"warrior",
        T5:"champion", T6:"commander", T7:"sandman", T8:"hero",
      },
      foundry4: {
        T0:"apprentice", T1:"warrior", T2:"champion", T3:"veteran", T4:"legend",
      },
      "foundry4-lifestyle": {
        T0:"c", T1:"mentor", T2:"scholar", T3:"advisor", T4:"mastery",
      }
    };

    // Tier -> public color name
    const TIER_COLORS = {
      foundry8: {
        T0:"White", T1:"Yellow", T2:"Orange", T3:"Green", T4:"Blue",
        T5:"Purple", T6:"Brown", T7:"Gold", T8:"Black"
      },
      foundry4: {
        T0:"White", T1:"Blue", T2:"Purple", T3:"Brown", T4:"Black"
      },
      "foundry4-lifestyle": {
        T0:"White", T1:"Blue", T2:"Purple", T3:"Brown", T4:"Black"
      }
    };

    // Rank dropdown options per track
    const RANK_OPTIONS = {
      foundry8: [
        ["all","All"],
        ["shadow","Shadow"],["recruit","Recruit"],["combatant","Combatant"],
        ["competitor","Competitor"],["warrior","Warrior"],["champion","Champion"],
        ["commander","Commander"],["sandman","Sandman"],["hero","Hero"],
      ],
      foundry4: [
        ["all","All"],
        ["apprentice","Apprentice"],["warrior","Warrior"],["champion","Champion"],
        ["veteran","Veteran"],["legend","Legend"],
      ],
      "foundry4-lifestyle": [
        ["all","All"],
        ["c","C"],["mentor","Mentor"],["scholar","Scholar"],["advisor","Advisor"],["mastery","Mastery"],
      ]
    };

    function beltClass(rankKey){ return "rank-"+(rankKey||"shadow"); }

    // ---------- Helpers ----------
    function rebuildRankDropdown() {
      const track = trackEl.value;
      const opts = RANK_OPTIONS[track] || [["all","All"]];
      const current = rankEl.value || "all";
      rankEl.innerHTML = opts.map(([v,l]) => `<option value="${v}">${l}</option>`).join("");
      rankEl.value = opts.some(([v])=>v===current) ? current : "all";
    }

    // compress "Maximus Sandoval" -> "M. Sandoval"
    function compressName(fullName="") {
      const parts = fullName.trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return "";
      if (parts.length === 1) return parts[0]; // single name, leave as-is
      const first = parts[0];
      const last  = parts[parts.length - 1];
      return `${first.charAt(0).toUpperCase()}. ${last}`;
    }

    // ---------- Backfill from athletes collection ----------
    async function backfill(rows){
      const needed = new Set();
      rows.forEach(r=>{
        const uid = r.uid;
        if (!uid) return;
        if (!nameCache.has(uid) || !tagCache.has(uid) || !rankCache.has(uid)){
          needed.add(uid);
        }
      });
      for (const uid of needed){
        try{
          const snap = await getDoc(doc(db,"athletes",uid));
          if (snap.exists()){
            const d = snap.data();
            if (d.fullName && !nameCache.has(uid)) {
              nameCache.set(uid, compressName(d.fullName));
            }
            // public tag (no virtues) – look for clean, neutral fields only
            const publicTag = d.publicTag || d.athleteCode || d.athleteId;
            if (publicTag && !tagCache.has(uid)) {
              tagCache.set(uid, String(publicTag));
            }
            if (d.rankKey && !rankCache.has(uid)) {
              rankCache.set(uid, d.rankKey);
            } else if (d.tier && d.trackBase){
              const rk = (TIER_TO_RANK[d.trackBase]||{})[d.tier] || null;
              if (rk && !rankCache.has(uid)) rankCache.set(uid, rk);
            }
          }
        }catch(e){
          // fail closed / quiet on public side
        }
      }
    }

    // ---------- Aggregate monthly entries ----------
    function aggregate(rows){
      const map = new Map();
      for (const r of rows){
        const uid = r.uid || r.athleteUid || r.athleteName || r.id;
        if (!uid) continue;

        const prev = map.get(uid) || {
          uid,
          skillPoints: 0,
          // name = cached name OR raw leaderboard name (then compressed)
          name: "",
          publicTag: null,
          trackBase: r.track || trackEl.value,
          tier: r.tier || "T0"
        };

        prev.skillPoints += Number(r.xp||r.skillPoints||0); // treat stored xp as skill points

        // basic name fallback if we have a plain name string on the entry
        if (!prev.name && r.athleteName) {
          prev.name = compressName(String(r.athleteName));
        }

        map.set(uid, prev);
      }
      return [...map.values()];
    }

    // ---------- Render ----------
    function render(){
      const q = (searchEl.value || "").trim().toLowerCase();
      const wantedRank = rankEl.value;
      const activeTrack = trackEl.value;
      let rows = aggregate(cache);

      // enrich with caches and defaults
      rows.forEach(r=>{
        const uid = r.uid;
        const base = r.trackBase || activeTrack;
        const tier = r.tier || "T0";

        if (!r.name) {
          const cached = nameCache.get(uid) || "";
          r.name = cached ? cached : uid;
        }

        if (!r.publicTag) {
          const cachedTag = tagCache.get(uid);
          if (cachedTag) r.publicTag = cachedTag;
        }

        if (!r.rankKey){
          const rk = (TIER_TO_RANK[base]||{})[tier] || null;
          r.rankKey = rankCache.get(uid) || rk;
        } else {
          r.rankKey = r.rankKey;
        }

        r.trackBase = base;
      });

      // filters
      if (q){
        rows = rows.filter(r=> (r.name||"").toLowerCase().includes(q));
      }
      if (wantedRank !== "all"){
        rows = rows.filter(r=> (r.rankKey||"") === wantedRank);
      }

      // sort
      rows.sort((a,b)=>b.skillPoints - a.skillPoints);

      // top N
      if (topNEl.value !== "all"){
        rows = rows.slice(0, Number(topNEl.value));
      }

      cardsEl.innerHTML = rows.map(r=>{
        const tag  = r.publicTag ? String(r.publicTag) : "";
        const rk   = r.rankKey || "shadow";
        const base = r.trackBase || activeTrack;
        const tier = r.tier || "T0";
        const cap  = (CAPS[base]||{})[tier] || 1000;
        const colorName = (TIER_COLORS[base]||{})[tier] || "Tier";

        const rankLabel = rk.replace(/^\w/,c=>c.toUpperCase());

        return `<article class="card" data-uid="${r.uid}" data-cap="${cap}" data-tier="${tier}" data-rank="${rk}" data-xp="${r.skillPoints}">
          <div class="card-head">
            <div>
              <div class="name-line">
                ${tag ? `<span class="tag-chip">${tag}</span>` : ""}${r.name}
              </div>
              <div class="rank-badge ${beltClass(rk)}">${rankLabel}</div>
            </div>
            <div class="xp-num">${r.skillPoints}</div>
          </div>
          <div class="xp-slot"></div>
          <div class="xp-meta">
            Rank: ${rankLabel} · Tier: ${colorName} · Skill Points: ${r.skillPoints} / ${cap}
          </div>
        </article>`;
      }).join("") || `<div class="card"><p class="muted">No athletes match this filter.</p></div>`;

      // progress bars
      document.querySelectorAll(".card[data-uid]").forEach(card=>{
        const xp   = Number(card.dataset.xp || 0);
        const cap  = Number(card.dataset.cap || 1000);
        const rk   = card.dataset.rank || "shadow";
        const slot = card.querySelector(".xp-slot");
        if (slot){
          renderMiniXpBar({
            container: slot,
            xp,
            cap,
            tierName: rk,
            stripesTotal: 4,
            stripesEarned: Math.min(4, Math.floor((xp / cap) * 4))
          });
        }
      });

      statusEl.textContent = `Loaded ${rows.length} athletes (Skill Points view).`;
    }

    // ---------- Listen to Firestore ----------
    function listen(){
      const track = trackEl.value;
      const mk = monthEl.value || monthKey();
      if (unsub){ unsub(); unsub=null; }
      statusEl.textContent = `Loading ${track} → ${mk}…`;

      const qy = query(
        collection(db,"leaderboards", track, "months", mk, "entries"),
        orderBy("createdAt","desc")
      );

      unsub = onSnapshot(qy, async snap=>{
        cache = snap.docs.map(d=>({id:d.id,...d.data()}));
        await backfill(cache);
        render();
      }, err=>{
        console.error(err);
        statusEl.textContent = "Error loading leaderboard.";
      });
    }

    // ---------- Events ----------
    trackEl.addEventListener("change", ()=>{
      rebuildRankDropdown();
      listen();
    });
    monthEl.addEventListener("change", listen);
    searchEl.addEventListener("input", render);
    rankEl.addEventListener("change", render);
    topNEl.addEventListener("change", render);

    // init
    rebuildRankDropdown();
    listen();
  </script>
</body>
</html>
