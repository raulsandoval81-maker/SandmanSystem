<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>3-Person Round Robin</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{ --navy:#0f172a; --silver:#cbd5e1; --line:#94a3b8; }
  body{ margin:0; background:white; font-family:system-ui; color:var(--navy);}
  .page{ max-width:700px; margin:0 auto; padding:20px;}
  .header{ background:var(--navy); color:white; padding:10px; text-align:center;
           text-transform:uppercase; letter-spacing:.12em; font-weight:700; 
           border-radius:6px; margin-bottom:16px; }
  table{ width:100%; border-collapse:collapse; font-size:.9rem; }
  th,td{ border:1px solid var(--line); padding:6px; height:28px; }
  th{ background:var(--silver); text-transform:uppercase; letter-spacing:.1em; }
  .notes{ margin-top:10px; font-size:.75rem; color:#475569; }
</style>
</head>
<body>
<div class="page">

<div class="header">3-Person Round Robin</div>

<table>
  <thead>
    <tr>
      <th>Match</th><th>Red</th><th>Green</th><th>Winner</th>
    </tr>
  </thead>
  <tbody>
    <tr><td>1</td><td></td><td></td><td></td></tr>
    <tr><td>2</td><td></td><td></td><td></td></tr>
    <tr><td>3</td><td></td><td></td><td></td></tr>
  </tbody>
</table>

<div class="notes">3 athletes, everyone wrestles everyone. Use head-to-head criteria.</div>

</div>
</body>
</html>
