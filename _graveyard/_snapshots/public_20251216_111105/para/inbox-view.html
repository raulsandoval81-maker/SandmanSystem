<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Coach Inbox • Message Thread</title>

  <!-- Correct shared styles -->
  <link rel="stylesheet" href="/para/shared/comms.css"/>

  <style>
    :root{
      --bg:#0a1833;
      --panel:#111c35;
      --deep:#0b1120;
      --line:#27304a;
      --gold:#ffdd48;
      --text:#f0f4f8;
      --muted:#9aa4b1;
    }

    body{
      background:var(--bg);
      color:var(--text);
    }
    .thread-msg{
      background:var(--deep);
      border:1px solid var(--line);
      padding:14px 16px;
      border-radius:12px;
      margin-bottom:14px;
    }
    .from{
      color:var(--gold);
      font-weight:800;
      font-size:.9rem;
    }
    .timestamp{
      color:var(--muted);
      font-size:.75rem;
      margin-top:4px;
    }
    .body{
      margin-top:8px;
      font-size:.9rem;
      white-space:pre-wrap;
      line-height:1.45;
    }
  </style>
</head>

<body>

<header class="pc-header">
  <button class="pc-back" onclick="history.back()">← Inbox</button>
  <h1>Message Thread</h1>
  <a href="/coach/index.html" class="pc-home">🏠</a>
</header>

<div class="wrap">

  <section class="pc-help panel">
    <p><strong>Parent message + Coach replies.</strong></p>
    <p>You can reply, mark as read, or archive.</p>
  </section>

  <main class="panel">
    <div id="thread-container"></div>
  </main>

</div>

<!-- --------------------------- -->
<!-- Coach Reply Box             -->
<!-- --------------------------- -->
<div class="reply-box">
  <label for="reply-body" class="reply-label">Your Reply</label>
  <textarea id="reply-body" rows="4" placeholder="Write your reply..." class="reply-text"></textarea>

  <button id="btn-send-reply" class="btn btn-brand" style="margin-top:10px;">
    Send Reply
  </button>

  <div style="margin-top:10px; display:flex; gap:10px;">
    <button id="btn-mark-read"    class="btn btn-gray">Mark Read</button>
    <button id="btn-archive"      class="btn btn-dark">Archive</button>
  </div>

  <div id="reply-success" class="reply-status success">Reply sent!</div>
  <div id="reply-error" class="reply-status error">Error sending reply.</div>
</div>

<style>
  .reply-box{
    margin-top:20px;
    padding:14px;
    background:#0d1a33;
    border:1px solid #1e2a45;
    border-radius:8px;
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
  }
  .reply-label{
    font-size:.9rem;
    color:#cfd3d9;
  }
  .reply-text{
    width:100%;
    background:#050a19;
    border:1px solid #27304a;
    border-radius:6px;
    padding:8px;
    color:#eef2f7;
    font-size:1rem;
  }
  .reply-status{
    display:none;
    margin-top:10px;
    font-size:.85rem;
  }
  .reply-status.success{ color:#4ade80; }
  .reply-status.error{ color:#f87171; }
</style>

<footer class="pc-footer">
  <a class="pc-footer-link" href="/coach/index.html">← Back to Coach Portal</a>
</footer>

<!-- Coach-only thread logic -->
<script type="module" src="./inbox-view.js"></script>

</body>
</html>
