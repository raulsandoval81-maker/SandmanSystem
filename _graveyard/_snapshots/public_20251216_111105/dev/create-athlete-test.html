<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Create Athlete · Dev Test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    body{background:#05080f;color:#f5f5f5;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;padding:20px}
    h1{font-size:1.6rem;margin-bottom:10px;color:#ffd633}
    label{display:block;margin-top:10px;font-size:.85rem;text-transform:uppercase;letter-spacing:.06em;color:#97a2b8}
    input,select{width:100%;max-width:320px;padding:6px 8px;margin-top:3px;border-radius:6px;border:1px solid #273244;background:#0b1120;color:#e5e7eb}
    button{margin-top:16px;padding:8px 14px;border-radius:999px;border:1px solid #facc15;background:#fbbf24;color:#111827;font-weight:600;cursor:pointer}
    button:disabled{opacity:.6;cursor:wait}
    pre{margin-top:16px;background:#020617;border-radius:8px;padding:10px;font-size:.8rem;max-width:480px;white-space:pre-wrap;word-break:break-word}
  </style>
</head>
<body>
  <h1>Dev · Create Athlete Test</h1>
  <p style="max-width:480px;font-size:.9rem;color:#9ca3af">
    This hits the <code>createAthlete</code> callable in the emulator so we can
    prove minting works before wiring the real intake UI.
  </p>

  <form id="form">
    <label>First Name
      <input name="firstName" value="Test" required>
    </label>
    <label>Last Name
      <input name="lastName" value="Athlete" required>
    </label>
    <label>Nickname (optional)
      <input name="nickname" value="Test Kid">
    </label>
    <label>Foundry Track
      <select name="foundry">
        <option value="F8">F8 · Youth</option>
        <option value="F4">F4 · Teen/Adult</option>
      </select>
    </label>
    <label>Team
      <input name="team" value="Lompoc Wrestling">
    </label>
    <label>City
      <input name="city" value="Lompoc">
    </label>
    <label>State
      <input name="state" value="CA">
    </label>

    <button type="submit">Mint Athlete</button>
  </form>

  <pre id="out">Waiting…</pre>

  <script type="module">
    import { functions, httpsCallable } from "/assets/js/firebase-init.js";

    const form = document.getElementById("form");
    const out  = document.getElementById("out");
    const btn  = form.querySelector("button");

    const createAthlete = httpsCallable(functions, "createAthlete");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      out.textContent = "Calling createAthlete…";

      const fd = new FormData(form);
      const payload = {
        firstName: fd.get("firstName"),
        lastName:  fd.get("lastName"),
        nickname:  fd.get("nickname"),
        team:      fd.get("team"),
        city:      fd.get("city"),
        state:     fd.get("state"),
        foundry:   fd.get("foundry"), // "F8" or "F4"
      };

      try {
        const res = await createAthlete(payload);
        out.textContent = "OK:\n" + JSON.stringify(res.data, null, 2);

        // stash uid for profile page
        if (res.data && res.data.athleteId) {
          localStorage.setItem("currentAthleteId", res.data.athleteId);
        }
      } catch (err) {
        console.error(err);
        out.textContent = "ERROR:\n" + (err.message || String(err));
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
