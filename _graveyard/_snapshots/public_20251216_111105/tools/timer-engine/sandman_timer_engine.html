<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sandman Timer Engine</title>

  <style>
    :root { color-scheme: dark; }
    body{
      margin:0;
      background:#020617;
      color:#e5e7eb;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    .wrap{
      max-width:520px;
      margin:0 auto;
      padding:18px 14px 28px;
    }
    h1{
      margin:0 0 4px;
      font-size:1.1rem;
      color:#ffdd48;
      letter-spacing:.06em;
      text-transform:uppercase;
    }
    .sub{
      margin:0 0 12px;
      font-size:.8rem;
      color:#9ca3af;
    }

    /* MAIN TIMER */
    .timer-box{
      margin-top:8px;
      padding:14px 10px 12px;
      border-radius:16px;
      background:#020617;
      border:1px solid #1f2937;
      box-shadow:0 12px 30px rgba(0,0,0,.6);
      text-align:center;
    }
    .block-label{
      font-size:.8rem;
      color:#9ca3af;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:4px;
    }
    .block-name{
      font-size:1.05rem;
      font-weight:700;
      margin-bottom:6px;
      color:#e5e7eb;
    }
    .time-display{
      font-size:2.4rem;
      font-weight:800;
      letter-spacing:.08em;
      margin:4px 0 8px;
    }
    .pill-strip{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:8px;
      margin-bottom:4px;
      font-size:.75rem;
    }
    .pill{
      padding:4px 10px;
      border-radius:999px;
      border:1px solid #1f2937;
      background:#020617;
    }
    .pill strong{color:#ffdd48;}

    .controls{
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .btn{
      border:none;
      border-radius:999px;
      padding:7px 12px;
      font-size:.8rem;
      font-weight:700;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:4px;
    }
    .btn-main{
      background:#e63946;
      color:#fff;
      box-shadow:0 0 10px rgba(230,57,70,.4);
    }
    .btn-ghost{
      background:transparent;
      color:#e5e7eb;
      border:1px solid #374151;
    }
    .btn-small{
      padding:4px 8px;
      font-size:.75rem;
    }
    .btn:hover{
      filter:brightness(1.05);
    }

    .status{
      margin-top:6px;
      font-size:.78rem;
      color:#9ca3af;
      text-align:center;
      min-height:1.1em;
    }

    /* BLOCK LIST */
    .block-list-wrap{
      margin-top:14px;
      border-radius:14px;
      border:1px solid #1f2937;
      background:#020617;
      padding:10px;
      max-height:260px;
      overflow:auto;
    }
    .block-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:6px 8px;
      border-radius:10px;
      border:1px solid transparent;
      font-size:.8rem;
    }
    .block-row span.slot{
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:.7rem;
      color:#9ca3af;
    }
    .block-row span.name{
      font-weight:600;
    }
    .block-row span.mins{
      font-variant-numeric:tabular-nums;
      color:#cbd5f5;
    }
    .block-row.active{
      border-color:#ffdd48;
      background:rgba(55,65,81,.4);
      box-shadow:0 0 10px rgba(255,221,72,.25);
    }

    .empty{
      padding:12px;
      text-align:center;
      font-size:.8rem;
      color:#9ca3af;
    }

    @media (max-width:480px){
      .wrap{padding:16px 10px 26px}
      .time-display{font-size:2.1rem}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>SANDMAN TIMER</h1>
    <p class="sub" id="planLabel">Loading practice plan…</p>

    <section class="timer-box">
      <div class="block-label" id="currentSlotLabel">BLOCK</div>
      <div class="block-name" id="currentBlockName">—</div>
      <div class="time-display" id="timeDisplay">00:00</div>

      <div class="pill-strip">
        <div class="pill">
          <strong>Block</strong>&nbsp;<span id="blockIndexLabel">0 / 0</span>
        </div>
        <div class="pill">
          <strong>Total</strong>&nbsp;<span id="totalMinutesLabel">0 min</span>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-main" id="btnStartPause">▶ Start</button>
        <button class="btn btn-ghost" id="btnReset">⟳ Reset</button>
        <button class="btn btn-ghost btn-small" id="btnPrev">⟵ Prev</button>
        <button class="btn btn-ghost btn-small" id="btnNext">Next ⟶</button>
        <button class="btn btn-ghost btn-small" id="btnMinus1">−1 min</button>
        <button class="btn btn-ghost btn-small" id="btnPlus1">+1 min</button>
      </div>

      <div class="status" id="statusLine"></div>
    </section>

    <section class="block-list-wrap" id="blockList">
      <!-- blocks get rendered here -->
    </section>
  </main>

  <script type="module">
    import { db, doc, getDoc } from "/assets/js/firebase-init.js";

    // --- State ---
    let blocks = [];           // [{slot,label,minutes}, ...]
    let totalMinutes = 0;
    let currentIndex = 0;
    let remainingSeconds = 0;
    let timerId = null;
    let currentKey = null;

    // --- Elements ---
    const planLabelEl       = document.getElementById("planLabel");
    const currentSlotLabel  = document.getElementById("currentSlotLabel");
    const currentBlockName  = document.getElementById("currentBlockName");
    const timeDisplay       = document.getElementById("timeDisplay");
    const blockIndexLabel   = document.getElementById("blockIndexLabel");
    const totalMinutesLabel = document.getElementById("totalMinutesLabel");
    const statusLine        = document.getElementById("statusLine");
    const blockListEl       = document.getElementById("blockList");

    const btnStartPause = document.getElementById("btnStartPause");
    const btnReset      = document.getElementById("btnReset");
    const btnPrev       = document.getElementById("btnPrev");
    const btnNext       = document.getElementById("btnNext");
    const btnMinus1     = document.getElementById("btnMinus1");
    const btnPlus1      = document.getElementById("btnPlus1");

    // --- Helpers ---
    function fmtTime(sec){
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }

    function speakPing(){
      // Soft future hook – for now just a tiny beep
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine";
        o.frequency.value = 800;
        o.connect(g);
        g.connect(ctx.destination);
        g.gain.setValueAtTime(0.2, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        o.start();
        o.stop(ctx.currentTime + 0.25);
      } catch(e){
        // safely ignore if AudioContext blocked
      }
    }

    function renderBlockList(){
      blockListEl.innerHTML = "";
      if (!blocks.length){
        const div = document.createElement("div");
        div.className = "empty";
        div.textContent = "No blocks in this plan.";
        blockListEl.appendChild(div);
        return;
      }

      blocks.forEach((b, idx)=>{
        const row = document.createElement("div");
        row.className = "block-row" + (idx === currentIndex ? " active" : "");
        row.dataset.idx = idx;

        row.innerHTML = `
          <div>
            <span class="slot">${(b.slot || "").toUpperCase()}</span><br/>
            <span class="name">${b.label || b.slot || "Block"}</span>
          </div>
          <div class="mins">${b.minutes} min</div>
        `;
        blockListEl.appendChild(row);
      });
    }

    function updateHeader(){
      if (!blocks.length){
        currentSlotLabel.textContent = "BLOCK";
        currentBlockName.textContent = "—";
        timeDisplay.textContent = "00:00";
        blockIndexLabel.textContent = "0 / 0";
        totalMinutesLabel.textContent = `${totalMinutes} min`;
        return;
      }
      const b = blocks[currentIndex];
      currentSlotLabel.textContent = (b.slot || "BLOCK").toUpperCase();
      currentBlockName.textContent = b.label || b.slot || "Block";
      timeDisplay.textContent = fmtTime(remainingSeconds);
      blockIndexLabel.textContent = `${currentIndex + 1} / ${blocks.length}`;
      totalMinutesLabel.textContent = `${totalMinutes} min`;
      renderBlockList();
    }

    function stopTimer(){
      if (timerId){
        clearInterval(timerId);
        timerId = null;
      }
      btnStartPause.textContent = "▶ Start";
    }

    function startTimer(){
      if (!blocks.length) return;
      if (timerId) return; // already running
      if (remainingSeconds <= 0){
        // If at 0, reset this block to full length
        remainingSeconds = (blocks[currentIndex].minutes || 0) * 60;
      }
      btnStartPause.textContent = "⏸ Pause";
      timerId = setInterval(()=>{
        remainingSeconds--;
        if (remainingSeconds <= 0){
          remainingSeconds = 0;
          updateHeader();
          speakPing();
          nextBlock(true);
          return;
        }
        timeDisplay.textContent = fmtTime(remainingSeconds);
      }, 1000);
    }

    function nextBlock(fromTimer = false){
      stopTimer();
      if (!blocks.length) return;

      if (currentIndex < blocks.length - 1){
        currentIndex++;
        remainingSeconds = (blocks[currentIndex].minutes || 0) * 60;
        statusLine.textContent = fromTimer ? "Next block started." : "";
        updateHeader();
        // auto-continue
        if (fromTimer) startTimer();
      } else {
        remainingSeconds = 0;
        updateHeader();
        statusLine.textContent = "Practice complete.";
      }
    }

    function prevBlock(){
      stopTimer();
      if (!blocks.length) return;
      if (currentIndex > 0){
        currentIndex--;
        remainingSeconds = (blocks[currentIndex].minutes || 0) * 60;
        statusLine.textContent = "Backed up one block.";
        updateHeader();
      }
    }

    function resetCurrentBlock(){
      stopTimer();
      if (!blocks.length) return;
      remainingSeconds = (blocks[currentIndex].minutes || 0) * 60;
      statusLine.textContent = "Block reset.";
      updateHeader();
    }

    function adjustCurrentBlock(deltaMinutes){
      if (!blocks.length) return;
      const b = blocks[currentIndex];
      let newMin = (b.minutes || 0) + deltaMinutes;
      if (newMin < 1) newMin = 1;
      if (newMin > 60) newMin = 60;
      const diff = newMin - (b.minutes || 0);
      b.minutes = newMin;

      // adjust totalMinutes and remainingSeconds for this block
      totalMinutes += diff;
      remainingSeconds += diff * 60;
      if (remainingSeconds < 10) remainingSeconds = 10; // keep some floor

      statusLine.textContent = `Adjusted block by ${diff >= 0 ? "+" : ""}${diff} min.`;
      updateHeader();
    }

    async function loadPlan(planKey){
      currentKey = planKey;
      statusLine.textContent = "Loading plan…";
      planLabelEl.textContent = `Plan: ${planKey}`;

      try{
        const ref = doc(db,"practicePlans", planKey);
        const snap = await getDoc(ref);
        if (!snap.exists()){
          // fallback: simple 60-min plan
          blocks = [
            { slot:"onmat",   label:"On-Mat Talk",          minutes:3 },
            { slot:"warmup",  label:"Warm-Up",              minutes:10 },
            { slot:"drills",  label:"drills", label: "Review of Prior Week’s Skills",   minutes:15 },
            { slot:"tech",    label:"technique", label: "Introduction of New Techniques",minutes:15 },
            { slot:"water",   label:"Water / Reset",        minutes:2 },
            { slot:"live",    label:"live", label: "Live Session",    minutes:10 },
            { slot:"cond",    label:"Conditioning / Finish",minutes:5 }
          ];
          totalMinutes = blocks.reduce((s,b)=>s+b.minutes,0);
          currentIndex = 0;
          remainingSeconds = blocks[0].minutes * 60;
          statusLine.textContent = "No saved plan found — using default layout.";
          updateHeader();
          return;
        }

        const data = snap.data() || {};
        const savedBlocks = Array.isArray(data.blocks) ? data.blocks : [];
        if (!savedBlocks.length){
          statusLine.textContent = "Plan has no blocks — using default layout.";
          blocks = [
            { slot:"onmat",   label:"On-Mat Talk",          minutes:3 },
            { slot:"warmup",  label:"Warm-Up",              minutes:10 },
            { slot:"drills",  label:"drills", label: "Review of Prior Week’s Skills",   minutes:15 },
            { slot:"tech",    label:"technique", label: "Introduction of New Techniques",minutes:15 },
            { slot:"water",   label:"Water / Reset",        minutes:2 },
            { slot:"live",    label:"live", label: "Live Session",    minutes:10 },
            { slot:"cond",    label:"Conditioning / Finish",minutes:5 }
          ];
        } else {
          // Normalize labels for known slots if missing
          const labelMap = {
            onmat:"On-Mat Talk",
            warmup:"Warm-Up",
            drills:"drills", label: "Review of Prior Week’s Skills",
            technique:"technique", label: "Introduction of New Techniques",
            tech:"technique", label: "Introduction of New Techniques",
            live:"live", label: "Live Session",
            cond:"cond", label: "Conditioning / Skill Based Activities",
            offmat:"ROLL CALL / OFF THE MAT TALK"
          };
          blocks = savedBlocks.map(b => ({
            slot: b.slot || "",
            label: b.label || labelMap[b.slot] || "Block",
            minutes: Number(b.minutes || 0) || 1
          }));
        }

        totalMinutes = (typeof data.totalMinutes === "number" && data.totalMinutes > 0)
          ? data.totalMinutes
          : blocks.reduce((s,b)=>s + (b.minutes||0), 0);

        currentIndex = 0;
        remainingSeconds = (blocks[0]?.minutes || 0) * 60;
        statusLine.textContent = "Plan loaded. Press Start when ready.";
        updateHeader();
      } catch(err){
        console.error(err);
        statusLine.textContent = "Error loading plan. Check network/emulator.";
      }
    }

    // --- Wire buttons ---
    btnStartPause.addEventListener("click", () => {
      if (timerId){
        stopTimer();
        statusLine.textContent = "Paused.";
      } else {
        startTimer();
        statusLine.textContent = "";
      }
    });
    btnReset.addEventListener("click", resetCurrentBlock);
    btnPrev.addEventListener("click", prevBlock);
    btnNext.addEventListener("click", () => nextBlock(false));
    btnMinus1.addEventListener("click", () => adjustCurrentBlock(-1));
    btnPlus1.addEventListener("click", () => adjustCurrentBlock(1));

    // --- Read querystring & init ---
    function todayKey(){
      return new Date().toISOString().slice(0,10);
    }

    const params = new URLSearchParams(location.search);
    const qsPlan = params.get("plan") || todayKey();

    loadPlan(qsPlan);

    // Expose hook so Daily Clipboard can call:
    // setTimeout(()=> w.startSandmanPlan("2025-11-18"), 400)
    window.startSandmanPlan = function(planKey){
      loadPlan(planKey || todayKey());
    };
  </script>
</body>
</html>
