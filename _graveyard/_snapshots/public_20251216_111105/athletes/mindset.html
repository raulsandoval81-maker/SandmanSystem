<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Athlete • Mindset Tool</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
  <style>
    .panel{max-width:980px;margin:28px auto;background:#eef1f5;border-radius:20px;padding:20px;box-shadow:0 6px 30px rgba(0,0,0,.18)}
    .card{background:#10151c;color:#e6eaf0;border-radius:14px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.25);margin-bottom:16px}
    .stack{display:flex;flex-direction:column;gap:12px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .pill, textarea, select, input{border-radius:10px;padding:10px 12px;background:#1b222c;color:#e9eef6;border:none;width:100%}
    textarea{min-height:100px}
    .btn{border:none;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.25)}
    .btn-primary{background:#ff4a4a;color:#fff}
    .btn-secondary{background:#1f2733;color:#fff}
    h1{color:#ffd34d;margin-bottom:10px}
    h2{color:#ffd34d;margin-bottom:6px;font-size:1.3rem}
    .muted{color:#9aa4b4;font-size:.9rem}
  </style>
</head>
<body>
    <div data-include="../assets/includes/header.html"></div>

  <main class="panel stack">
    <div class="row" style="justify-content:space-between">
      <h1>Athlete Mindset Tool</h1>
      <a class="btn btn-secondary" href="portal.html">← Back to Portal</a>
    </div>

    <!-- Reflection prompts -->
    <div class="card stack">
      <h2>Weekly Reflection</h2>
      <textarea id="skill" placeholder="What skill did I sharpen this week?"></textarea>
      <textarea id="lead" placeholder="How did I lead or help a teammate?"></textarea>
      <textarea id="challenge" placeholder="What challenged me most?"></textarea>
      <textarea id="nextGoal" placeholder="What will I attack next practice?"></textarea>
    </div>

    <!-- Self Ratings -->
    <div class="card stack">
      <h2>Self Ratings</h2>
      <select id="effort"><option value="">Effort (1–5)</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
      <select id="focus"><option value="">Focus (1–5)</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
      <select id="confidence"><option value="">Confidence (1–5)</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
    </div>

    <!-- Save + history -->
    <div class="card stack">
      <h2>Save Reflection</h2>
      <button id="saveBtn" class="btn btn-primary">Save My Mindset</button>
      <div id="status" class="muted">Ready.</div>
    </div>

    <div class="card stack">
      <h2>My Mindset Journal</h2>
      <div id="logList" class="stack muted">No entries yet.</div>
    </div>
  </main>
<div data-include="../assets/includes/footer.html"></div>
<script defer src="../assets/js/site.js"></script>
<script type="module" src="../assets/js/firebase-init.js"></script>

  <script type="module" src="../assets/js/mindset.js"></script>
</body>
</html>
