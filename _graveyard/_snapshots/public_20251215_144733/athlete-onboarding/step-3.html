<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Athlete Onboarding — Step 3</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="./onboarding.css"/>
</head>

<body>
  <main class="wrap">

    <header class="header">
      <h1 id="weapon-title">Your First Tool</h1>
      <p class="sub">This is your starter kit — built from your chosen weapon.</p>
    </header>

    <!-- TOOL CARD -->
    <section class="card" id="tool-card">
      <h2 id="tool-name">Loading…</h2>
      <p id="tool-desc" class="muted small"></p>

      <div id="tool-preview" class="preview-box">
        <!-- Shadow Trainer / Strength Primer / Honor Primer preview -->
      </div>
    </section>

    <!-- Continue -->
    <section class="card">
      <button id="finish-btn" class="btn solid-gold">Finish Onboarding → Enter Athlete Hub</button>
      <p id="status" class="small muted"></p>
    </section>

  </main>

  <script type="module" src="./step-3.js"></script>
</body>
</html>
