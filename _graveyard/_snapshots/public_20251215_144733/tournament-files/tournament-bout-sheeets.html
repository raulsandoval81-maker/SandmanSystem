<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tournament Bout Sheet</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto;background:#fff;color:#0f172a;}
    .page{max-width:700px;margin:0 auto;padding:20px;}
    .header{
      font-size:.95rem;text-transform:uppercase;letter-spacing:.15em;
      border-bottom:2px solid #0f172a;padding-bottom:6px;margin-bottom:14px;font-weight:700;
    }
    table{width:100%;border-collapse:collapse;font-size:.75rem;margin-bottom:14px;}
    th,td{border:1px solid #cbd5e1;padding:6px;}
    th{text-transform:uppercase;letter-spacing:.1em;background:#f3f4f6;}
    .line{border-bottom:1px solid #0f172a;height:14px;display:inline-block;min-width:150px;}
  </style>
</head>
<body>
  <div class="page">

    <div class="header">Lompoc Braves Challenge — Bout Sheet</div>

    <table>
      <tr><th>Mat</th><td></td><th>Bout #</th><td></td></tr>
      <tr><th>Weight</th><td></td><th>Date</th><td></td></tr>
    </table>

    <table>
      <thead>
        <tr>
          <th>Red Wrestler</th>
          <th>Green Wrestler</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>
            Name: <div class="line"></div><br>
            Team: <div class="line"></div><br>
            Color: Red
          </td>
          <td>
            Name: <div class="line"></div><br>
            Team: <div class="line"></div><br>
            Color: Green
          </td>
        </tr>
        
      </tbody>
    </table>

    <table>
      <thead>
        <tr>
          <th>Period</th><th>Red</th><th>Green</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>1st</td><td></td><td></td></tr>
        <tr><td>2nd</td><td></td><td></td></tr>
        <tr><td>3rd</td><td></td><td></td></tr>
        <tr><td>OT</td><td></td><td></td></tr>
      </tbody>
    </table>

    <table>
      <tr><th>Winner</th><td><div class="line"></div></td></tr>
      <tr><th>Method</th><td>Fall ☐ &nbsp; Tech ☐ &nbsp; Dec ☐ &nbsp; Maj ☐</td></tr>
      <tr><th>Referee</th><td><div class="line"></div></td></tr>
    </table>

  </div>
</body>
</html>
