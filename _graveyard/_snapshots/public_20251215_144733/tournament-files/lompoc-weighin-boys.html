<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lompoc Wrestling — Boys Weigh-In</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --navy:#0f172a;
      --navy2:#1e293b;
      --yellow:#ffdd48;
      --border:#cbd5e1;
      --gray:#6b7280;
      --lightgray:#f3f4f6;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:#ffffff;
      color:var(--navy);
    }

    .page{
      max-width:760px;
      margin:0 auto;
      padding:20px 22px 26px;
    }

    /* HEADER */
    .header-bar{
      background:var(--navy);
      color:#ffffff;
      padding:10px 14px;
      border-radius:10px;
      margin-bottom:16px;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      font-size:.9rem;
    }
    .header-title{
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:1rem;
    }
    .header-meta{
      text-align:right;
      font-size:.78rem;
      color:#ffffff;
      line-height:1.3;
    }
    .header-meta span.label{
      text-transform:uppercase;
      letter-spacing:.1em;
      color:var(--yellow);
      margin-right:6px;
    }
    .meta-line{
      border-bottom:1px solid #ffffff;
      min-width:150px;
      height:14px;
      display:inline-block;
    }

    /* TABLE */
    table.sheet{
      width:100%;
      border-collapse:collapse;
      font-size:.85rem;
      margin-top:4px;
    }
    table.sheet th,
    table.sheet td{
      border:1px solid var(--border);
      padding:6px 8px;
    }
    table.sheet th{
      background:var(--lightgray);
      color:var(--navy2);
      text-transform:uppercase;
      letter-spacing:.1em;
      font-size:.72rem;
      font-weight:600;
    }
    .col-wt{width:80px;}
    .col-name{width:auto;}
    .col-notes{width:200px;}

    .footer-note{
      margin-top:14px;
      font-size:.75rem;
      color:var(--gray);
      text-align:center;
    }

    @media print{
      .page{padding:10px 14px;}
      .header-bar{border-radius:0;}
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- HEADER -->
    <div class="header-bar">
      <div class="header-title">Lompoc Brave Challenge</div>
      <div class="header-meta">
        <div>
          <span class="label">School</span><span class="meta-line"></span>
        </div>
        <div style="margin-top:6px;">
          <span class="label">Coach</span><span class="meta-line"></span>
        </div>
      </div>
    </div>

    <!-- TABLE -->
    <table class="sheet">
      <thead>
        <tr>
          <th class="col-wt">Weight</th>
          <th class="col-name">Wrestler Name</th>
          <th class="col-notes">Notes</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>106</td><td></td><td></td></tr>
        <tr><td>113</td><td></td><td></td></tr>
        <tr><td>120</td><td></td><td></td></tr>
        <tr><td>126</td><td></td><td></td></tr>
        <tr><td>132</td><td></td><td></td></tr>
        <tr><td>138</td><td></td><td></td></tr>
        <tr><td>144</td><td></td><td></td></tr>
        <tr><td>150</td><td></td><td></td></tr>
        <tr><td>157</td><td></td><td></td></tr>
        <tr><td>165</td><td></td><td></td></tr>
        <tr><td>175</td><td></td><td></td></tr>
        <tr><td>190</td><td></td><td></td></tr>
        <tr><td>215</td><td></td><td></td></tr>
        <tr><td>HWT</td><td></td><td></td></tr>
      </tbody>
    </table>

    <div class="footer-note">
      Use one sheet per team. Return to head table after weigh-ins.
    </div>

  </div>
</body>
</html>
