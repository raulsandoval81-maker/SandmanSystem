<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Coach Console · Sandman System</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    body { background:#06080d; color:#f5f5f5; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; margin:0; }
    .wrap { max-width:900px; margin:0 auto; padding:24px 16px 40px; }
    h1 { color:#ffdd48; font-size:1.4rem; margin-bottom:6px; }
    .muted { color:#94a3b8; font-size:.75rem; }
    .card { background:#0b1017; border:1px solid #252c3a; border-radius:14px; padding:14px 16px 18px; margin-bottom:18px; box-shadow:0 0 14px rgba(0,0,0,.25); }
    label { display:block; font-size:.7rem; color:#d1d5db; margin-bottom:4px; }
    input, textarea { width:100%; background:#0f172a; border:1px solid #1f2937; border-radius:8px; padding:6px 8px; color:#fff; font-size:.78rem; }
    textarea { min-height:70px; resize:vertical; }
    .btn { border:0; border-radius:999px; padding:6px 14px; font-weight:700; cursor:pointer; }
    .btn-primary { background:#e63946; color:#fff; }
    .xp-btn { background:#101520; border:1px solid #303848; border-radius:999px; padding:5px 10px; font-size:.7rem; color:#fff; cursor:pointer; margin-right:5px; }
    .xp-btn:hover { background:#e63946; border-color:#e63946; }
    .feed-item { border-bottom:1px solid rgba(255,255,255,.05); padding:8px 0; }
    .feed-kind { display:inline-block; border-radius:999px; padding:2px 8px; font-size:.6rem; font-weight:700; color:#111; margin-right:6px; }
    .top-nav, .coach-tools-row {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.pill {
  background:#1a1d23;
  border:1px solid #2d3648;
  border-radius:999px;
  padding:6px 14px;
  font-weight:700;
  color:#fff;
  text-decoration:none;
  transition:.15s;
}
.pill:hover { background:#e63946; border-color:#e63946; }
.pill.active { background:#ffdd48; color:#111; border-color:#ffdd48; }

  </style>
</head>
<body>
  <main class="wrap">
    <!-- ========================= -->
<!-- TOP NAV (shared across all coach pages) -->
<!-- ========================= -->
<!-- ========================= -->
<!-- TOP NAV (all buttons now consistent) -->
<!-- ========================= -->
<div class="top-nav">
  <button class="pill" onclick="location.href='/coaches/index.html'">🏠 Back to Coach Index</button>
  <button class="pill" onclick="location.href='/coaches/roster.html'">👥 Team Roster</button>
  <button class="pill" onclick="location.href='/coaches/coach-notes.html'">📝 Coach Notes</button>
  <button class="pill active" onclick="location.href='/coaches/daily-grind.html'">🔥 Daily Grind XP</button>
  <button class="pill" onclick="location.href='/coaches/arena-log.html'">🏟️ Arena Log</button>
  <button class="pill" onclick="location.href='/coaches/coaches-weekend-xp.html'">📅 Weekend XP</button>
  <button class="pill" onclick="location.href='/coaches/prestige-awards-xp.html'">🏆 Prestige XP</button>
</div>
    <h1>Coach Console</h1>
    <p class="muted" id="status">Ready.</p>

    <!-- XP Section -->
    <section class="card">
      <h2 style="color:#ffdd48;font-size:1.1rem;">Athlete feedback </h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-top:8px;">
        <div>
          <label for="athleteId">Athlete UID</label>
          <input id="athleteId" placeholder="F4_0001 or F8_0002"/>
        </div>
        <div>
          <label for="eventName">Event Name</label>
          <input id="eventName" placeholder="CA Fall Open"/>
        </div>
        <div>
          <label for="division">Division / Weight</label>
          <input id="division" placeholder="12U • 70lb"/>
        </div>
      </div>

      <label style="margin-top:10px;" for="coachNote">Coach Note (optional)</label>
      <textarea id="coachNote" placeholder="Performance notes, attitude, or details"></textarea>

    </section>

    <!-- Notes -->
    <section class="card">
      <h2 style="color:#ffdd48;font-size:1.1rem;">Coach Notes</h2>
      <div>
        <label for="tournNote">Tournament Summary</label>
        <textarea id="tournNote" placeholder="Summary after meet, big picture reflections"></textarea>
        <button id="saveTourn" class="btn btn-primary" style="margin-top:6px;">Save Tournament Note</button>
      </div>

      <div style="margin-top:14px;">
        <label for="parentNote">Parent Note</label>
        <textarea id="parentNote" placeholder="Communication note, praise or concern for parents"></textarea>
        <button id="saveParent" class="btn btn-primary" style="margin-top:6px;">Save Parent Note</button>
      </div>

      <div style="margin-top:14px;">
        <label for="injuryNote">Injury Report</label>
        <textarea id="injuryNote" placeholder="Describe injury, severity, steps taken"></textarea>
        <button id="saveInjury" class="btn btn-primary" style="margin-top:6px;">Save Injury Report</button>
      </div>
    </section>

    <!-- Feed -->
    <section class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2 style="color:#ffdd48;font-size:1.1rem;">Tournament Feed</h2>
        <span id="feedStatus" class="muted">loading…</span>
      </div>
      <div id="feedItems" style="margin-top:8px;"></div>
    </section>
  </main>

  <!-- Your linked JS -->
  <script type="module" src="/assets/js/coach-console.js"></script>
</body>
</html>
