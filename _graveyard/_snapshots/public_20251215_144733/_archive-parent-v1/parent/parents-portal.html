<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parent • Portal</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
  <style>
    .panel{max-width:980px;margin:28px auto;background:#eef1f5;border-radius:20px;padding:18px 18px 26px;box-shadow:0 6px 30px rgba(0,0,0,.18)}
    .grid{display:grid;gap:16px}
    @media(min-width:900px){.grid{grid-template-columns:1fr 1fr}}
    .card{background:#10151c;color:#e6eaf0;border-radius:14px;padding:16px 16px 18px;box-shadow:0 2px 14px rgba(0,0,0,.25)}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{border:none;border-radius:12px;padding:10px 14px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.25);cursor:pointer}
    .btn-primary{background:#ff4a4a;color:#fff}.btn-secondary{background:#1f2733;color:#fff}
    .pill, input, textarea, select{border-radius:10px;padding:10px 12px;background:#1b222c;color:#e9eef6;border:1px solid transparent}
    h1{color:#ffd34d;margin:4px 0 8px;font-size:2.2rem}
    h2{color:#ffd34d;margin:0 0 10px;font-size:1.25rem}
    .muted{color:#9aa4b4}
    .item{background:#0e131a;border-radius:12px;padding:10px 12px}
    .stack{display:flex;flex-direction:column;gap:10px}
  </style>
</head>
<body>
    <div data-include="../assets/includes/header.html"></div>

  <main class="panel">
    <section class="row" style="justify-content:space-between">
      <h1>Parent Portal</h1>
      <a class="btn btn-secondary" href="../index.html">Back to Site</a>
    </section>

    <section class="grid">
      <!-- Announcements -->
      <div class="card">
        <h2>Announcements</h2>
        <div id="annList" class="stack muted">Loading…</div>
      </div>

      <!-- Schedule -->
      <div class="card">
        <h2>Schedule</h2>
        <div id="schedList" class="stack muted">Loading…</div>
      </div>

      <!-- Q&A -->
      <div class="card" style="grid-column:1 / -1">
        <h2>Questions for Coaches</h2>
        <div class="row">
          <input id="qName" class="pill" placeholder="Your name (optional)" />
          <input id="qEmail" class="pill" placeholder="Email (optional)" />
        </div>
        <textarea id="qText" placeholder="Ask a question…"></textarea>
        <div class="row">
          <button id="askBtn" class="btn btn-primary">Send question</button>
          <div id="qStatus" class="muted">Ready.</div>
        </div>
        <div style="margin-top:12px">
          <div class="muted" style="margin-bottom:6px">Recent questions</div>
          <div id="qaList" class="stack muted">No questions yet.</div>
        </div>
      </div>

      <!-- Docs -->
      <div class="card" style="grid-column:1 / -1">
        <h2>Documents</h2>
        <div class="row">
          <a class="btn btn-secondary" href="assets/pdfs/waiver.pdf" target="_blank">Waiver (PDF)</a>
          <a class="btn btn-secondary" href="assets/pdfs/code-of-conduct.pdf" target="_blank">Code of Conduct</a>
        </div>
      </div>
    </section>
  </main>
<div data-include="../assets/includes/footer.html"></div>

<script defer src="../assets/js/site.js"></script>
<script type="module" src="../assets/js/firebase-init.js"></script>
</body>
</html>
