<!DOCTYPE html>
<html lang="en">
<head>
    
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weight Management</title>
<link rel="stylesheet" href="../assets/css/site.css">
<style>
  .wrap{max-width:900px;margin:0 auto;padding:28px}
  .back{display:inline-block;margin:6px 0 22px;padding:10px 14px;border-radius:12px;border:1px solid #3a4048;color:#e6eef7;background:#20262e}
  .panel{background:#f6f7f9;border:1px solid #e6e8ec;border-radius:18px;box-shadow:0 10px 26px rgba(0,0,0,.25);padding:18px}
  .row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
  .row-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  @media (max-width:760px){.row,.row-2{grid-template-columns:1fr}}
  input,select,textarea,button{padding:10px;border-radius:10px;border:1px solid #cfd5dd}
  .btn{background:#ef4444;color:#fff;font-weight:700;border:none}
  table{width:100%;border-collapse:collapse;margin-top:14px}
  th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left}
  .actions{display:flex;gap:10px;margin-top:12px}
  .muted{color:#6b7280}
  .chart-wrap{margin-top:16px;background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px}
  .chart-title{margin:0 0 8px;color:#374151;font-weight:700}
  canvas{width:100%;height:220px;display:block}
  .guide{background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-top:10px}
  .guide h4{margin:0 0 6px;color:#111827}
  .guide ul{margin:0 0 0 18px;color:#4b5563}
  .disclaimer{font-size:12px;color:#6b7280;margin-top:8px}
</style>
</head>
<body>
<h1 class="page-title">Weight Management</h1>
<p style="font-size:1.2rem; font-weight:600; margin-bottom:16px; color:#ffd633;">
  Faster. Smarter. Stronger.
</p>
<p style="color:#9ca3af; margin-bottom:20px;">
  Not about losing — about gaining control. Fuel, train, and recover the Sandman way.
</p>

    <!-- Goal selector -->
    <div class="row-2" style="margin-bottom:8px">
      <div>
        <label for="wGoal">Goal</label>
        <select id="wGoal">
          <option value="maintain">Maintain</option>
          <option value="drop_safely">Drop Safely</option>
          <option value="gain_muscle">Gain Muscle</option>
        </select>
      </div>
      <div class="guide" id="wGuide">
        <!-- filled by JS -->
      </div>
    </div>
    <div class="disclaimer">General guidance only. For health questions, talk with your coach and a healthcare professional.</div>

    <!-- Entry form -->
    <div class="row" style="margin-top:12px">
      <div>
        <label for="wDate">Date</label>
        <input id="wDate" type="date">
      </div>
      <div>
        <label for="wValue">Weight</label>
        <input id="wValue" type="number" step="0.1" placeholder="e.g., 148.6">
      </div>
      <div>
        <label for="wNote">Note</label>
        <input id="wNote" placeholder="hydration, after practice, etc.">
      </div>
    </div>

    <div class="actions">
      <button class="btn" id="wSave">Save</button>
      <button id="wClearForm">Clear Form</button>
      <button id="wExport">Export CSV</button>
    </div>

    <div class="chart-wrap">
      <p class="chart-title">Trend</p>
      <canvas id="wChart" width="800" height="220" aria-label="Weight Trend"></canvas>
    </div>

    <table>
      <thead>
        <tr><th>Date</th><th>Weight</th><th>Goal</th><th>Note</th><th></th></tr>
      </thead>
      <tbody id="wTable"><tr><td colspan="5" class="muted">No entries yet.</td></tr></tbody>
    </table>
  </div>
</main>
<script defer src="../assets/js/ath-weight.js"></script>
</body>
</html>
