<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Combat Arsenal</title>
  <link rel="stylesheet" href="combat.css"/>
</head>
<body>
  <div class="wrap">

    <header class="header">
      <button class="back-btn" onclick="history.back()">← Back</button>
      <h1 class="title">Combat Arsenal</h1>
      <p class="subtitle">Your tools for building speed, timing, and courage.</p>
    </header>

    <section class="tool-grid">

      <div class="tool-card">
        <h2>Footwork Basics</h2>
        <p>Shadow movement · stance · motion patterns</p>
      </div>

      <div class="tool-card">
        <h2>Chain Wrestling</h2>
        <p>Entry → finish → climb drills</p>
      </div>

      <div class="tool-card">
        <h2>Timing & Reaction</h2>
        <p>Burst drills · level change · fake-to-shot</p>
      </div>

      <div class="tool-card locked">
        <h2>Shadow Trainer</h2>
        <p class="locked-note">Unlock at Stripe 1</p>
      </div>

    </section>

  </div>

  <script type="module" src="combat.app.js"></script>
</body>
</html>
