<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live Mat View</title>
  <link rel="stylesheet" href="live.css">
</head>
<body>

<div class="live-box">
  <h2 id="eventName">Event</h2>
  <div class="scores">
    <div class="red"><span id="redScore">0</span></div>
    <div class="clock" id="mainTimer">2:00</div>
    <div class="green"><span id="greenScore">0</span></div>
  </div>
  <div class="log" id="liveLog"></div>
</div>

<script type="module" src="mat-view.js"></script>
</body>
</html>
