<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reply to Coach • Para-Comms</title>

<link rel="stylesheet" href="/communications/Shared/comms.css">

  <style>
    :root{
      --bg:#0a1833;
      --panel:#111c35;
      --deep:#0b1120;
      --line:#27304a;
      --gold:#ffdd48;
      --text:#f0f4f8;
      --muted:#9aa4b1;
    }

    body{ background:var(--bg); color:var(--text); font-family:system-ui; }

    .wrap{
      max-width:800px;
      margin:0 auto;
      padding:24px 16px 60px;
    }

    h1{
      margin:0 0 12px;
      color:var(--gold);
      font-size:1.4rem;
      text-transform:uppercase;
      text-align:center;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:18px 20px;
      margin-bottom:22px;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
    }

    label{
      font-size:.92rem;
      color:var(--muted);
      margin-top:12px;
      display:block;
    }

    input, textarea{
      width:100%;
      background:var(--deep);
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px;
      color:var(--text);
      font-size:.95rem;
      margin-top:4px;
      outline:none;
    }

    input:focus, textarea:focus{
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(255,221,72,.18);
    }

    .btn-row{ display:flex; gap:10px; margin-top:18px; }
    .btn{
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-size:.92rem;
      border:none;
    }
    .btn-send{
      background:var(--gold);
      color:#111;
      font-weight:700;
    }
    .btn-cancel{
      background:#1d2a4a;
      color:var(--text);
      border:1px solid var(--line);
    }

    .msg-ok{ color:#79f29b; font-weight:700; margin-top:14px; display:none; }
    .msg-err{ color:#ff6b6b; font-weight:700; margin-top:14px; display:none; }

    .original-block{
      background:var(--deep);
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px 12px;
      margin-bottom:18px;
      font-size:.9rem;
      color:var(--muted);
      white-space:pre-wrap;
    }
  </style>
</head>

<body>

<div class="wrap">

  <h1>Reply to Coach</h1>

  <section class="panel">
    <h2 style="margin:0 0 10px;color:var(--gold);font-size:1rem;">
      Original Message
    </h2>

    <div id="original-msg" class="original-block">
      Loading…
    </div>
  </section>

  <section class="panel">
    <label>Your Reply:</label>
    <textarea id="reply-body" rows="6" placeholder="Type your reply…"></textarea>

    <div class="btn-row">
      <button id="reply-send" class="btn btn-send">Send Reply</button>
      <button id="reply-cancel" class="btn btn-cancel">Cancel</button>
    </div>

    <p id="reply-success" class="msg-ok">Reply sent!</p>
    <p id="reply-error" class="msg-err">Error — please try again.</p>
  </section>

  <a href="./inbox.html" style="color:var(--gold);font-size:.9rem;text-decoration:none;">
    ← Back to Inbox
  </a>

</div>
<script type="module" src="/communications/reply.js"></script>

</body>
</html>
