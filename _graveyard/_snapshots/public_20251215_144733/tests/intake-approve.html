<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sandman – Silver Coach Console (EMU)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: dark; }
    body { margin:0; padding:24px; background:#0b0b0f; color:#e8e8ef; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    h1 { margin:0 0 8px 0; font-size:20px; }
    .muted{color:#9aa0b4} .ok{color:#90EE90} .err{color:#ff8c8c} .warn{color:#ffd166}
    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .grid{display:grid; gap:12px; grid-template-columns: repeat(auto-fit, minmax(240px,1fr));}
    .card{background:#11121a; border:1px solid #242436; border-radius:14px; padding:16px; margin:14px 0;}
    input,button,textarea{background:#0f1020; color:#e8e8ef; border:1px solid #2a2b3f; border-radius:10px; padding:10px 12px; font-size:14px;}
    button{cursor:pointer}
    textarea{width:100%; min-height:160px}
    code{background:#0f1020; padding:2px 6px; border-radius:6px}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;}
  </style>
</head>
<body>
  <h1>Silver Coach Console (Emulator)</h1>
  <div class="muted">Loop: Invite → Parent Submit → Approve → Athlete → XP</div>

  <!-- INVITE -->
  <div class="card">
    <h3 style="margin:0 0 8px 0">Invite (48h)</h3>
    <div class="row">
      <button id="genInvite">Generate 48h Invite</button>
      <input id="inviteUrl" placeholder="Invite link…" readonly style="min-width:420px" />
      <button id="copyInvite">Copy</button>
    </div>
    <div class="row">
      <span class="muted">Token:</span> <code id="token" class="mono">—</code>
      <button id="listenToken">Listen</button>
    </div>
  </div>

  <!-- INTAKE LIVE -->
  <div class="card">
    <h3 style="margin:0 0 8px 0">Intake (live)</h3>
    <div class="row">
      <input id="searchToken" placeholder="Paste token to load" />
      <button id="loadByToken">Load Token</button>
      <span id="intakeStatus" class="muted">Idle…</span>
    </div>
    <textarea id="intakeDoc" class="mono" readonly>(none)</textarea>
  </div>

  <!-- FAKE PARENT SUBMIT -->
  <div class="card">
    <h3 style="margin:0 0 8px 0">Fake Submit (parent)</h3>
    <div class="grid">
      <input id="athleteName" placeholder="Athlete public name (e.g., J. Doe)" />
      <input id="team" placeholder="Team/Club" />
      <input id="city" placeholder="City" />
      <input id="state" placeholder="State" />
    </div>
    <div class="row" style="margin-top:8px">
      <button id="submitIntake">Submit Intake</button>
      <span id="submitMsg" class="muted"></span>
    </div>
  </div>

  <!-- APPROVE -->
  <div class="card">
    <h3 style="margin:0 0 8px 0">Approve Intake (coach)</h3>
    <div class="row">
      <button id="approveBtn">Approve & Activate</button>
      <span id="approveMsg" class="muted"></span>
    </div>
  </div>

  <!-- ATHLETE + XP -->
  <div class="card">
    <h3 style="margin:0 0 8px 0">Athlete</h3>
    <div class="row">
      <span class="muted">athleteUid:</span> <code id="athleteUid" class="mono">—</code>
      <button id="loadAthlete">Load Athlete</button>
    </div>
    <textarea id="athleteDoc" class="mono" readonly>(none)</textarea>

    <div class="row" style="margin-top:10px">
      <button id="xpAttendance">+10 Shark Work (attendance)</button>
      <button id="xpFish">+5 Fish Work</button>
      <span id="xpMsg" class="muted"></span>
    </div>
  </div>

  <!-- Firebase SDKs (compat for speed) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    // 0) Parse token from URL FIRST (support both ?token and ?invite)
    let tokenId =
      new URLSearchParams(location.search).get("token") ||
      new URLSearchParams(location.search).get("invite") ||
      "";

    // 1) EMULATOR CONFIG
    const firebaseConfig = { apiKey:"fake", authDomain:"localhost", projectId:"demo-sandmandashboard" };
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    // Make sure Auth emulator is running (start with --only functions,firestore,hosting,auth)
    auth.useEmulator("http://127.0.0.1:9099/");
    db.useEmulator("127.0.0.1", 8081);

    // 2) DOM refs
    const $inviteUrl = document.getElementById("inviteUrl");
    const $token = document.getElementById("token");
    const $intakeDoc = document.getElementById("intakeDoc");
    const $intakeStatus = document.getElementById("intakeStatus");
    const $submitMsg = document.getElementById("submitMsg");
    const $approveMsg = document.getElementById("approveMsg");
    const $athleteUid = document.getElementById("athleteUid");
    const $athleteDoc = document.getElementById("athleteDoc");
    const $xpMsg = document.getElementById("xpMsg");
    const $searchToken = document.getElementById("searchToken");
    let intakeUnsub = null;

    // 3) Helpers
    function setIntakeStatus(msg, cls="muted"){ $intakeStatus.textContent=msg; $intakeStatus.className=cls; }
    const postJSON = async (url, body) => {
      const r = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})});
      const t = await r.text(); try { return JSON.parse(t); } catch { return { ok:false, error:"non-json", raw:t }; }
    };

    async function signIn() {
      try { await auth.signInAnonymously(); } catch(e){ console.error(e); }
    }

    function startIntakeListener() {
      if (!tokenId) { setIntakeStatus("Missing token","err"); return; }
      if (typeof intakeUnsub==="function"){ intakeUnsub(); intakeUnsub=null; }
      setIntakeStatus("Listening…");
      intakeUnsub = db.collection("intakes").doc(tokenId).onSnapshot(
        (snap)=>{
          if (!snap.exists){ $intakeDoc.value="(no such token)"; setIntakeStatus("No intake","warn"); return; }
          $intakeDoc.value = JSON.stringify({id:snap.id,...snap.data()},null,2);
          setIntakeStatus("Live update","ok");
        },
        (err)=>{ console.error(err); setIntakeStatus("Listen error: "+(err.message||err),"err"); }
      );
    }

    // 4) Invite
    document.getElementById("genInvite").addEventListener("click", async ()=>{
      $inviteUrl.value="…generating…";
      const data = await postJSON("http://127.0.0.1:5001/sandmandashboard/us-central1/createInviteDev", {});
      if (data.ok && data.url) {
        $inviteUrl.value = data.url;
        const u = new URL(data.url);
        tokenId = u.searchParams.get("token") || u.searchParams.get("invite") || "";
        $token.textContent = tokenId || "—";
        startIntakeListener();
      } else {
        $inviteUrl.value = "Error: " + (data.error||JSON.stringify(data));
      }
    });

    document.getElementById("copyInvite").addEventListener("click", ()=>{ if($inviteUrl.value) { navigator.clipboard.writeText($inviteUrl.value);} });

    // 5) Manual token load
    document.getElementById("loadByToken").addEventListener("click", ()=>{
      const v = $searchToken.value.trim(); if (v) { tokenId=v; $token.textContent=v; startIntakeListener(); }
    });
    document.getElementById("listenToken").addEventListener("click", ()=>{ if (tokenId) startIntakeListener(); });

    // 6) Fake parent submit (writes to intakes/{token})
document.getElementById("submitIntake").addEventListener("click", async ()=>{
  if (!tokenId){ $submitMsg.textContent="Missing token"; return; }
  const athleteName = document.getElementById("athleteName").value.trim();
  const team = document.getElementById("team").value.trim();
  const city = document.getElementById("city").value.trim();
  const state = document.getElementById("state").value.trim();
  $submitMsg.textContent="Submitting…";
  try{
    const data = await postJSON("http://127.0.0.1:5001/sandmandashboard/us-central1/submitIntakeDev", {
      intakeId: tokenId,
      form: { athleteName, team, city, state }
    });
    if (data.ok) {
      $submitMsg.textContent = "Submitted.";
      // live listener will update the Intake panel automatically
    } else {
      $submitMsg.textContent = "Submit error: " + (data.error || JSON.stringify(data));
    }
  }catch(e){
    console.error(e);
    $submitMsg.textContent="Submit error: "+(e.message||e);
  }
});
    
    // 7) Approve (HTTP function; make sure approveIntake has CORS if it's HTTP)
    document.getElementById("approveBtn").addEventListener("click", async ()=>{
      if (!tokenId){ $approveMsg.textContent="Missing token"; return; }
      $approveMsg.textContent="Approving…";
      const data = await postJSON("http://127.0.0.1:5001/sandmandashboard/us-central1/approveIntake", { intakeId: tokenId });
      if (data && data.ok) {
        const uid = data.athleteUid || data.uid || data.athleteId || "";
        $athleteUid.textContent = uid || "(unknown)";
        $approveMsg.textContent = "Approved.";
        if (uid) loadAthlete(uid);
      } else {
        $approveMsg.textContent = "Approve error: " + (data?.error || JSON.stringify(data));
      }
    });

    async function loadAthlete(uid) {
      try{
        const snap = await db.collection("athletes").doc(uid).get();
        if (!snap.exists){ $athleteDoc.value="(no such athlete)"; return; }
        $athleteDoc.value = JSON.stringify({ id:snap.id, ...snap.data() }, null, 2);
      }catch(e){ console.error(e); $athleteDoc.value="Load error: "+(e.message||e); }
    }
    document.getElementById("loadAthlete").addEventListener("click", ()=>{
      const uid = $athleteUid.textContent.trim();
      if (uid && uid !== "—") loadAthlete(uid);
    });

    // 8) XP award (HTTP tester; ensure incrementXpHttp has CORS if called from page)
    document.getElementById("xpAttendance").addEventListener("click", async ()=>{
      const uid = $athleteUid.textContent.trim();
      if (!uid || uid==="—"){ $xpMsg.textContent="No athleteUid."; return; }
      $xpMsg.textContent="Awarding Shark Work (+10)…";
      const data = await postJSON("http://127.0.0.1:5001/sandmandashboard/us-central1/incrementXpHttp", { uid, event:"attendance", actorUid:"coach-demo" });
      $xpMsg.textContent = data.ok ? "XP +10 ok" : ("XP error: "+(data.error||JSON.stringify(data)));
      if (data.ok) loadAthlete(uid);
    });

    document.getElementById("xpFish").addEventListener("click", async ()=>{
      const uid = $athleteUid.textContent.trim();
      if (!uid || uid==="—"){ $xpMsg.textContent="No athleteUid."; return; }
      $xpMsg.textContent="Awarding Fish Work (+5)…";
      const data = await postJSON("http://127.0.0.1:5001/sandmandashboard/us-central1/incrementXpHttp", { uid, event:"fish", actorUid:"coach-demo" });
      $xpMsg.textContent = data.ok ? "XP +5 ok" : ("XP error: "+(data.error||JSON.stringify(data)));
      if (data.ok) loadAthlete(uid);
    });

    // 9) Boot
    (async ()=>{
      await signIn();
      if (tokenId){ $token.textContent=tokenId; startIntakeListener(); }
    })();
  </script>
</body>
</html>
