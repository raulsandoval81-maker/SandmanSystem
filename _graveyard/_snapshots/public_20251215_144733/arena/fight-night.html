<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fight Night Arena</title>
  <link rel="stylesheet" href="fight-night.css">
</head>

<body>

  <div id="fn-container">
    
    <div id="fn-top">
      <div id="fn-event"></div>
      <div id="fn-bout"></div>
    </div>

    <div id="fn-names">
      <div id="fn-red-name" class="fn-name red">RED</div>
      <div id="fn-green-name" class="fn-name green">GREEN</div>
    </div>

    <div id="fn-scores">
      <div id="fn-red-score" class="fn-score red">0</div>
      <div id="fn-green-score" class="fn-score green">0</div>
    </div>

    <div id="fn-timer">2:00</div>

    <div id="fn-last-action">—</div>

  </div>

<script src="fight-night.js"></script>
</body>
</html>
