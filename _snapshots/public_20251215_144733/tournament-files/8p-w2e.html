<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LHS • Queen of the Ring — 8 Person Bracket</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  :root{
    --navy:#0f172a;
    --navy2:#1e293b;
    --silver:#cbd5e1;
    --line:#94a3b8;
    --text:#0f172a;
  }

  body{
    margin:0;
    background:#ffffff;
    font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color:var(--text);
  }

  .page{
    max-width:1100px;
    margin:0 auto;
    padding:20px 24px 40px;
  }

  .header{
    background:var(--navy);
    color:white;
    padding:12px 14px;
    font-size:1.2rem;
    text-transform:uppercase;
    letter-spacing:.14em;
    font-weight:700;
    text-align:center;
    border-radius:6px;
    margin-bottom:18px;
  }

  .bracket-grid{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap:10px;
  }

  .round-col{
    border-right:2px solid var(--line);
    padding-right:10px;
  }
  .round-col:last-child{
    border-right:none;
  }

  .round-title{
    font-size:.85rem;
    text-transform:uppercase;
    font-weight:600;
    color:var(--navy);
    letter-spacing:.12em;
    margin-bottom:8px;
  }

  .match-box{
    border:1px solid var(--line);
    border-radius:6px;
    padding:6px;
    margin-bottom:14px;
    background:#f8fafc;
    min-height:48px;
  }

  .match-line{
    border-bottom:1px solid var(--silver);
    height:18px;
    margin-bottom:4px;
  }
  .match-line:last-child{
    margin-bottom:0;
  }

  .final-box{
    border:2px solid var(--navy);
    background:#e2e8f0;
  }

  @media print{
    body{ background:white; }
    .page{ padding:14px; }
    .header{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head>

<body>
<div class="page">

  <div class="header">LHS • Queen of the Ring — 8-Person Bracket</div>

  <div class="bracket-grid">

    <!-- ROUND 1 — QUARTERS -->
    <div class="round-col">
      <div class="round-title">Quarterfinals</div>

      <div class="match-box">
        <div class="match-line"></div>
        <div class="match-line"></div>
      </div>

      <div class="match-box">
        <div class="match-line"></div>
        <div class="match-line"></div>
      </div>

      <div class="match-box">
        <div class="match-line"></div>
        <div class="match-line"></div>
      </div>

      <div class="match-box">
        <div class="match-line"></div>
        <div class="match-line"></div>
      </div>
    </div>

    <!-- ROUND 2 — SEMIS -->
    <div class="round-col">
      <div class="round-title">Semifinals</div>

      <div class="match-box">
        <div class="match-line"></div>
        <div class="match-line"></div>
      </div>

      <div class="match-box">
        <div class="match-line"></div>
        <div class="match-line"></div>
      </div>
    </div>

    <!-- ROUND 3 — FINALS -->
    <div class="round-col">
      <div class="round-title">Finals</div>

      <div class="match-box final-box">
        <div class="match-line"></div>
        <div class="match-line"></div>
      </div>

      <div class="round-title" style="margin-top:20px;">3rd Place</div>

      <div class="match-box">
        <div class="match-line"></div>
        <div class="match-line"></div>
      </div>
    </div>

    <!-- CONSOLATION -->
    <div class="round-col">
      <div class="round-title">Consolation</div>

      <div class="match-box">
        <div class="match-line"></div>
        <div class="match-line"></div>
      </div>

      <div class="match-box">
        <div class="match-line"></div>
        <div class="match-line"></div>
      </div>

      <div class="match-box">
        <div class="match-line"></div>
        <div class="match-line"></div>
      </div>

      <div class="match-box">
        <div class="match-line"></div>
        <div class="match-line"></div>
      </div>

    </div>

  </div><!-- brack-grid -->

</div><!-- page -->
</body>
</html>
