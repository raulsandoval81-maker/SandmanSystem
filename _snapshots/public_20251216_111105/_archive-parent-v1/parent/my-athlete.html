<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Athlete • Snapshot</title>
  <link rel="stylesheet" href="../assets/css/site.css" />

  <style>
    .panel{max-width:820px;margin:28px auto;background:#eef1f5;border-radius:20px;padding:18px 18px 26px;box-shadow:0 6px 30px rgba(0,0,0,.18)}
    .card{background:#10151c;color:#e6eaf0;border-radius:14px;padding:16px 16px 18px;box-shadow:0 2px 14px rgba(0,0,0,.25)}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .pill, select{border-radius:10px;padding:10px 12px;background:#1b222c;color:#e9eef6;border:1px solid transparent}
    h1{color:#ffd34d;margin:4px 0 8px;font-size:2.0rem}
    .muted{color:#9aa4b4}
  </style>
</head>
<body>
  <main class="panel">
    <div class="row" style="justify-content:space-between">
      <h1>My Athlete (snapshot)</h1>
      <a class="pill" href="./index.html">← Back to Parent Portal</a>
    </div>
    <span id="curTier" class="rank-name">—</span>
<span id="rankShield" class="shield--sm"></span>

<!-- Pairing banner -->
<section id="pairWrap" class="card" style="border-left:4px solid #10b981">
  <h3 class="title">Pair your device</h3>
  <p class="muted">Enter your athlete’s ID and your parent PIN (from the welcome card). You’ll see quick reactions and notes.</p>
  <form id="pairForm" class="row" style="gap:10px">
    <input id="pairName" class="input" placeholder="Your name (e.g., Mom)" required>
    <input id="pairAthleteId" class="input" placeholder="Athlete ID (A000001)" required>
    <input id="pairPin" class="input" type="password" placeholder="Parent PIN (1234 demo)" required>
    <button class="btn">Pair</button>
  </form>

  <div class="row" style="display:none" data-when="paired">
    <span class="chip">Paired: <strong id="pairedInfo"></strong></span>
  </div>
</section>

<!-- Parent reactions widget -->
<section class="card">
  <h3 class="title">Cheer & Notes</h3>
  <div id="parentReacts"></div>
</section>

    <div class="card" style="margin-top:12px">
      <div class="row">
        <select id="sportSel" class="pill">
          <option>Wrestling</option>
          <option>Kickboxing</option>
          <option>Submission Grappling</option>
          <option>Strength</option>
        </select>
        <select id="athleteSelect" class="pill"></select>
      </div>

      <div id="snap" class="muted" style="margin-top:12px">
        XP: 0<br/>Logs: 0<br/>Updated: —
      </div>
    </div>
  </main>

  <script type="module" src="../assets/js/parent-my-athlete.js"></script>
</body>
</html>
