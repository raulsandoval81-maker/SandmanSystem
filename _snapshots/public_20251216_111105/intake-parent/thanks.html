<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Thank You — Sandman Intake</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>

  <style>
    body{
      background:#0c0d11;
      color:#f5f5f5;
      margin:0;
      padding:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
    }
    .wrap{
      max-width:420px;
      padding:32px 22px;
      background:#13151c;
      border-radius:14px;
      border:1px solid #22252d;
      box-shadow:0 0 28px rgba(0,0,0,.45);
    }
    h1{
      margin-top:0;
      font-size:1.9rem;
      color:#ffdd48;
      letter-spacing:.8px;
    }
    p{
      margin:12px 0;
      line-height:1.5;
      opacity:.9;
    }
    .small{
      opacity:.6;
      font-size:.85rem;
      margin-top:16px;
    }
    a{
      color:#ffdd48;
      font-weight:600;
      text-decoration:none;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Thank You!</h1>
    <p>Your intake form has been submitted.</p>
    <p>The coach will review your information and activate your athlete's profile.</p>

    <p class="small">If you have any questions, please reach out to your coach directly.</p>

    <p class="small">Built in the Shadows. Staged in the Light.</p>
  </div>
</body>
</html>
