<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Coach · Roster (v2)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="/assets/css/site.css"/>
  <style>
    :root { color-scheme: dark; }
    body {
      background:#0a0a0a;
      color:#f5f5f5;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      margin:0;
    }
    .wrap { max-width:1100px; margin:0 auto; padding:24px; }
    h1 { margin:0 0 8px; }
    .muted { color:#9fb3c8; }
    table { width:100%; border-collapse:collapse; margin-top:14px; }
    th,td { padding:10px 6px; border-bottom:1px solid #1c2533; font-size:.9rem; }
    th { text-align:left; color:#c9d6e5; }
    tr:hover { background:rgba(255,255,255,.03); }

    .pill {
      display:inline-block;
      background:#263142;
      border:1px solid #3a4a60;
      border-radius:999px;
      padding:.25rem .65rem;
      color:#dbeafe;
      text-decoration:none;
      font-size:.75rem;
    }

    /* XP belt bar */
    .belt-bar {
      position:relative;
      height:12px;
      background:#1b2330;
      border-radius:999px;
      overflow:hidden;
      min-width:160px;
    }
    .belt-fill {
      height:100%;
      width:0%;
      transition:width .3s ease;
    }

    .stripe-boxes {
      position:absolute;
      top:2px;
      right:4px;
      display:flex;
      gap:3px;
      height:8px;
    }
    .stripe-box {
      width:4px;
      height:8px;
      border-radius:2px;
      background:rgba(255,255,255,.12);
    }
    .stripe-box.white.filled { background:#000; }
    .stripe-box.black.filled,
    .stripe-box.filled { background:#ffd633; }

    .bonsai-chip {
      display:inline-block;
      width:20px;
      height:20px;
      border-radius:999px;
      border:1px solid #ffd63333;
      background:radial-gradient(circle, #ffd63344 0%, #0a0a0a 90%);
      margin-right:5px;
    }

    .name-col {
      display:flex;
      align-items:center;
      gap:8px;
    }
    .sub {
      display:block;
      font-size:.7rem;
      color:#7a8aa1;
    }
    /* roster xp bar */
.xp-lite {
  display:flex;
  flex-direction:column;
  gap:3px;
}
.xp-lite-track {
  position:relative;
  height:12px;
  border-radius:999px;
  overflow:hidden;
}
.xp-lite-fill {
  position:absolute;
  inset:0;
  border-radius:inherit;
  transition:width .25s ease-out;
}
.xp-lite-stripes {
  position:absolute;
  right:4px;
  top:2px;
  bottom:2px;
  display:flex;
  gap:3px;
}
.xp-lite-stripe {
  width:7px;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  opacity:.4;
}
.xp-lite-stripe.on {
  opacity:1;
}
.xp-lite-meta {
  font-size:.62rem;
  color:rgba(226,232,240,.6);
}
/* mini xp bar for roster/clipboard rows */
.mini-xp-bar {
  position: relative;
  width: 100%;
  height: 10px;          /* you can bump to 12 */
  border-radius: 999px;
  overflow: hidden;
  background: transparent;
}

.mini-xp-base {
  position: absolute;
  inset: 0;
  opacity: .25;          /* dim belt */
}

.mini-xp-fill {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  transition: width .2s ease-out;
  filter: brightness(1); /* brighter same color */
}

.mini-stripes {
  position: absolute;
  top: 1px;
  bottom: 1px;
  right: 3px;
  display: flex;
  gap: 2px;
  pointer-events: none;
}

.mini-stripe {
  width: 6px;
  border-radius: 999px;
  opacity: .35;
}

.mini-stripe.white {
  background: rgba(255,255,255,.9);
  border: 1px solid rgba(0,0,0,.35);
}

.mini-stripe.black {
  background: rgba(0,0,0,.9);
}

.mini-stripe.filled {
  opacity: 1;
}

  </style>
</head>
<body>
<main class="wrap">
  <nav class="top-nav">
    <a class="pill" href="/coaches/index.html">← Coach Index </a>
    <a class="pill" href="/coaches/coaches-daily-clipboard.html">Coach’s Clipboard</a>
    <a class="pill" href="/coaches/daily-grind.html">Daily Grind XP</a>
    <a class="pill" href="/coaches/coach-notes.html">Coach Notes</a>
  </nav>

  </nav>

  <h1>Team Roster</h1>
  <p class="muted">Live athletes from Firestore <code>athletes</code> collection</p>


  <table aria-label="Athlete roster">
    <thead>
      <tr>
        <th style="width:38%">Athlete</th>
        <th style="width:22%">Tier / Rank</th>
        <th style="width:25%">XP</th>
        <th style="width:15%"></th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="4" class="muted">Loading…</td></tr>
    </tbody>
  </table>
</main>

<script type="module">
  import { db, collection, getDocs, query, limit } from "/assets/js/firebase-init.js";
  import { renderBeltBar } from "/assets/js/ui-belt.js";
  import { renderMiniXpBar } from "/assets/js/xp-bar-mini.js";

  async function loadRoster(){
    const rowsEl = document.getElementById("rows");
    rowsEl.innerHTML = `<tr><td colspan="4" class="muted">Loading…</td></tr>`;

    const snap = await getDocs(query(collection(db,"athletes"), limit(300)));
    if (snap.empty) {
      rowsEl.innerHTML = `<tr><td colspan="4" class="muted">No athletes found.</td></tr>`;
      return;
    }

    let html = "";
    snap.forEach(docSnap => {
      const a   = docSnap.data();
      const uid = a.uid || docSnap.id;
      const virt = a.virtue || "—";
      const tier = a.tier || "T0";
const city = a.city || "Lompoc";
let team = a.team || "";
const loc = [a.city, a.state].filter(Boolean).join(", ");

// auto-format team name
if (team.toLowerCase().includes("lompoc") || team.toLowerCase().includes("strong")) {
  team = "Lompoc Academy of Wrestling";
}
      // build table row with an empty belt holder
html += `
  <tr>
    <td>
      <div class="name-col">
        <span class="bonsai-chip" title="Path 2 Legend"></span>
        <div>
          <div class="name-line">${a.publicName || a.fullName || "—"}</div>
          
          <div class="sub">${virt} · ${uid}</div>
          <div class="sub">${team}${loc ? " · " + loc : ""}</div>
          <div class="sub small-track">${a.track || a.trackCode || "—"}</div>
           
        </div>
      </div>
    </td>
    
    <td class="rank-col">
      ${tier} / ${a.rankName || "Apprentice"}
    </td>
    <td>
      <div id="belt-${uid}"></div>
    </td>
    
    <td>
      <a class="pill" href="/athletes/athlete-profile.html?id=${encodeURIComponent(uid)}">Profile</a>
    </td>
  </tr>
`;
    });

    // dump all rows at once
    rowsEl.innerHTML = html;

    // now paint the belts
    snap.forEach(docSnap => {
      const a   = docSnap.data();
      const uid = a.uid || docSnap.id;
      const holder = document.getElementById(`belt-${uid}`);
      if (!holder) return;

      renderBeltBar({
        container: holder,
        xp: a.xp ?? 0,
        trackCode: a.trackCode ?? a.track ?? "",
        tier: a.tier ?? "T0"
      });
    });
  }

  loadRoster();
</script>
</body>
</html>
