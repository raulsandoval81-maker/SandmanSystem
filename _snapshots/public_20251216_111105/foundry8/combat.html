<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sandman Combat — Entrance</title>
  <link rel="stylesheet" href="../assets/css/site.css"/>

  <style>
    body { background:#0b0f14; color:#eef3fb; }
    main { max-width: 980px; margin: 32px auto; padding: 0 18px; }
    .poster {
      position: relative;
      border: 10px solid #e9eef7; border-radius: 22px;
      background:
        radial-gradient(1200px 420px at -10% -20%, rgba(255,214,51,.22), transparent 70%),
        linear-gradient(180deg, #121923 0%, #0b0f14 100%);
      box-shadow: 0 18px 48px rgba(0,0,0,.5) inset, 0 24px 56px rgba(0,0,0,.35);
      padding: 44px 28px 32px; overflow: hidden; text-align:center;
    }
    .top-pill {
      position: absolute; top: -18px; left: 24px;
      background:#222b36; color:#ffd633; font-weight:700;
      border-radius:999px; padding:10px 16px; border:4px solid #e9eef7;
      box-shadow: 0 8px 20px rgba(0,0,0,.35);
    }
    h1 { font-size: 2.3rem; margin: 8px 0 10px; color:#ffd633; text-shadow: 0 2px 18px rgba(255,214,51,.25); }
    p.sub { color:#b7c4d6; margin-bottom: 22px; }
    .btn {
      display:inline-block; padding:12px 18px; border-radius:12px;
      background:#e53935; color:#fff; text-decoration:none; font-weight:800;
      box-shadow: 0 6px 16px rgba(0,0,0,.35);
    }
    .back { display:inline-block; margin-top:18px; color:#aeb9c9; text-decoration:underline; }
  </style>
</head>
<body>
  <div data-include="../assets/includes/header.html"></div>

  <main>
    <section class="poster">
      <div class="top-pill">Sandman Combat</div>
      <h1>Enter the Arena</h1>
      <p class="sub">Wrestling • Boxing • Kickboxing • Muay Thai • MMA</p>

      <!-- Single call-to-action leading to the full hub -->
      <a class="btn" href="./index.html">Enter Sandman Combat</a>

      <div>
        <a class="back" href="../index.html">← Back to Site</a>
      </div>
    </section>
  </main>

  <div data-include="../assets/includes/footer.html"></div>
  <script defer src="../assets/js/site.js"></script>
</body>
</html>
