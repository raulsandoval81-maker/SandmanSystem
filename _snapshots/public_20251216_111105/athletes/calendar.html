<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendar & Events • Athletes Corner</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
  <style>
    main { max-width: 980px; margin: 28px auto; padding: 0 18px; }
    .panel { background:#0f141b; color:#eef3fb; border-radius:16px; padding:18px; border:1px solid #283241; box-shadow:0 16px 36px rgba(0,0,0,.35); }
    h1 { color:#ffd633; margin:6px 0 16px; }
    .sub { color:#aeb9c9; margin-bottom:14px; }
    .card { background:#121a24; border:1px solid #263244; border-radius:12px; padding:14px; }
    .btn { display:inline-block; margin-top:10px; padding:10px 14px; border-radius:10px; background:#e53935; color:#fff; text-decoration:none; font-weight:700; }
    .back { display:inline-block; margin:14px 0; color:#aeb9c9; text-decoration:underline; }
  </style>
</head>
<body>
  <main>
    <a class="back" href="./athletes-corner.html">← Back to Athletes Corner</a>

    <section class="panel">
      <h1>Calendar & Events</h1>
      <p class="sub">Practice times, meets, and team events. (Shell)</p>

      <div class="card">
        <p>For now, this links to the coaches calendar (read-only). Later we’ll add athlete filters & RSVP.</p>
        <a class="btn" href="../coaches/calendar.html">Open Team Calendar</a>
      </div>

      <p id="status" class="sub" style="margin-top:14px;">Ready.</p>
    </section>
  </main>

  <script type="module" src="../assets/js/athletes-calendar.js"></script>
</body>
</html>
