<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sandman • Thanks</title>
  <meta name="description" content="Thanks for volunteering with Sandman.">
  <link rel="stylesheet" href="../assets/css/site.css" />
  <style>
    :root{ --red:#7a1111; --red-d:#8a1a1a; --gold:#ffd633; --ink:#0b0e13; --panel:#111318; --border:#1d2430; --wash:#f6f7f8; }
    body{ margin:0; background:var(--ink); color:#e5e7eb; font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Helvetica,Arial,sans-serif; }
    .wrap{ max-width:800px; margin:0 auto; padding:56px 16px; }
    .card{ background:var(--panel); border:1px solid var(--border); border-radius:18px; box-shadow:0 18px 36px rgba(0,0,0,.45); padding:28px 24px; text-align:center; }
    h1{ margin:0 0 8px; color:#fff; font-size:clamp(24px,5vw,40px); }
    p{ margin:0 0 16px; color:#cbd2dc; }
    .btn{ display:inline-block; padding:12px 20px; border-radius:999px; background:var(--red); color:#fce9e9; font-weight:700; text-decoration:none; border:1px solid var(--red-d); box-shadow:0 6px 16px rgba(0,0,0,.25); }
    .btn:hover{ filter:brightness(1.05); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Thanks for volunteering</h1>
      <p>We appreciate you. We’ll reach out with next steps after a quick review.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <a class="btn" href="../hq.html">Back to HQ</a>
        <a class="btn" href="../overview.html">Overview</a>
      </div>
    </div>
  </div>
</body>
</html>
