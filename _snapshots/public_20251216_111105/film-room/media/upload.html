<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>FilmRoom · Upload Video</title>

  <style>
    :root { color-scheme: dark; }
    body{
      margin:0;background:#05070c;color:#e5e7eb;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
    }
    .wrap{max-width:900px;margin:0 auto;padding:24px 16px 50px;}

    h1{margin:0 0 8px;color:#ffdd48;text-shadow:0 0 8px rgba(255,221,72,.25);}
    .muted{color:#9ca3af;font-size:.78rem;margin-bottom:18px;}

    .top-nav{display:flex;gap:10px;margin-bottom:16px;}
    .pill{
      background:#1a1d23;border:1px solid #2d3648;
      padding:6px 14px;border-radius:999px;color:#fff;
      font-weight:700;text-decoration:none;
      cursor:pointer;transition:.15s;
    }
    .pill:hover{background:#e63946;border-color:#e63946}

    .upload-box{
      background:#0b1017;border:1px solid #1f2937;
      border-radius:14px;padding:20px;margin-top:10px;
    }
    input[type=file]{
      display:block;margin-top:8px;background:#1a1d23;
      padding:10px;border-radius:8px;border:1px solid #2d3648;
      width:100%;color:#fff;
    }
    button{
      margin-top:14px;padding:10px 20px;
      background:#ffdd48;color:#000;font-weight:700;
      border-radius:10px;border:none;cursor:pointer;
      transition:.15s;
    }
    button:hover{filter:brightness(1.1);}
  </style>
</head>

<body>
<main class="wrap">

  <div class="top-nav">
    <a class="pill" href="../index.html">← Media</a>
    <a class="pill" href="../../video-vault/index.html">Video Vault</a>
  </div>

  <h1>Upload Video</h1>
  <p class="muted">Choose a file from your device and upload it to your FilmRoom Vault.</p>

  <div class="upload-box">
    <label for="fileInput">Select Video File:</label>
    <input type="file" id="fileInput" accept="video/*"/>

    <button id="btnUpload">Upload Video</button>
    <div id="status" class="muted" style="margin-top:10px"></div>
  </div>

</main>

<script type="module">
  document.getElementById("btnUpload").onclick = ()=>{
    const f = document.getElementById("fileInput").files[0];
    if (!f) return alert("Choose a file first.");
    document.getElementById("status").textContent = "Uploading... (placeholder)";
  };
</script>

</body>
</html>
