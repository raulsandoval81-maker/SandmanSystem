<!doctype html>

  <link rel="stylesheet" href="/athletes/arsenal/arsenal.css"/>

<body>
  <div class="wrap">
    <header class="header">
      <button class="back-btn" type="button" onclick="history.back()">← Back</button>

    <section class="lane-block">
      <div class="lane-name">Strength</div>
      <p class="lane-desc">
        Strength is an earned development lane. It unlocks through Combat progress.
      </p>

      <div class="chapter-grid">
        <a id="strength-preseason" class="chapter-tile" href="#">
          <span class="chapter-title">Preseason</span>
        </a>

        <a id="strength-inseason" class="chapter-tile locked" aria-disabled="true">
          <span class="chapter-title">In-Season 🔒</span>
        </a>

        <a id="strength-postseason" class="chapter-tile locked" aria-disabled="true">
          <span class="chapter-title">Postseason 🔒</span>
        </a>
      </div>
    </section>
  </div>

  <script type="module" src="/athletes/arsenal/strength/strength.app.js"></script>
