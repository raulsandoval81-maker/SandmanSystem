<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Launching Youth T0 Trainer</title>
</head>
<body>
  <p>Checking access...</p>

  <script type="module">
    import { db, doc, getDoc } from "/assets/js/firebase-init-para.js";

    const search = new URLSearchParams(window.location.search);
    const athleteId = search.get("id") || "";
    const mode = search.get("mode") || "coach";
    const pageTier = "T7";

    if (!athleteId) {
      document.body.innerHTML = "<p>Missing athlete id.</p>";
      throw new Error("Missing athlete id");
    }

    if (athleteId.startsWith("F4_")) {
      window.location.replace(`/athletes/arsenal/combat/teen/index.html?id=${encodeURIComponent(athleteId)}`);
      throw new Error("Wrong branch for F4 athlete");
    }

    async function guardAndLaunch() {
      try {
        const ref = doc(db, "athletes", athleteId);
        const snap = await getDoc(ref);

        if (!snap.exists()) {
          document.body.innerHTML = "<p>Athlete not found.</p>";
          return;
        }

        const athlete = snap.data();
        const actualTier = athlete.tier;

        if (actualTier !== pageTier) {
          window.location.replace(`/athletes/arsenal/combat/youth/index.html?id=${encodeURIComponent(athleteId)}`);
          return;
        }

        const timerParams = new URLSearchParams({
          track: "f8",
          tier: "t7",
          mode,
          id: athleteId
        });
        window.location.replace(`/lab/timer-engine/ui/athlete/sandman-timer-mobile.html?${launchParams.toString()}`);
      } catch (err) {
        console.error("Train guard error:", err);
        document.body.innerHTML = "<p>Unable to verify athlete access.</p>";
      }
    }

    guardAndLaunch();
  </script>
</body>
</html>
