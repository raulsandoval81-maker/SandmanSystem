<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Combat • Arsenal</title>
  <link rel="icon" href="data:," />

  <style>
    :root{
      --bg:#0a1833;
      --panel:#111c35;
      --line:#27304a;
      --gold:#ffdd48;
      --text:#f0f4f8;
      --muted:#9aa4b1;
    }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    .box{
      width:min(520px, calc(100% - 32px));
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      padding:22px 20px;
      text-align:center;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
    }

    h1{
      margin:0 0 10px;
      color:var(--gold);
      font-size:1.1rem;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    p{
      margin:0;
      color:var(--muted);
      line-height:1.45;
    }

    .actions{
      margin-top:16px;
      display:flex;
      justify-content:center;
    }

    .btn{
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-size:.92rem;
      border:1px solid var(--line);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      background:#1d2a4a;
      color:var(--text);
    }

    .btn:hover{
      border-color:var(--gold);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Combat</h1>
    <p id="status">Checking athlete path…</p>
    <div class="actions">
      <a class="btn" href="/athletes/arsenal/">Back</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const athleteId = params.get("id") || "";
    const statusEl = document.getElementById("status");

    if (!athleteId) {
      statusEl.textContent = "Missing athlete id.";
    } else if (athleteId.startsWith("F4_")) {
      window.location.replace(`/athletes/arsenal/combat/teen/index.html?id=${encodeURIComponent(athleteId)}`);
    } else if (athleteId.startsWith("F8_")) {
      window.location.replace(`/athletes/arsenal/combat/youth/index.html?id=${encodeURIComponent(athleteId)}`);
    } else {
      statusEl.textContent = "Unknown athlete type.";
    }
  </script>
</body>
</html>
