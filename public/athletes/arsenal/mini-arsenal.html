<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Youth Arsenal | Sandman System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/athletes/arsenal/mini-arsenal.css" />
  <link rel="icon" href="data:," />
</head>
<body>
  <main class="mini-arsenal-page">

    <header class="page-header card">
      <div class="page-header-top">
        <a id="homeBtn" class="btn btn-ghost" href="/athletes/hub/mini-hub.html">← Home</a>
      </div>

      <div class="page-header-main">
        <p class="eyebrow">Sandman Combat™</p>
        <h1>Foundry 8 Arsenal</h1>
        <p class="subtext" id="athleteLabel">Loading athlete...</p>
      </div>
    </header>

    <section class="arsenal-grid">
      <button class="arsenal-card card" id="combatCard" type="button" data-panel="combat">
        <div class="card-icon">🥋</div>
        <div class="card-copy">
          <h2>Combat</h2>
          <p>Skills, growth, and progress on the mat.</p>
        </div>
      </button>

      <button class="arsenal-card card" id="strengthCard" type="button" data-panel="strength">
        <div class="card-icon">💪</div>
        <div class="card-copy">
          <h2>Acts of Strength</h2>
          <p>Coach-recognized moments of effort, toughness, and discipline.</p>
        </div>
      </button>

      <button class="arsenal-card card" id="honorCard" type="button" data-panel="honor">
        <div class="card-icon">🛡️</div>
        <div class="card-copy">
          <h2>Acts of Honor</h2>
          <p>Coach-recognized moments of respect, character, and leadership.</p>
        </div>
      </button>
    </section>

    <section class="card badge-panel">
      <div class="badge-panel-header">
        <p class="eyebrow" id="panelEyebrow">Recognition</p>
        <h2 id="panelTitle">Mini Arsenal Board</h2>
        <p class="subtext" id="panelText">
          Select a card above to view progress, badges, or earned recognition.
        </p>
      </div>

      <div id="badgeWall" class="badge-wall">
        <div class="empty-state" id="emptyState">
          <p>No badges to show yet.</p>
        </div>
      </div>
    </section>

  </main>

  <script type="module" src="/athletes/arsenal/mini-arsenal.app.js"></script>
</body>
</html>
