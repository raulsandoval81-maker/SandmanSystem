<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Foundry 8 Leaderboard</title>
  <link rel="stylesheet" href="/athletes/leaderboard/leaderboard.css"/>
</head>

<body>

<header class="athlete-sub-header">
  <div class="sub-header-inner">
    <span class="brand">Sandman Combat System™</span>

    <div class="sub-nav">
      <a id="nav-home" href="#" class="sub-btn home">Home</a>
      <a href="/athletes/bulletin/index.html" class="sub-btn">Bulletin</a>
      <a href="/athletes/arsenal/index.html" class="sub-btn">Arsenal</a>
      <a href="/athletes/leaderboard/teen/index.html" class="sub-btn">Leaderboard</a>
    </div>
  </div>
</header>

<div class="wrap">

  <h1>Foundry 8 Leaderboard</h1>

  <div class="controls">
    
    <!-- public/private -->
    <select id="mode-toggle">
      <option value="private">Private</option>
      <option value="public">Public</option>
    </select>

    <!-- scope -->
    <select id="view-mode">
      <option value="overall">Overall</option>
      <option value="tier">Tier</option>
    </select>

    <!-- ranking -->
    <select id="rank-mode">
      <option value="progression">Progression</option>
      <option value="lifetime">Lifetime XP</option>
    </select>

  </div>

  <h2 id="board-title">Top 8</h2>
  <div id="top8-list"></div>

  <div id="private-zone-panel">
    <h3>Your Zone</h3>
    <div id="your-zone"></div>
  </div>

  <div id="next-target-panel">
    <h3>Next Target</h3>
    <div id="next-target"></div>
  </div>

</div>

<script>
  window.LEADERBOARD_TRACK = "foundry8";

  // 🔥 dynamic home link
  const params = new URLSearchParams(window.location.search);
  const id =
    params.get("athleteId") ||
    params.get("id") ||
    localStorage.getItem("currentAthleteId") ||
    "";

  const home = document.getElementById("nav-home");
  if (home && id) {
    home.href = `/athletes/hub/full-hub.html?id=${encodeURIComponent(id)}`;
  }
</script>

<script type="module" src="/athletes/leaderboard/leaderboard.app.js"></script>

</body>
</html>
