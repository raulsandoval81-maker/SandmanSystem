<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Strength • Lane</title>

  <link rel="stylesheet" href="/para/shared/comms.css" />
  <link rel="icon" href="data:," />

  <style>
    :root{
      --bg:#0a1833;
      --panel:#111c35;
      --deep:#0b1120;
      --line:#27304a;
      --gold:#ffdd48;
      --text:#f0f4f8;
      --muted:#9aa4b1;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    .wrap{
      max-width:820px;
      margin:0 auto;
      padding:24px 16px 72px;
    }

    .hero{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px 18px;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
      margin-bottom:14px;
      text-align:center;
    }

    .hero h1{
      margin:0;
      color:var(--gold);
      font-size:1.2rem;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .hero .sub{
      margin-top:6px;
      opacity:.75;
      font-size:.9rem;
      line-height:1.35;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
      box-shadow:0 4px 14px rgba(0,0,0,.25);
      margin-bottom:14px;
    }

    .lane-card{
      background:var(--deep);
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px;
    }

    .btn-row{
      display:flex;
      gap:10px;
      margin-top:12px;
    }

    .btn{
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-size:.92rem;
      border:none;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:.4rem;
      font-weight:800;
    }

    .btn-back{
      background:#1d2a4a;
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn-back:hover{
      border-color:var(--gold);
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header class="hero">
      <h1>Strength</h1>
      <div class="sub">Built in the shadows.</div>
    </header>

    <section class="panel">
      <div id="strength-session-container">
        <div style="opacity:.7;">Loading…</div>
      </div>
    </section>

    <div class="btn-row">
      <button id="backBtn" class="btn btn-back" type="button">Back</button>
    </div>

  </div>

  <script type="module" src="/athletes/lanes/strength/strength.js"></script>
</body>
</html>
