<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Announcements Archive</title>

<link rel="stylesheet" href="/communications/shared/comms.css">
<link rel="icon" href="data:,">

<style>
:root{
  --bg:#0a1833;
  --panel:#111c35;
  --line:#27304a;
  --gold:#ffdd48;
  --text:#f0f4f8;
  --muted:#9aa4b1;
  --deep:#0b1120;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

.wrap{
  max-width:900px;
  margin:0 auto;
  padding:24px 16px 40px;
}

.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px 18px;
  box-shadow:0 4px 14px rgba(0,0,0,.35);
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

h1{
  margin:0;
  color:var(--gold);
  font-size:1.2rem;
}

.sub{
  margin:6px 0 0;
  color:var(--muted);
  line-height:1.45;
}

.btn-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  padding:10px 14px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--deep);
  color:var(--text);
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  cursor:pointer;
}

.btn:hover{
  border-color:var(--gold);
  color:var(--gold);
}

.status{
  min-height:20px;
  margin:8px 0 4px;
  color:var(--gold);
  font-size:.9rem;
  font-weight:700;
}

.empty{
  opacity:.75;
  text-align:center;
  padding:18px;
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="top">
        <div>
          <h1>Announcements Archive</h1>
          <p class="sub">Past team announcements kept for reference.</p>
        </div>

        <div class="btn-row">
          <a class="btn" href="/athletes/bulletin/index.html">← Bulletin Home</a>
          <a class="btn" href="/athletes/bulletin/announcements.html">Active Announcements</a>
        </div>
      </div>

      <div id="status" class="status"></div>
      <div id="feed"></div>
      <div id="empty" class="empty" style="display:none;">No archived announcements yet.</div>
    </div>
  </div>

  <script type="module" src="/athletes/bulletin/archive.js"></script>
</body>
</html>
