<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Athlete · Mini Profile</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>

  <link rel="stylesheet" href="/athletes/profile/profile.css"/>
  <link rel="stylesheet" href="/athletes/profile/mini-profile.css"/>
  <link rel="icon" href="data:,">

  <style>
    .mini-progress-label{
      margin-top:.45rem;
      font-weight:800;
      color:var(--text, #fff);
    }

    .rank-box .belt-track{
      position:relative;
      height:30px;
      width:100%;
      border-radius:999px;
      background:rgba(255,255,255,.09);
      overflow:hidden;
      margin-top:8px;
    }

    .rank-box .belt-fill{
      position:absolute;
      inset:0 auto 0 0;
      height:100%;
      width:0;
      border-radius:inherit;
      z-index:1;
    }

    .rank-stats{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-top:6px;
      font-weight:800;
      color:var(--text, #fff);
    }

    /* mini profile only */
    .rank-box .belt-track .stripe-bars{
      position:absolute;
      inset:0;
      display:flex;
      justify-content:flex-start;
      align-items:stretch;
      gap:14px;
      padding-left:18px;
      pointer-events:none;
      z-index:6;
    }

    .rank-box .belt-track .stripe-bar{
      width:14px;
      height:100%;
    }
  </style>
</head>
<header class="athlete-sub-header">
  <div class="sub-header-inner">
    <span class="brand">Sandman Combat™</span>

    <div class="sub-nav">
      <a id="homeLink" href="/athletes/hub/mini-hub.html" class="sub-btn home">Home</a>
    </div>
  </div>
</header>

<body>
  <main class="wrap">
    <header class="profile-header"></header>

    <section id="combatLane" class="card">
      <div class="row" style="margin-bottom:8px">
        <div class="stat" style="flex:1 1 100%">
          <div class="combat-header">
                      <span id="combatArcTitle" class="title">⚔️ Combat · Zero 2 Hero</span>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="stat identity-box" style="flex:1 1 100%">
          <div class="avatar-badge">
            <div id="ath-avatar" class="avatar-box"></div>

            <img
              id="ath-badge"
              class="tier-badge"
              src="/assets/images/logos/Shadow-badge.png"
              alt="Current Tier Badge"
              loading="lazy"
              decoding="async"
            />
          </div>
        </div>

        <div class="stat" style="flex:1 1 100%">
          <div class="label">Name</div>
          <div class="value" id="out-name">—</div>
        </div>
      </div>

      <div class="row">
        <div class="stat">
          <div class="label">Team · Sandman Combat</div>
          <div class="value" id="out-team">—</div>
        </div>

        <div class="stat">
          <div class="label">City · State</div>
          <div class="value" id="out-citystate">—</div>
        </div>

        <div class="stat rank-box">
          <div class="label">Color · Rank</div>
          <div class="value" id="out-rank">—</div>

          <div id="rankBar" class="belt-track">
            <div id="rankFill" class="belt-fill"></div>
          </div>

          <div class="rank-stats">
            <span id="stripeText">Stripes: 0/4</span>
            <span id="percentText">0%</span>
          </div>

          <div id="progressLabel" class="mini-progress-label">Just getting started</div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/athletes/profile/mini-profile.js"></script>
</body>
</html>
