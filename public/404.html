<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 — Page Not Found</title>

<style>
body{
  margin:0;
  background:#7a0000;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

.box{
  background:rgba(0,0,0,.45);
  border:1px solid rgba(255,255,255,.25);
  border-radius:14px;
  padding:2rem 1.75rem;
  max-width:420px;
  box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
  margin:0 0 .5rem;
  font-size:2rem;
  font-weight:800;
}

p{
  margin:.9rem 0;
  line-height:1.6;
  font-weight:300;
}

.btn{
  display:inline-block;
  margin-top:1.3rem;
  padding:.6rem 1.2rem;
  background:#fff;
  color:#7a0000;
  font-weight:700;
  border-radius:8px;
  text-decoration:none;
}

.sub{
  margin-top:1rem;
  font-size:.85rem;
  opacity:.8;
}
</style>
</head>

<body>

<div class="box">
  <h1>404</h1>

  <p>
  Page not found.<br>
  La página no fue encontrada.
  </p>

  <a class="btn" href="/">Go Home</a>

  <div class="sub">
  If this came from a QR code, try scanning again.
  </div>
</div>

</body>
</html>
