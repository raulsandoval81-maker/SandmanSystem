<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Vault | Sandman Film Room</title>
  <style>
    :root{--bg:#05070c;--panel:#0b1017;--border:#1b2330;--brand:#ffdd48;--text:#f1f5f9;--muted:#94a3b8;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui;}
    .wrap{max-width:1100px;margin:0 auto;padding:36px 20px 60px;}
    h1,h2{color:var(--brand);}
    .subtitle{color:var(--muted);margin-bottom:30px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:22px;}
    .card{background:var(--panel);border:1px solid var(--border);padding:20px;border-radius:14px;text-decoration:none;color:var(--text);}
    .card:hover{border-color:var(--brand);}
    .card h2{margin:0 0 4px;}
  </style>
</head>

<body>
  <main class="wrap">

    <h1>Video Vault</h1>
    <div class="subtitle">Final cuts · Highlights · Match archives</div>

    <section class="grid">

      <a class="card" href="analysis.html">
        <h2>Match Analysis</h2>
        <p>Breakdowns · timestamps · technique notes.</p>
      </a>

      <a class="card" href="highlights.html">
        <h2>Highlights</h2>
        <p>Team & athlete highlight reels.</p>
      </a>

      <a class="card" href="match.html">
        <h2>Match Archive</h2>
        <p>Raw matches · sorted by athlete.</p>
      </a>

    </section>
  </main>
</body>
</html>
