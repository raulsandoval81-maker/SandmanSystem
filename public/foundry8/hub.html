<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Foundry 8 Combat Hub | Sandman System™</title>
  <link rel="stylesheet" href="../assets/css/site.css" />
  <style>
    body {
      background: linear-gradient(to bottom, #0f141b 0%, #1a1f29 100%);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 80px 20px;
    }

    .logo-text {
      font-size: 2.5rem;
      font-weight: 900;
      color: #FFD700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .subtitle {
      font-size: 1.2rem;
      margin-top: 12px;
      color: #9ca3af;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .enter-btn {
      margin-top: 36px;
      background-color: #ef4444;
      color: white;
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(239, 68, 68, 0.4);
      transition: transform 0.2s ease;
    }

    .enter-btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="logo-text">Sandman System</div>
  <div class="subtitle">
    Combat Programs<br>
    Wrestling, Boxing, Kickboxing, MMA, Submission Grappling & more.<br>
    <em>Enter the Foundry. Earn your stripes. Carry it with honor.</em>
  </div>

  <a href="index.html">
    <button class="enter-btn">Enter Combat Tools</button>
  </a>

</body>
</html>
