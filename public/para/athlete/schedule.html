<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schedule</title>

  <link rel="stylesheet" href="/para/shared/comms.css">
  <link rel="icon" href="data:,">

  <style>
    :root{
      --bg:#0a1833;
      --panel:#111c35;
      --deep:#0b1120;
      --line:#27304a;
      --gold:#ffdd48;
      --text:#f0f4f8;
      --muted:#9aa4b1;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:24px 16px 40px;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px 18px;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
      margin-bottom:16px;
    }

    h1,h2{
      margin:0 0 10px;
      color:var(--gold);
    }

    .sub{
      color:var(--muted);
      margin-bottom:10px;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .item{
      background:var(--deep);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .item-day{
      color:var(--gold);
      font-weight:900;
    }

    .item-time{
      color:var(--muted);
      font-weight:700;
    }

    .item-title{
      font-weight:800;
      margin-top:4px;
    }

    .item-sub{
      color:var(--muted);
      margin-top:4px;
      font-size:.9rem;
    }

    .live{
      color:#ff4d4d;
      font-weight:900;
      margin-top:4px;
    }
  </style>
</head>

<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="panel">
          <div class="top">
        <a class="btn" href="/athletes/bulletin/index.html">← Bulletin</a>
      </div>

    <h1>Schedule</h1>
    <p class="sub">Know what’s on deck.</p>
    
  </div>

  <!-- TODAY -->
  <div class="panel">
    <h2>Today’s Practice</h2>
    <div id="today-box">
      <p class="sub">Loading today...</p>
    </div>
  </div>

  <!-- WEEKLY -->
  <div class="panel">
    <h2>Weekly Practice</h2>
    <div id="daily-schedule" class="list"></div>
  </div>

  <!-- EVENTS -->
  <div class="panel">
    <h2>Upcoming Events</h2>
    <div id="tournament-schedule" class="list"></div>
  </div>

</div>

<script type="module" src="/para/athlete/schedule-feed.js"></script>
</body>
</html>
