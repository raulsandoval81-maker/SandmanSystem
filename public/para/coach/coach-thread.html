<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Coach Thread • Para-Comms</title>

  <link rel="stylesheet" href="/para/shared/comms.css" />
  <link rel="icon" href="data:," />

  <style>
    :root{
      --bg:#0a1833;
      --panel:#111c35;
      --deep:#0b1120;
      --line:#27304a;
      --gold:#ffdd48;
      --text:#f0f4f8;
      --muted:#9aa4b1;
      --danger:#ef4444;
      --hover:#1d2a4a;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:20px 14px 40px;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px 18px;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
      margin-bottom:16px;
    }

    .pc-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      flex-wrap:wrap;
    }

    .pc-title{
      font-size:1.25rem;
      font-weight:900;
      color:var(--gold);
      letter-spacing:.02em;
      margin:0 0 4px;
    }

    .pc-subtitle{
      color:var(--muted);
      font-size:.94rem;
    }

    .pc-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      padding:10px 14px;
      border-radius:10px;
      border:1px solid var(--line);
      background:var(--deep);
      color:var(--text);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      cursor:pointer;
      min-height:42px;
    }

    .btn:hover{
      border-color:var(--gold);
      color:var(--gold);
      background:var(--hover);
    }

    .btn-primary{
      background:#13213f;
    }

    .btn-secondary{
      background:var(--deep);
    }

    .btn-danger{
      border-color:#5b1f1f;
      color:#fecaca;
    }

    .btn-danger:hover{
      border-color:var(--danger);
      color:#fff;
    }

    .pc-muted{
      color:var(--muted);
      font-size:.9rem;
      font-weight:700;
      margin-bottom:10px;
    }

    .thread-shell{
      display:grid;
      gap:10px;
    }

    .thread-scroll{
      min-height:320px;
      max-height:62vh;
      overflow:auto;
      padding:10px;
      border:1px solid var(--line);
      border-radius:12px;
      background:var(--deep);
    }

    .thread-bubbles{
      display:grid;
      gap:10px;
    }

    .msg{
      max-width:86%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      background:#0f172a;
      box-shadow:0 3px 10px rgba(0,0,0,.18);
    }

    .msg.parent{
      justify-self:start;
      background:#10192d;
    }

    .msg.coach{
      justify-self:end;
      background:#16233d;
      border-color:#3b4d73;
    }

    .msg-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:6px;
    }

    .msg-from{
      font-weight:900;
      color:var(--gold);
      font-size:.92rem;
    }

    .msg-time{
      color:var(--muted);
      font-size:.8rem;
      font-weight:700;
    }

    .msg-body{
      white-space:pre-wrap;
      line-height:1.45;
      color:var(--text);
    }

    .thread-empty{
      color:var(--muted);
      font-style:italic;
      padding:8px 2px;
    }

    .qr-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:center;
    }

    .qr-select,
    textarea{
      width:100%;
      border-radius:10px;
      border:1px solid var(--line);
      background:#0f172a;
      color:var(--text);
      padding:10px 12px;
      font:inherit;
      outline:none;
    }

    .qr-select:focus,
    textarea:focus{
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(255,221,72,.16);
    }

    .pc-label{
      display:block;
      margin-bottom:8px;
      color:var(--muted);
      font-size:.88rem;
      font-weight:800;
      letter-spacing:.02em;
    }

    textarea{
      min-height:140px;
      resize:vertical;
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .reply-note{
      margin-top:10px;
      color:var(--muted);
      font-size:.88rem;
    }

    @media (max-width:700px){
      .qr-row{
        grid-template-columns:1fr;
      }

      .msg{
        max-width:100%;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header class="panel pc-header">
      <div>
        <div class="pc-title">Coach Thread</div>
        <div class="pc-subtitle">Unified parent communication thread</div>
      </div>

      <div class="pc-actions">
        <button id="btn-archive" class="btn btn-secondary" type="button">Archive</button>
        <button id="btn-delete" class="btn btn-danger" type="button">Delete</button>
        <a class="btn btn-secondary" href="/para/coach/hub.html">Back</a>
      </div>
    </header>

    <section class="panel">
      <div class="pc-muted">Conversation</div>

      <div class="thread-shell">
        <div id="thread-container" class="thread-scroll thread-bubbles">
          <div class="thread-empty">Loading thread…</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="pc-muted">Quick Reply (optional)</div>

      <div class="qr-row">
        <select id="qr-select" class="qr-select">
          <option value="">Select a quick response…</option>

          <option value="Got it. Thank you for the update. I’ll follow up shortly.">
            Got it. Thank you for the update. I’ll follow up shortly.
          </option>

          <option value="Thanks for reaching out. Please send a couple dates and times that work for a quick call.">
            Thanks for reaching out. Please send a couple dates and times that work for a quick call.
          </option>

          <option value="I want to make sure I understand correctly. What day and time did this happen?">
            I want to make sure I understand correctly. What day and time did this happen?
          </option>

          <option value="I received your message. I’ll handle this and circle back if needed.">
            I received your message. I’ll handle this and circle back if needed.
          </option>

          <option value="Let’s bring this up at practice so we can address it in person and move forward clearly.">
            Let’s bring this up at practice so we can address it in person and move forward clearly.
          </option>
        </select>

        <button id="qr-insert" class="btn btn-primary" type="button">Insert</button>
      </div>
    </section>

    <section class="panel">
      <label class="pc-label" for="reply-body">Reply</label>
      <textarea id="reply-body" rows="5" placeholder="Write your reply here..."></textarea>

      <div class="btn-row">
        <button id="btn-send-reply" class="btn btn-primary" type="button" style="flex:1;">Send Reply</button>
      </div>

      <div class="reply-note">
        Reply sends into the unified parent thread and should stay clear, direct, and coach-level.
      </div>
    </section>

  </div>

  <script type="module" src="/para/coach/coach-thread.js"></script>
</body>
</html>
