<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Coach · Daily Grind XP</title>

<style>
  :root { color-scheme: dark; }

  body{
    background:#090b0f;
    color:#f5f5f5;
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  }

  .wrap{
    max-width:1200px;
    margin:0 auto;
    padding:20px 16px 38px;
  }

  .top-nav{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:14px;
  }

  .pill{
    background:#151a22;
    border:1px solid #252c38;
    color:#fff;
    text-decoration:none;
    font-weight:600;
    padding:6px 12px;
    border-radius:999px;
    transition:.15s;
  }
  .pill:hover{ background:#ffd633; color:#111; border-color:#ffd633; }

  h1{
    margin:4px 0 2px;
    font-size:1.4rem;
    font-weight:800;
    color:#ffd633;
    letter-spacing:.01em;
  }

  .muted{ color:#94a3b8; }

  .creed{
    background:linear-gradient(90deg, rgba(255,214,51,.12), rgba(9,11,15,0));
    border:1px solid rgba(255,214,51,.08);
    border-radius:10px;
    padding:6px 10px 7px;
    margin-bottom:12px;
    line-height:1.25;
  }
  .creed-top{ font-weight:600; color:#e2e8f0; font-size:.78rem; }

  .card{
    background:#0c1017;
    border:1px solid #1d2430;
    border-radius:14px;
    padding:14px 14px 12px;
    box-shadow:0 20px 35px rgba(0,0,0,.25);
  }

  /* Sticky actions bar */
  .actions-bar{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
    margin-top:8px;

    position:sticky;
    top:10px;
    z-index:50;

    backdrop-filter: blur(10px);
    background: rgba(8,10,14,.72);
    border: 1px solid rgba(255,255,255,.06);
    border-radius:10px;
    padding:6px 8px;
  }

  .input{
    background:#0a0d12;
    border:1px solid #252c38;
    border-radius:9px;
    padding:6px 10px;
    color:#fff;
    min-width:180px;
  }

  .btn{
    border:0;
    border-radius:999px;
    padding:6px 13px;
    font-weight:700;
    cursor:pointer;
    transition:.15s;
    font-size:.74rem;
    letter-spacing:.02em;
  }

  .btn-ghost{
    background:transparent;
    border:1px solid #2a3240;
    color:#fff;
  }

  .btn-full{
    background:#dc2626;
    color:#fef2f2;
    border: 1px solid rgba(255,255,255,.10);
  }
  .btn-part{
    background:#facc15;
    color:#111;
    border: 1px solid rgba(255,255,255,.10);
  }

  .btn-full:hover,
  .btn-part:hover{
    filter: brightness(1.05);
    transform: translateY(-1px);
  }

  .btn:disabled{
    opacity:.45;
    cursor:not-allowed;
    transform:none;
  }

  .session-bar{
    margin-top:10px;
    background:rgba(15,19,26,.6);
    border:1px solid rgba(255,214,51,.03);
    border-radius:10px;
    padding:5px 8px;
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    font-size:.68rem;
  }
  .session-pill{ color:#e2e8f0; }

  table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    border: 1px solid rgba(255,255,255,.06);
    border-radius:10px;
    overflow:hidden;
  }

  th, td{
    padding:6px 6px;
    border-bottom:1px solid rgba(255,255,255,.02);
    font-size:.78rem;
    vertical-align:middle;
  }

  th{
    text-align:left;
    font-size:.65rem;
    color:#cbd5f5;
    text-transform:uppercase;
    letter-spacing:.08em;

    position:sticky;
    top:62px; /* sits under actions-bar */
    z-index:40;
    background: rgba(8,10,14,.92);
    border-bottom: 1px solid rgba(255,255,255,.06);
  }

  tbody tr:nth-child(even){ background: rgba(255,255,255,.02); }
  tbody tr:hover{ background: rgba(255,214,51,.055); }

  .ath-name{ font-weight:600; }
  .sub{ font-size:.65rem; color:#94a3b8; }

  /* Make pick column easier to hit */
  .pick{
    transform: scale(1.15);
    accent-color: #facc15;
  }

  /* ===== Belt Bar ===== */
  .row-xp-track{
    position:relative;
    height:14px;
    padding:0;
    border-radius:999px;
    overflow:hidden;

    background: rgba(255,255,255,.14);
    border: 1px solid rgba(255,255,255,.10);

    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.06),
      inset 0 -2px 6px rgba(0,0,0,.18);
  }

  .row-xp-track::before{
    content:"";
    position:absolute;
    inset:0;
    background: var(--tierTint, rgba(255,255,255,.10));
    opacity:1;
    pointer-events:none;
    z-index:0;
  }

  .row-xp-fill{
    position:absolute;
    left:0; top:0; bottom:0;
    width:0%;
    transition: width .25s ease-out;
    z-index:1;

    filter: brightness(calc(0.95 + (var(--pct, 0) / 100) * 0.85));
    box-shadow: 0 0 calc((var(--pct, 0) * 0.10) * 1px) rgba(255,255,255,.55);
  }

  /* ===== Stripes: tight “fire” cluster on the left, earned only ===== */
  .row-stripes{
    position:absolute;
    top:0;
    bottom:0;
    left:12px;          /* cluster offset */
    z-index:3;
    pointer-events:none;

    display:flex;
    gap:2px;
    align-items:stretch;
    width:fit-content;
    height:100%;
  }

  .row-stripe{
    width:10px;          /* stripe thickness */
    height:100%;
    border-radius:0;
    display:none;        /* no ghosts */
  }

  .row-stripe.on{
    display:block;
    background: var(--stripeColor, #fff);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.20),
      0 0 10px rgba(255,255,255,.14);
  }

  .row-xp-meta{
    font-size:.62rem;
    margin-top:2px;
    color: rgba(226,232,240,.78);
  }

  .xp-sub{
    font-size:12px;
    opacity:.75;
    letter-spacing:.2px;
    line-height:1.1;
    margin-top:4px;
  }

  #status{
    margin-top:10px;
    padding:8px 10px;
    border-radius:10px;
    background: rgba(0,0,0,.18);
    border: 1px solid rgba(255,255,255,.06);
    font-size:.7rem;
  }

  @media (max-width:700px){
    th:nth-child(3), td:nth-child(3){ display:none; }
    .session-bar{ flex-direction:column; }
  }
</style>
</head>

<body>
<main class="wrap">
  <nav class="top-nav">
    <a class="pill" href="/coaches/roster.html">Team Roster</a>
    <a class="pill" href="/coaches/coaches-daily-clipboard.html">Coach’s Clipboard</a>
  </nav>

  <h1>Daily Grind XP</h1>
  <div class="creed">
    <div class="creed-top">You can’t do part-time work and expect full-time results. The mat never lies.</div>
  </div>

  <p class="muted" style="margin-bottom:10px">
    Pick Athlete / Tier Rank · Award Skill points
  </p>
        <tr>
          <th style="width:6%">Pick</th>
          <th style="width:36%">Athlete</th>
          <th style="width:24%">Tier / Track</th>
          <th style="width:34%">XP</th>
        </tr>
      </thead>

  <section class="card">
    <div class="actions-bar">
      <input id="search" class="input" placeholder="Search by name or UID…"/>
      <button id="pickAll" class="btn btn-ghost">Select all</button>
      <button id="clearAll" class="btn btn-ghost">Clear</button>
      <button id="fullAll" class="btn btn-full">+10 Full-Time Grind</button>
      <button id="partAll" class="btn btn-part">+5 Part-Time Grind</button>
    </div>

    <div id="sessionBar" class="session-bar" style="display:none">
      <span class="session-pill" id="sb-loaded">Loaded: 0</span>
      <span class="session-pill" id="sb-awarded">Awarded this session: 0</span>
      <span class="session-pill" id="sb-xp">XP issued: 0</span>
    </div>

<table>
  <thead>
    <tr>
      <th style="width:6%">Pick</th>
      <th style="width:36%">Athlete</th>
      <th style="width:24%">Tier / Track</th>
      <th style="width:34%">XP</th>
    </tr>
  </thead>
  <tbody id="rows">
    ...
  </tbody>
</table>

    <p id="status" class="muted">Ready.</p>
  </section>
</main>

<script type="module">
import { db, collection, getDocs } from "/assets/js/firebase-init.js";
import { attendanceFull, attendancePart } from "/assets/js/xp-api.js";
import { applyXpResultToAthleteRow } from "/assets/js/xp-ui.js";



  // Same tier palette used elsewhere
  const TIER_COLORS = {
    shadow:    "#ffffff",
    recruit:   "#facc15",
    combatant: "#fb923c",
    competitor:"#22c55e",
    warrior:   "#3b82f6",
    champion:  "#a855f7",
    commander: "#92400e",
    hero:      "#000000",
    apprentice:"#ffffff",   // F4 R0
    veteran:   "#92400e",
    legend:    "#000000"
  };

  function colorForTierName(name=""){
    const k = String(name || "").toLowerCase();
    return TIER_COLORS[k] || "#ef4444";
  }

  function hexToRgba(hex, a=0.12){
    if (!hex) return `rgba(255,255,255,${a})`;
    const h = hex.replace("#","").trim();
    const full = h.length === 3 ? h.split("").map(c=>c+c).join("") : h;
    const n = parseInt(full, 16);
    const r = (n >> 16) & 255;
    const g = (n >> 8) & 255;
    const b = n & 255;
    return `rgba(${r},${g},${b},${a})`;
  }

  // F4 simple stripes: 1200 cap, 4 stripes
  function computeStripes(xp, cap=1200, total=4){
    const safeCap = cap > 0 ? cap : 1200;
    const pct = (Number(xp) || 0) / safeCap;
    const earned = Math.max(0, Math.min(total, Math.floor(pct * total)));
    return { earned, total };
  }

  function isWhiteBelt(a){
    const rn = String(a.rankName || a.tierName || a.tier || "").toLowerCase();
    const t  = String(a.tier || "").toUpperCase();
    return rn === "apprentice" || rn === "shadow" || rn === "foundation" || t === "T0";
  }

  function stripeToneHex(a){
    // black on white belt, white otherwise
    return isWhiteBelt(a) ? "#000" : "#fff";
  }

  function buildStripesOverlay(earned, total){
    // Earned-only stripes, evenly spaced across belt (25/50/75/100)
    // When earned=1, only the 25% cut shows, etc.
    const positions = [];
    for (let i = 1; i <= total; i++){
      positions.push(Math.round((i / total) * 100)); // 25,50,75,100
    }
    return positions.map((leftPct, idx) => {
      const on = (idx + 1) <= earned;
      return `<span class="row-stripe ${on ? "on" : ""}" style="left:${leftPct}%"></span>`;
    }).join("");
  }

  const rowsEl     = document.getElementById("rows");
  const statusEl   = document.getElementById("status");
  const searchEl   = document.getElementById("search");
  const pickAllEl  = document.getElementById("pickAll");
  const clearAllEl = document.getElementById("clearAll");
  const fullAllEl  = document.getElementById("fullAll");
  const partAllEl  = document.getElementById("partAll");

  const sessionBar = document.getElementById("sessionBar");
  const sbLoaded   = document.getElementById("sb-loaded");
  const sbAwarded  = document.getElementById("sb-awarded");
  const sbXP       = document.getElementById("sb-xp");

  let roster = [];
  let filtered = [];
  let awardedCount = 0;
  let awardedXP = 0;

  function updateSessionBar(){
    if (!filtered.length){
      sessionBar.style.display = "none";
      return;
    }
    sessionBar.style.display = "flex";
    sbLoaded.textContent  = `Loaded: ${filtered.length}`;
    sbAwarded.textContent = `Awarded this session: ${awardedCount}`;
    sbXP.textContent      = `XP issued: ${awardedXP}`;
  }

  function render(list){
    if (!list.length){
      rowsEl.innerHTML = `<tr><td colspan="4" class="muted">No athletes match.</td></tr>`;
      updateSessionBar();
      return;
    }

    rowsEl.innerHTML = list.map(a => {
      const uid   = a.uid || a.id;
      const name  = a.publicName || a.fullName || uid;
      const track = a.track || a.trackCode || "—";
      const tier  = a.rankName || a.tierName || a.tier || "Apprentice";
      const xp    = a.xp ?? 0;
      const cap   = a.xpCap ?? 1200;

      const pct   = Math.min(100, Math.round((xp / cap) * 100));
      const col   = colorForTierName(tier);

const stripes = computeStripes(xp, cap, 4);
const stripeColor = isWhiteBelt(a) ? "#000" : "#fff";

// positions for 4 stripes (25/50/75/100)
const stripePos = ["25%","50%","75%","100%"];

return `
<tr data-id="${a.id}">
  <td><input type="checkbox" class="pick" data-id="${a.id}"/></td>

  <td>
    <div class="ath-name">${name}</div>
    <div class="sub">${uid}</div>
  </td>

  <td>${tier} / ${track}</td>

  <td>
    <div class="row-xp-track"
         style="--tierTint:${hexToRgba(col, 0.12)}; --stripeColor:${stripeColor};"
         aria-label="${xp} of ${cap}">
      <div class="row-xp-fill"
           style="width:${pct}%; background:${col}; --pct:${pct};"></div>

      <!-- ✅ STRIPES INSIDE BELT (earned only) -->
      <div class="row-stripes">
        ${stripePos.map((left, i) => {
          const on = i < stripes.earned;             // earned-only
          return on
            ? `<span class="row-stripe on" style="left:${left};"></span>`
            : ``;                                     // no ghost, nothing rendered
        }).join("")}
      </div>
    </div>

    <div class="row-xp-meta">${xp} / ${cap}</div>
    <div class="xp-sub">Stripes: ${stripes.earned}/${stripes.total}</div>
  </td>
</tr>
`;
    }).join("");

    updateSessionBar();
  }

  async function load(){
    try {
      statusEl.textContent = "Loading athletes…";
      const snap = await getDocs(collection(db, "athletes"));
      roster = snap.docs.map(d => ({ id:d.id, ...d.data() }));

      filtered = roster
        .slice()
        .sort((a,b)=>(String(a.publicName||a.fullName||"")).localeCompare(String(b.publicName||b.fullName||"")));

      render(filtered);
      statusEl.textContent = `${filtered.length} athletes loaded.`;
    } catch (err) {
      console.error(err);
      statusEl.textContent = "Failed to load athletes (see console).";
    }
  }

  function getSelectedIds(){
    return Array.from(document.querySelectorAll(".pick:checked")).map(c=>c.dataset.id);
  }

async function giveToOne(id, amount){
  const a = roster.find(x => x.id === id);
  if (!a) return;

  const uid = a.uid || a.id;
  statusEl.textContent = "Saving…";

  try {
    // xp-api wrappers return DATA directly
    const data = (amount === 10)
      ? await attendanceFull(uid, "Full-Time Grind")
      : await attendancePart(uid, "Part-Time Grind");

    // respect explicit ok=false if returned
    if (data?.ok === false) {
      statusEl.textContent = data?.error || "No XP added.";
      statusEl.style.color = "#fda4af";
      setTimeout(()=>statusEl.style.color="", 1800);
      return;
    }

    // apply server truth to athlete object
    applyXpResultToAthleteRow(a, data);

    // server-truth numbers for UI
    const cap = Number(a.xpCap ?? data?.cap ?? 1200);
    const xp  = Number(a.xp ?? data?.afterXp ?? 0);
    const pct = cap > 0 ? Math.min(100, Math.round((xp / cap) * 100)) : 0;

    // update that row
    const row = rowsEl.querySelector(`tr[data-id="${id}"]`);
    if (row) {
      const tier = a.rankName || a.tierName || a.tier || "Apprentice";
      const col  = colorForTierName(tier);

      const trackEl = row.querySelector(".row-xp-track");
      const fill = row.querySelector(".row-xp-fill");
      const meta = row.querySelector(".row-xp-meta");
      const sub  = row.querySelector(".xp-sub");
      const stripesWrap = row.querySelector(".row-stripes");

      if (trackEl) {
        trackEl.style.setProperty("--tierTint", hexToRgba(col, 0.12));
        trackEl.style.setProperty("--stripeColor", stripeToneHex(a));
      }

      if (fill) {
        fill.style.width = pct + "%";
        fill.style.background = col;
        fill.style.setProperty("--pct", pct);
      }

      if (meta) meta.textContent = `${xp} / ${cap}`;

      const stripes = computeStripes(xp, cap, 4);
      if (sub) sub.textContent = `Stripes: ${stripes.earned}/${stripes.total}`;
      if (stripesWrap) stripesWrap.innerHTML = buildStripesOverlay(stripes.earned, stripes.total);
    }

    // blocked → do not count as awarded
    if (data?.blocked) {
      statusEl.textContent = `BLOCKED: ${data?.reason || "CAP"}`;
      statusEl.style.color = "#fbbf24";
      setTimeout(()=>statusEl.style.color="", 1800);
      return;
    }

    // count awarded using server delta when present
    const delta = Number(data?.delta ?? amount);
    awardedCount += 1;
    awardedXP    += delta;
    updateSessionBar();

    statusEl.textContent = `+${delta} XP to ${uid}.`;
    statusEl.style.color = "#bef264";
    setTimeout(()=>statusEl.style.color="", 1800);

  } catch (err) {
    console.error(err);
    statusEl.textContent = "Save failed for " + uid;
    statusEl.style.color = "#fda4af";
    setTimeout(()=>statusEl.style.color="", 1800);
  }
}

  async function bulkGive(amount, label){
    const ids = getSelectedIds();
    if (!ids.length){
      statusEl.textContent = "No athletes selected.";
      return;
    }
    statusEl.textContent = `Saving ${label} for ${ids.length}…`;
    for (const id of ids){
      await giveToOne(id, amount);
    }
    statusEl.textContent = `Saved ${label} for ${ids.length}.`;
  }

  // wiring
  searchEl.addEventListener("input", ()=>{
    const q = searchEl.value.toLowerCase().trim();
    filtered = !q ? roster : roster.filter(a=>{
      return (String(a.publicName||a.fullName||"")).toLowerCase().includes(q)
          || (String(a.uid||a.id||"")).toLowerCase().includes(q);
    });
    render(filtered);
  });

  pickAllEl.addEventListener("click", ()=>{
    document.querySelectorAll(".pick").forEach(c=> c.checked = true);
    statusEl.textContent = "All visible athletes selected.";
  });

  clearAllEl.addEventListener("click", ()=>{
    document.querySelectorAll(".pick").forEach(c=> c.checked = false);
    statusEl.textContent = "Selection cleared.";
  });

  fullAllEl.addEventListener("click", ()=> bulkGive(10, "Full-Time Grind"));
  partAllEl.addEventListener("click", ()=> bulkGive(5, "Part-Time Grind"));

  load();
</script>
</body>
</html>
