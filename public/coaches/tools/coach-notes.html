<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Coach · Notes & Daily Log</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Shared coach console skin (same as Arena / Command Center) -->
  <link rel="stylesheet" href="/coaches/_ui/steps-shell.css" />

  <style>
    /* Page-only tweaks (keep small; the shell/pills come from steps-shell.css) */
    :root{ color-scheme:dark; }
    body{ margin:0; background:#090b0f; color:#f5f5f5; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }

    .wrap{ max-width:1150px; margin:0 auto; padding:20px 16px 44px; }
    .top-nav{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }

    /* Make top nav use the SAME pill look */
    .top-nav a.pill{ text-decoration:none; }

    h1{ margin:6px 0 8px; font-size:1.55rem; font-weight:900; color:#facc15; letter-spacing:.2px; }
    .lead{ color:#94a3b8; font-size:.85rem; margin:0 0 16px; line-height:1.35; }

    .grid{ display:grid; grid-template-columns:380px minmax(0,1fr); gap:18px; align-items:start; }
    @media (max-width: 920px){ .grid{ grid-template-columns:1fr; } }

    .panel{
      background:rgba(17,21,29,.92);
      border:1px solid rgba(148,163,184,.18);
      border-radius:16px;
      padding:16px;
      box-shadow:0 0 16px rgba(0,0,0,.28);
    }

    .panel-title{
      margin:0 0 10px;
      font-size:1.0rem;
      font-weight:900;
      color:#facc15;
      letter-spacing:.2px;
    }

    label{ display:block; font-size:.72rem; margin-top:10px; margin-bottom:5px; color:#cbd5e1; letter-spacing:.02em; }
    input, select, textarea{
      width:100%;
      background:rgba(2,6,23,.55);
      border:1px solid rgba(148,163,184,.22);
      border-radius:12px;
      padding:9px 10px;
      color:#e5e7eb;
      font-size:.86rem;
      transition:.15s;
    }
    input:focus, select:focus, textarea:focus{
      outline:none;
      border-color:rgba(250,204,21,.55);
      box-shadow:0 0 0 2px rgba(250,204,21,.18);
    }
    textarea{ min-height:112px; resize:vertical; }

    /* Role pills use the shared .pill system */
    .role-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
    .role-row .pill{ padding:8px 12px; font-size:.78rem; }

    /* Pre-brief block */
    .pre-box{
      margin-top:10px;
      background:rgba(2,6,23,.35);
      border:1px solid rgba(250,204,21,.10);
      border-radius:14px;
      padding:10px 12px;
    }
    .pre-box-title{
      font-size:.74rem;
      font-weight:800;
      color:#e5e7eb;
      margin:0 0 6px;
    }
    .pre-check{
      display:flex;
      gap:8px;
      align-items:center;
      margin:6px 0;
      font-size:.78rem;
      color:#cbd5e1;
    }
    .pre-check input{ width:auto; accent-color:#facc15; }

    /* Save button should look like a primary pill */
    .btn-row{ display:flex; gap:10px; align-items:center; margin-top:12px; flex-wrap:wrap; }
    #saveBtn{ min-width:160px; }
    #status{ color:#94a3b8; font-size:.72rem; margin:0; }

    /* Logs */
    .log-list{ max-height:74vh; overflow:auto; padding-right:6px; }
    .log-item{
      padding:12px 6px 14px;
      border-bottom:1px solid rgba(148,163,184,.14);
      transition:.12s;
    }
    .log-item:hover{ background:rgba(2,6,23,.32); border-radius:12px; }
    .log-item small{ color:#94a3b8; font-size:.7rem; }

    /* Badges (kept) */
    .badge{
      display:inline-block;
      background:rgba(148,163,184,.12);
      border:1px solid rgba(148,163,184,.22);
      border-radius:999px;
      padding:3px 9px;
      font-size:.62rem;
      margin-right:6px;
      text-transform:uppercase;
      letter-spacing:.04em;
      color:#cbd5e1;
      line-height:1;
    }
    .badge.practice{ background:rgba(250,204,21,.10); border-color:rgba(250,204,21,.22); color:#fde68a; }
    .badge.behavior{ background:rgba(248,113,113,.10); border-color:rgba(248,113,113,.22); color:#fecaca; }
    .badge.athlete{ background:rgba(74,222,128,.10); border-color:rgba(74,222,128,.22); color:#bbf7d0; }
    .badge.injury{ background:rgba(251,113,133,.10); border-color:rgba(251,113,133,.22); color:#fecdd3; }
    .badge.parent{ background:rgba(96,165,250,.10); border-color:rgba(96,165,250,.22); color:#bfdbfe; }
    .badge.todo{ background:rgba(250,204,21,.08); border-color:rgba(250,204,21,.16); color:#fde68a; }
  </style>
</head>

<body>
  <main class="wrap">
    <!-- Top nav: use shared pill styling -->

    <h1>Coach Notes &amp; Daily Log</h1>
    <p class="lead">
      Brief → run → debrief. Capture prep, issues, and what to fix next practice.
      <span style="color:#facc15;font-weight:800;">XP stays in Daily Grind.</span>
    </p>

    <section class="grid">
      <!-- LEFT -->
      <div class="panel">
        <div class="panel-title">New Log Entry</div>

        <!-- STEP 1 -->
        <div class="step">
          <div class="step-head">
            <div class="step-title"><span class="step-num">1</span> Setup</div>
          </div>

          <label for="logDate">Date</label>
          <input id="logDate" type="date" />

          <label>Logged by</label>
          <div class="role-row" id="roleRow">
            <button type="button" class="pill pill-yellow is-active" data-role="head">Head Coach</button>
            <button type="button" class="pill pill-ghost" data-role="assistant">Assistant Coach</button>
            <button type="button" class="pill pill-ghost" data-role="junior">Junior Coach</button>
          </div>

          <div class="pre-box">
            <div class="pre-box-title">Pre-brief checklist</div>
            <label class="pre-check">
              <input type="checkbox" id="prePrepared" />
              A. Practice prepared / clipboard ready
            </label>
            <label class="pre-check">
              <input type="checkbox" id="preHydrated" />
              B. Hydrated / physically ready to lead
            </label>
            <label class="pre-check">
              <input type="checkbox" id="preMindset" />
              C. Mindset on / ready to teach
            </label>
          </div>
        </div>

        <!-- STEP 2 -->
        <div class="step" style="margin-top:12px;">
          <div class="step-head">
            <div class="step-title"><span class="step-num">2</span> Details</div>
          </div>

          <label for="logType">Category</label>
          <select id="logType">
            <option value="practice">Practice</option>
            <option value="athlete">Athlete</option>
            <option value="behavior">Behavior</option>
            <option value="injury">Injury</option>
            <option value="parent">Parent</option>
            <option value="todo">To-Do</option>
          </select>

          <label for="logAthlete">Athlete Name / ID (optional)</label>
          <input id="logAthlete" placeholder="F4_0001 or full name" />

          <label for="logText">Note (issues, highlights, actions)</label>
          <textarea id="logText" placeholder="Wins, issues, corrections, reminders…"></textarea>

          <label for="logDebrief">Post-practice debrief</label>
          <textarea id="logDebrief" placeholder="What worked, what didn’t, what to change next time…"></textarea>
        </div>

        <!-- STEP 3 -->
        <div class="step" style="margin-top:12px;">
          <div class="step-head">
            <div class="step-title"><span class="step-num">3</span> Save</div>
          </div>

          <div class="btn-row">
            <button id="saveBtn" class="pill pill-yellow" type="button">Save Log</button>
            <p id="status">Ready.</p>
          </div>

          <div class="hint" style="margin-top:8px;">
            Logs are for coaching clarity. XP stays in Daily Grind.
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="panel">
        <div class="panel-title">Recent Entries</div>
        <div id="logList" class="log-list">
          <p style="color:#94a3b8;font-size:.85rem;margin:0;">Loading…</p>
        </div>
      </div>
    </section>
  </main>

<script type="module">
  import {
    db,
    collection,
    getDocs,
    query,
    orderBy,
    limit
  } from "/assets/js/firebase-init.js";

  import { ADD_NOTE_URL } from "/assets/js/coach-endpoints.js";

  // DOM
  const logDateEl    = document.getElementById("logDate");
  const logTypeEl    = document.getElementById("logType");
  const logAthleteEl = document.getElementById("logAthlete");
  const logTextEl    = document.getElementById("logText");
  const logDebriefEl = document.getElementById("logDebrief");
  const statusEl     = document.getElementById("status");
  const logListEl    = document.getElementById("logList");
  const saveBtn      = document.getElementById("saveBtn");
  const roleRow      = document.getElementById("roleRow");

  // pre checks
  const prePreparedEl = document.getElementById("prePrepared");
  const preHydratedEl = document.getElementById("preHydrated");
  const preMindsetEl  = document.getElementById("preMindset");

  let currentRole = "head";

  // Role pill clicks (use .is-active to match other consoles)
  roleRow.addEventListener("click", (e)=>{
    const btn = e.target.closest("button[data-role]");
    if(!btn) return;
    currentRole = btn.dataset.role;

    roleRow.querySelectorAll("button[data-role]").forEach(b=>{
      b.classList.remove("is-active","pill-yellow");
      b.classList.add("pill-ghost");
    });

    btn.classList.add("is-active","pill-yellow");
    btn.classList.remove("pill-ghost");
  });

  // default date = today
  logDateEl.value = new Date().toISOString().slice(0,10);

  function escapeHtml(s){
    return (s || "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  async function loadLogs(){
    const base = collection(db, "coachNotes");
    const qy   = query(base, orderBy("createdAt","desc"), limit(40));
    const snap = await getDocs(qy);

    if (snap.empty){
      logListEl.innerHTML = `<p style="color:#94a3b8;font-size:.85rem;margin:0;">No entries yet.</p>`;
      return;
    }

    const rows = [];
    snap.forEach(docSnap => {
      const d = docSnap.data();
      const type = d.type || "practice";

      let roleBadge = "";
      const role = d.meta?.role || d.role || "head";
      if (role === "head") {
        roleBadge = `<span class="badge" style="background:rgba(250,204,21,.10);border-color:rgba(250,204,21,.22);color:#fde68a;">Head</span>`;
      } else if (role === "assistant") {
        roleBadge = `<span class="badge" style="background:rgba(96,165,250,.10);border-color:rgba(96,165,250,.22);color:#bfdbfe;">Assistant</span>`;
      } else if (role === "junior") {
        roleBadge = `<span class="badge" style="background:rgba(74,222,128,.10);border-color:rgba(74,222,128,.22);color:#bbf7d0;">Junior</span>`;
      }

      const visBits = [];
      if (d.visibility?.parent)  visBits.push("Parent");
      if (d.visibility?.athlete) visBits.push("Athlete");

      const body = escapeHtml(d.body || "").replace(/\n/g,"<br>");
      const debrief = escapeHtml(d.meta?.debrief || "").replace(/\n/g,"<br>");

      rows.push(`
        <div class="log-item">
          <div>
            <span class="badge ${type}">${escapeHtml(type)}</span>
            ${roleBadge}
            ${d.athleteUid ? `<span class="badge">#${escapeHtml(d.athleteUid)}</span>` : ""}
            ${visBits.length ? `<span class="badge" style="background:rgba(148,163,184,.10);border-color:rgba(148,163,184,.22);color:#e5e7eb;">${visBits.join(" / ")}</span>` : ""}
            <small>${escapeHtml(d.date || "")}</small>
          </div>

          ${body ? `<div style="margin-top:8px;line-height:1.45;">${body}</div>` : ""}

          ${debrief ? `<div style="margin-top:10px;font-size:.82rem;color:#e5e7eb;">
              <strong style="color:#fde68a;">Debrief:</strong> ${debrief}
            </div>` : ""}
        </div>
      `);
    });

    logListEl.innerHTML = rows.join("");
  }

  async function saveLog(){
    const date    = logDateEl.value;
    const type    = logTypeEl.value || "practice";
    const athlete = logAthleteEl.value.trim();
    const text    = logTextEl.value.trim();
    const debrief = logDebriefEl.value.trim();

    if (!text && !debrief){
      statusEl.textContent = "Write a note or debrief first.";
      return;
    }

    statusEl.textContent = "Saving…";

    try {
      const res = await fetch(ADD_NOTE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          data: {
            athleteUid: athlete || "unassigned",
            type,
            title: date,
            body: text || debrief,          // keep simple; debrief is also stored in meta
            linkedEventId: null,
            meta: {
              date,
              role: currentRole,
              debrief,
              prePrepared: !!prePreparedEl.checked,
              preHydrated: !!preHydratedEl.checked,
              preMindset:  !!preMindsetEl.checked,
            }
          }
        })
      });

      const json = await res.json();

      // normalize possible wrapped function responses
      const data = json?.result ?? json?.data ?? json;

      if (!res.ok || !data?.ok) {
        statusEl.textContent = data?.error || `Save failed (HTTP ${res.status})`;
        return;
      }

      statusEl.textContent = "Saved.";
      logTextEl.value = "";
      logDebriefEl.value = "";
      prePreparedEl.checked = false;
      preHydratedEl.checked = false;
      preMindsetEl.checked  = false;

      await loadLogs();
    } catch (err) {
      console.error(err);
      statusEl.textContent = "Save failed (network).";
    }
  }

  saveBtn.addEventListener("click", saveLog);
  loadLogs();
</script>
</body>
</html>
