<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Coach · Notes & Daily Log</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root { color-scheme: dark; }
    body {
      background:#090b0f;
      color:#f5f5f5;
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    .wrap {
      max-width:1150px;
      margin:0 auto;
      padding:20px 16px 40px;
    }
    .top-nav {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .pill {
      background:#151a22;
      border:1px solid #252c38;
      color:#f0f0f0;
      text-decoration:none;
      font-weight:600;
      padding:6px 14px;
      border-radius:999px;
      transition:0.2s;
    }
    .pill:hover {background:#ffd633;color:#111;border-color:#ffd633;}
    h1 {
      margin:6px 0 8px;
      font-size:1.4rem;
      font-weight:800;
      color:#ffd633;
    }
    p.lead {
      color:#9ca3af;
      font-size:.82rem;
      margin-bottom:18px;
    }

    /* GRID */
    .grid {
      display:grid;
      grid-template-columns:360px minmax(0,1fr);
      gap:18px;
      align-items:flex-start;
    }
    @media (max-width: 880px){
      .grid {grid-template-columns:1fr;}
    }

    .panel {
      background:#11151d;
      border:1px solid #1e2632;
      border-radius:14px;
      padding:16px 16px 20px;
      box-shadow:0 0 10px rgba(0,0,0,.25);
    }
    label {
      display:block;
      font-size:.72rem;
      margin-top:8px;
      margin-bottom:4px;
      color:#d1d5db;
      letter-spacing:.02em;
    }
    input,select,textarea {
      width:100%;
      background:#0a0d12;
      border:1px solid #252c38;
      border-radius:9px;
      padding:7px 9px;
      color:#fff;
      font-size:.8rem;
      transition:.2s;
    }
    input:focus,select:focus,textarea:focus {
      outline:none;
      border-color:#ffd633;
      box-shadow:0 0 0 2px rgba(255,214,51,.2);
    }
    textarea {min-height:110px;resize:vertical}
    .btn {
      background:#ffd633;
      color:#0a0a0a;
      border:0;
      border-radius:999px;
      padding:7px 18px;
      font-weight:800;
      margin-top:12px;
      cursor:pointer;
      transition:.2s;
    }
    .btn:hover {transform:translateY(-1px);box-shadow:0 3px 8px rgba(255,214,51,.3);}
    #status {color:#9ca3af;font-size:.68rem;margin-top:6px}

    /* Logs */
    .log-list {max-height:70vh;overflow-y:auto;}
    .log-item {
      padding:10px 4px 12px;
      border-bottom:1px solid rgba(255,255,255,.05);
      transition:.2s;
    }
    .log-item:hover {background:#10131b;}
    .log-item small {color:#97a0ad;font-size:.65rem}
    .badge {
      display:inline-block;
      background:#222a36;
      border:1px solid #2f3745;
      border-radius:999px;
      padding:2px 8px;
      font-size:.6rem;
      margin-right:4px;
      text-transform:uppercase;
      letter-spacing:.03em;
      color:#9fb3c8;
    }
    .badge.practice{background:#263142;color:#ffd633;}
    .badge.behavior{background:#3a1f1f;color:#f87171;}
    .badge.athlete{background:#1f3a24;color:#4ade80;}
    .badge.injury{background:#42222e;color:#fb7185;}
    .badge.parent{background:#26303a;color:#60a5fa;}
    .badge.todo{background:#31291b;color:#facc15;}

    /* role toggle */
    .role-row{
      display:flex;
      gap:6px;
      margin-top:6px;
      flex-wrap:wrap;
    }
    .role-pill{
      flex:0 0 auto;
      background:#0a0d12;
      border:1px solid #252c38;
      border-radius:999px;
      padding:4px 10px 5px;
      font-size:.68rem;
      color:#e2e8f0;
      cursor:pointer;
      display:flex;
      gap:4px;
      align-items:center;
    }
    .role-pill.active{
      border-color:#ffd633;
      background:rgba(255,214,51,.08);
      color:#fff;
    }

    /* pre-brief box */
    .pre-box{
      background:rgba(248,250,252,.01);
      border:1px solid rgba(255,214,51,.06);
      border-radius:10px;
      padding:8px 10px 8px;
      margin-top:8px;
    }
    .pre-box-title{
      font-size:.7rem;
      font-weight:600;
      color:#f8fafc;
      margin-bottom:4px;
    }
    .pre-check{
      display:flex;
      gap:6px;
      align-items:center;
      margin-bottom:4px;
      font-size:.68rem;
      color:#d1d5db;
    }
    .pre-check input{
      width:auto;
      accent-color:#ffd633;
    }

    /* post / debrief */
    #logDebrief{
      min-height:80px;
    }
  </style>
</head>
<body>
<main class="wrap">
  <nav class="top-nav">
    <a class="pill" href="/coaches/roster.html">Team Roster</a>
    <a class="pill" href="/coaches/coaches-daily-clipboard.html">Coach’s Clipboard</a>
    <a class="pill" href="/coaches/daily-grind.html">Daily Grind XP</a>
  </nav>

    <h1>Coach Notes & Daily Log</h1>
    <p class="lead">
      Brief, run, debrief. Use this to capture prep, issues, and what to fix next practice.<br>
      <span style="color:#ffd633">XP stays in Daily Grind.</span>
    </p>

    <section class="grid">
      <!-- LEFT: add a note -->
      <div class="panel">
        <h2 style="margin-top:0;font-size:1rem;color:#ffd633;">New Log Entry</h2>

        <label for="logDate">Date</label>
        <input id="logDate" type="date" />

        <label>Logged by</label>
        <div class="role-row" id="roleRow">
          <label class="role-pill active" data-role="head">
            <span>Head Coach</span>
          </label>
          <label class="role-pill" data-role="assistant">
            <span>Assistant Coach</span>
          </label>
          <label class="role-pill" data-role="junior">
            <span>Junior Coach</span>
          </label>
        </div>

        <!-- PRE-BRIEF -->
        <div class="pre-box">
          <div class="pre-box-title">Pre-brief checklist</div>
          <label class="pre-check">
            <input type="checkbox" id="prePrepared" />
            A. Practice prepared / clipboard ready
          </label>
          <label class="pre-check">
            <input type="checkbox" id="preHydrated" />
            B. Hydrated / physically ready to lead
          </label>
          <label class="pre-check">
            <input type="checkbox" id="preMindset" />
            C. Mindset on / ready to teach
          </label>
        </div>

        <label for="logType">Category</label>
        <select id="logType">
          <option value="practice">Practice</option>
          <option value="athlete">Athlete</option>
          <option value="behavior">Behavior</option>
          <option value="injury">Injury</option>
          <option value="parent">Parent</option>
          <option value="todo">To-Do</option>
        </select>

        <label for="logAthlete">Athlete Name / ID (optional)</label>
        <input id="logAthlete" placeholder="F4_0001 or full name" />

        <label for="logText">Note (issues, highlights, actions)</label>
        <textarea id="logText" placeholder="Wins, issues, corrections, reminders…"></textarea>

        <label for="logDebrief">Post-practice debrief (How did practice go?)</label>
        <textarea id="logDebrief" placeholder="What worked, what didn’t, what to change next time…"></textarea>

        <button id="saveBtn" class="btn">Save Log</button>
        <p id="status">Ready.</p>
      </div>

      <!-- RIGHT: recent notes -->
      <div class="panel">
        <h2 style="margin-top:0;font-size:1rem;color:#ffd633;">Recent Entries</h2>
        <div id="logList" class="log-list">
          <p style="color:#9ca3af;font-size:.75rem">Loading…</p>
        </div>
      </div>
    </section>
  </main>

<script type="module">
  import {
    db,
    collection,
    addDoc,
    getDocs,
    query,
    orderBy,
    limit,
    serverTimestamp
  } from "/assets/js/firebase-init.js";

  // DOM
  const logDateEl    = document.getElementById("logDate");
  const logTypeEl    = document.getElementById("logType");     // athlete | parent | injury | coachPrivate | conduct | goal | eventSummary
  const logAthleteEl = document.getElementById("logAthlete");
  const logTextEl    = document.getElementById("logText");
  const logDebriefEl = document.getElementById("logDebrief");
  const statusEl     = document.getElementById("status");
  const logListEl    = document.getElementById("logList");
  const saveBtn      = document.getElementById("saveBtn");
  const roleRow      = document.getElementById("roleRow");

  // pre checks
  const prePreparedEl = document.getElementById("prePrepared");
  const preHydratedEl = document.getElementById("preHydrated");
  const preMindsetEl  = document.getElementById("preMindset");

  // current coach role (for display only)
  let currentRole = "head";

  // function endpoint (emulator)
import { ADD_NOTE_URL } from "/assets/js/coach-endpoints.js";

  // role pill clicks
  roleRow.addEventListener("click", (e)=>{
    const pill = e.target.closest(".role-pill");
    if(!pill) return;
    currentRole = pill.dataset.role;
    roleRow.querySelectorAll(".role-pill").forEach(p=>p.classList.remove("active"));
    pill.classList.add("active");
  });

  // default date = today
  const today = new Date();
  logDateEl.value = today.toISOString().slice(0,10);

  // load recent logs (still straight from firestore so you can list them)
  async function loadLogs(){
    const base = collection(db, "coachNotes");  // use the same collection the function writes to
    const qy   = query(base, orderBy("createdAt","desc"), limit(40));
    const snap = await getDocs(qy);
    if (snap.empty){
      logListEl.innerHTML = `<p style="color:#9ca3af;font-size:.75rem">No entries yet.</p>`;
      return;
    }
    const rows = [];
    snap.forEach(docSnap => {
      const d = docSnap.data();
      const type = d.type || "athlete";

      // role badge is optional now – we kept your display
      let roleBadge = "";
      const role = d.meta?.role || d.role || "head";
      if (role === "head") {
        roleBadge = `<span class="badge" style="background:#4a3a11;color:#ffe28a;">Head Coach</span>`;
      } else if (role === "assistant") {
        roleBadge = `<span class="badge" style="background:#1f2e45;color:#bfdbfe;">Assistant</span>`;
      } else if (role === "junior") {
        roleBadge = `<span class="badge" style="background:#203524;color:#bbf7d0;">Junior</span>`;
      }

      const visBits = [];
      if (d.visibility?.parent) visBits.push("Parent");
      if (d.visibility?.athlete) visBits.push("Athlete");

      rows.push(`
        <div class="log-item">
          <div>
            <span class="badge ${type}">${type}</span>
            ${roleBadge}
            ${d.athleteUid ? `<span class="badge">#${d.athleteUid}</span>` : ""}
            ${visBits.length ? `<span class="badge" style="background:#24303a;color:#e2e8f0;">${visBits.join(" / ")}</span>` : ""}
            <small>${d.date || ""}</small>
          </div>
          <div style="margin-top:6px;line-height:1.4;">${(d.body || "").replace(/\n/g,"<br>")}</div>
          ${d.meta?.debrief ? `<div style="margin-top:6px;font-size:.68rem;color:#e2e8f0;"><strong>Debrief:</strong> ${d.meta.debrief.replace(/\n/g,"<br>")}</div>` : ""}
        </div>
      `);
    });
    logListEl.innerHTML = rows.join("");
  }

  async function saveLog(){
    const date    = logDateEl.value;
    const type    = logTypeEl.value || "athlete";
    const athlete = logAthleteEl.value.trim();
    const text    = logTextEl.value.trim();
    const debrief = logDebriefEl.value.trim();

    if (!text && !debrief){
      statusEl.textContent = "Write a note or debrief first.";
      return;
    }

    statusEl.textContent = "Saving…";

    // send to cloud function so it can enforce visibility rules
    try {
      const res = await fetch(ADD_NOTE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          data: {
            athleteUid: athlete || "unassigned",
            type,
            body: text || debrief,
            title: date,
            linkedEventId: null,
            meta: {
              debrief,
              date,
              role: currentRole,
              prePrepared: !!prePreparedEl.checked,
              preHydrated: !!preHydratedEl.checked,
              preMindset:  !!preMindsetEl.checked,
            }
          }
        })
      });

      const json = await res.json();
      if (!json.ok) {
        statusEl.textContent = json.error || "Save failed.";
        return;
      }

      statusEl.textContent = "Saved.";
      logTextEl.value = "";
      logDebriefEl.value = "";
      prePreparedEl.checked = false;
      preHydratedEl.checked = false;
      preMindsetEl.checked  = false;

      await loadLogs();
    } catch (err) {
      console.error(err);
      statusEl.textContent = "Save failed (network).";
    }
  }

  saveBtn.addEventListener("click", saveLog);
  loadLogs();
</script>
</body>
</html>
