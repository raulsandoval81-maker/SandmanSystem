<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Testing Results Live</title>
<link rel="stylesheet" href="/coaches/testing/testing.css" />
  <style>
    :root{
      --bg:#0b1220;
      --panel:#121b2e;
      --line:#2a3550;
      --text:#f3f4f6;
      --muted:#9ca3af;
      --gold:#facc15;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      padding:20px;
    }

    .wrap{
      max-width:960px;
      margin:0 auto;
    }

    .back{
      display:inline-block;
      margin-bottom:18px;
      color:var(--muted);
      text-decoration:none;
      font-weight:700;
    }

    h1{
      margin:0 0 8px;
      color:var(--gold);
      font-size:1.8rem;
    }

    .sub{
      margin:0 0 18px;
      color:var(--muted);
    }

    .board{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      min-height:240px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/coaches/testing/index.html">← Back to Testing</a>
    <h1>Testing Results Live</h1>
    <p class="sub">Live panel submissions and final result status.</p>

    <div id="results" class="board"></div>
  </div>

  <script type="module" src="/coaches/testing/results-live.js"></script>
</body>
</html>
