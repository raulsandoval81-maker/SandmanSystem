<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test 1 — Base Check</title>
<link rel="stylesheet" href="/coaches/testing/testing.css" />
  <style>

:root{
  --bg:#f7f1e3;
  --panel:#fffdf7;
  --panel-2:#f3ecda;
  --line:#d8ccb3;
  --text:#201a12;
  --muted:#6b6256;
  --gold:#b88a12;
  --red:#b93838;
  --green:#1f8a43;
}

body[data-theme="night"]{
  --bg:#0b1220;
  --panel:#121b2e;
  --panel-2:#18243d;
  --line:#2a3550;
  --text:#f3f4f6;
  --muted:#9ca3af;
  --gold:#facc15;
  --red:#ef4444;
  --green:#22c55e;
}

.theme-toggle{
  display:flex;
  align-items:center;
  gap:10px;
}

.switch{
  width:54px;
  height:30px;
  border-radius:999px;
  background:var(--bg);
  border:1px solid var(--line);
  position:relative;
  cursor:pointer;
}

.switch::after{
  content:"";
  position:absolute;
  top:3px;
  left:3px;
  width:24px;
  height:24px;
  border-radius:50%;
  background:var(--gold);
  transition:.2s;
}

body[data-theme="night"] .switch::after{
  transform:translateX(24px);
}

.score-btn{
  flex:1;
  padding:16px 0;
  border-radius:14px;
  border:2px solid rgba(255,255,255,0.15);
  background:#0f172a;
  color:#cbd5f5;
  font-weight:900;
  font-size:1.1rem;
  letter-spacing:0.5px;
  transition:all 0.12s ease;
}

.score-btn[data-score="5"]{
  background:rgba(34,197,94,0.18);
}
.score-btn[data-score="3"]{
  background:rgba(251,191,36,0.18);
}
.score-btn[data-score="0"]{
  background:rgba(239,68,68,0.18);
}

.score-btn:hover{
  transform:scale(1.06);
}

.score-btn.selected-5{
  background:#22c55e;
  color:#022c22;
  border-color:#4ade80;
  box-shadow:
    0 0 0 3px rgba(34,197,94,0.8),
    0 10px 28px rgba(34,197,94,0.55);
}

.score-btn.selected-3{
  background:#fde047;
  color:#3b2f00;
  border-color:#facc15;
  box-shadow:
    0 0 0 3px rgba(250,204,21,0.8),
    0 10px 28px rgba(250,204,21,0.55);
}

.score-btn.selected-0{
  background:#ef4444;
  color:#ffffff;
  border-color:#f87171;
  box-shadow:
    0 0 0 3px rgba(239,68,68,0.8),
    0 10px 28px rgba(239,68,68,0.55);
}
</style>
</head>

<body data-theme="night">

<div class="wrap">

  <section class="hero">
    <div class="topbar">
      <h1>Test 1 — Base Check</h1>

      <div class="theme-toggle">
        <span>Day</span>
        <button id="themeToggle" class="switch"></button>
        <span>Night</span>
      </div>
    </div>

    <p class="sub">Tap scores. Pass = 85+</p>

    <div class="fields">
      <div>
        <label>Athlete</label>
        <input id="athlete" />
      </div>

      <div>
        <label>Date</label>
        <input id="testDate" type="date" />
      </div>

      <div>
        <label>Coach</label>
        <input id="coach" />
      </div>
    </div>
  </section>

  <section id="sections" class="section-list"></section>

  <section class="summary-stack">

    <div class="summary-card">
      <h2>Coach Notes</h2>
      <textarea id="notes"></textarea>
    </div>

    <div class="summary-card">

      <div>
        <div>Total</div>
        <div id="totalScore" class="total-score">0 / 100</div>
      </div>

      <div id="statusText" class="status fail">NOT READY</div>

      <div class="actions">
        <button id="saveBtn" class="action-btn">Save Test</button>
        <button id="copyBtn" class="action-btn">Copy Summary</button>
        <button id="resetBtn" class="action-btn secondary">Reset</button>
      </div>

    </div>

  </section>

</div>

<!-- 🔥 JS SPLIT -->
<script type="module" src="./test1.js"></script>

</body>
</html>
