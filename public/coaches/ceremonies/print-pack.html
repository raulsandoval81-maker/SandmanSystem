<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Ceremony Print Pack</title>
  <style>
    body { font-family: Arial; padding: 24px; }
    h1 { margin-bottom: 10px; }
    .row { margin: 6px 0; }
  </style>
</head>
<body>

<h1>Ceremony Roster</h1>
<p id="meta"></p>

<div id="list"></div>

<script>
  const data = JSON.parse(localStorage.getItem("ceremony_roster") || "[]");

  document.getElementById("meta").textContent =
    `Athletes: ${data.length}`;

  document.getElementById("list").innerHTML =
    data.map(a => `<div class="row">${a.name} — ${a.tier}</div>`).join("");

  window.print();
</script>

</body>
</html>
