<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Tournament Prep • Sandman System</title>
  <link rel="stylesheet" href="../assets/css/site.css"/>
  <style>
    .panel{max-width:1100px;margin:0 auto;padding:1rem}
    .card{background:#0e141c;border:1px solid #243041;border-radius:12px;padding:1rem;margin:.9rem 0;box-shadow:0 0 14px rgba(0,0,0,.25)}
    .row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
    .btn{display:inline-block;padding:.6rem 1rem;border-radius:999px;background:#ff3333;border:2px solid #ffd633;color:#ffd633;font-weight:900;text-decoration:none;cursor:pointer}
    .btn.secondary{background:transparent}
    .muted{color:#9fb3c8}
    .input{width:100%;padding:.6rem .7rem;background:#121821;color:#f3f4f6;border:1px solid #394a61;border-radius:10px}
    textarea.input{resize:vertical}
    .subtle{font-size:.9rem;color:#9fb3c8}
    .nav{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem}
    .nav a{background:#1b2330;border:1px solid #2c3a4f;color:#e6e8eb;text-decoration:none;
           padding:.45rem .8rem;border-radius:999px;font-weight:700}
    .status{margin-top:.55rem;font-size:.8rem;color:#9fb3c8}
    .status.ok{color:#bef264}
  </style>
</head>
<body>
  <main class="panel stack">
    <nav class="nav">
      <a href="./hub.html">← Back to HUB</a>
    </nav>

    <section class="card stack">
      <div class="row">
        <h1 style="margin:0;margin-right:auto">Tournament Prep</h1>
      </div>
      <p class="muted" style="margin:.35rem 0 0">
        Ops-only V1. No XP on this page. Use Weekend Arena / Prestige Arena for awards.
      </p>
    </section>

    <section class="card stack">
      <h2 style="margin:0 0 .35rem">Weigh-ins & Divisions</h2>
      <div class="row">
        <input class="input" placeholder="Search athlete… (placeholder)" />
        <a class="btn secondary" href="./roster.html">Open Roster</a>
      </div>
      <div class="muted" style="margin-top:.5rem">No data (placeholder). Wire to Firestore later.</div>
    </section>

    <section class="card stack">
      <h2 style="margin:0 0 .35rem">Brackets</h2>
      <div class="row">
        <input id="bracketUrl" class="input" placeholder="Bracket URL (optional)" />
        <button class="btn secondary" id="saveBracket">Save Link</button>
      </div>
      <div id="bracketList" class="muted" style="margin-top:.5rem">None yet.</div>
    </section>

    <section class="card stack">
      <h2 style="margin:0 0 .35rem">Post-Event Notes</h2>
      <textarea id="postNotes" rows="5" class="input" placeholder="Highlights, injuries, follow-ups…"></textarea>
      <div class="row" style="margin-top:.5rem">
        <button class="btn" id="saveNotes">Save (local)</button>
        <button class="btn secondary" id="dlNotes">Download (.txt)</button>
      </div>
      <div class="status" id="status">Ready.</div>
    </section>
  </main>

<script type="module">
  const el = (id) => document.getElementById(id);

  // Brackets (local only)
  el("saveBracket")?.addEventListener("click", () => {
    const url = el("bracketUrl").value.trim();
    if (!url) return;

    const d = document.createElement("div");
    d.style.marginTop = ".35rem";
    d.innerHTML = `<a href="${url}" target="_blank" rel="noopener" style="color:#ffd633;font-weight:800;text-decoration:none">Bracket link</a>`;
    el("bracketList").prepend(d);

    el("bracketUrl").value = "";
    el("status").textContent = "Bracket link saved (local).";
    el("status").classList.add("ok");
    setTimeout(()=>el("status").classList.remove("ok"), 900);
  });

  // Save notes (local only)
  el("saveNotes")?.addEventListener("click", () => {
    el("status").textContent = "Notes saved (local).";
    el("status").classList.add("ok");
    setTimeout(()=>el("status").classList.remove("ok"), 900);
  });

  // Download notes
  el("dlNotes")?.addEventListener("click", () => {
    const t = el("postNotes").value || "";
    const blob = new Blob([t], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "post-event-notes.txt";
    a.click();
    URL.revokeObjectURL(a.href);

    el("status").textContent = "Downloaded post-event-notes.txt";
    el("status").classList.add("ok");
    setTimeout(()=>el("status").classList.remove("ok"), 900);
  });
</script>
</body>
</html>
