<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sandman Clock</title>

  <style>
    :root{
      --bg:#000;
      --text:#fff;
      --muted:#aaa;
      --green:#22c55e;
      --yellow:#facc15;
      --red:#ef4444;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100vh;
      text-align:center;
    }

    .status{
      font-size:14px;
      font-weight:900;
      letter-spacing:.15em;
      margin-bottom:10px;
      color:var(--muted);
    }

    .status.running{ color:var(--green); }
    .status.paused{ color:var(--yellow); }
    .status.stopped{ color:var(--red); }

    .block{
      font-size:clamp(18px, 3vw, 34px);
      margin-bottom:20px;
      color:#d1d5db;
    }

    .clock{
      font-size:clamp(120px, 22vw, 280px);
      font-weight:900;
      line-height:.9;
      font-variant-numeric:tabular-nums;
      margin-bottom:30px;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    button{
      border:0;
      border-radius:999px;
      padding:12px 18px;
      font-weight:800;
      cursor:pointer;
      font-size:14px;
    }

    .run{ background:var(--green); color:#000; }
    .pause{ background:var(--yellow); color:#000; }
    .stop{ background:var(--red); color:#fff; }

    .back{
      position:fixed;
      top:16px;
      right:16px;
      font-size:12px;
      color:#aaa;
      text-decoration:none;
      border:1px solid #333;
      padding:6px 10px;
      border-radius:999px;
    }
  </style>
</head>

<body>

<a class="back" href="/coaches/execution/daily-clipboard/">← Back</a>

<div id="status" class="status stopped">STOPPED</div>
<div id="block" class="block">No active block</div>
<div id="clock" class="clock">00:00</div>

<div class="controls">
  <button class="run" onclick="run()">Run</button>
  <button class="pause" onclick="pause()">Pause</button>
  <button class="stop" onclick="stop()">Stop</button>
</div>

<script>
const KEY = "sandman_inline_run_state_v1";

let state = {
  status: "stopped",
  secondsLeft: 0,
  block: "No active block"
};

function load(){
  try{
    const saved = JSON.parse(localStorage.getItem(KEY));
    if(saved) state = saved;
  }catch{}
}

function save(){
  localStorage.setItem(KEY, JSON.stringify(state));
}

function format(s){
  const m = Math.floor(s/60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2,"0")}`;
}

function render(){
  const clock = document.getElementById("clock");
  const status = document.getElementById("status");
  const block = document.getElementById("block");

  clock.textContent = format(state.secondsLeft);
  block.textContent = state.block;

  status.textContent = state.status.toUpperCase();
  status.className = "status " + state.status;
}

function tick(){
  if(state.status === "running" && state.secondsLeft > 0){
    state.secondsLeft--;
    save();
    render();
  }
}

function run(){
  state.status = "running";
  save();
  render();
}

function pause(){
  state.status = "paused";
  save();
  render();
}

function stop(){
  state.status = "stopped";
  state.secondsLeft = 0;
  save();
  render();
}

load();
render();
setInterval(tick, 1000);

/* 🔥 Listen for clipboard updates */
window.addEventListener("storage", (e)=>{
  if(e.key === KEY){
    load();
    render();
  }
});
</script>

</body>
</html>
