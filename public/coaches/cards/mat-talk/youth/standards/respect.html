<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mat Talk | Respect</title>

  <link rel="stylesheet" href="/assets/css/site.css" />
  <link rel="stylesheet" href="/coaches/cards/card-shared.css" />
  <link rel="stylesheet" href="/coaches/cards/mat-talk/shared/mat-talk-shared.css" />
</head>
<body>

<main class="card-wrap">

  <div class="card-header">
    <div class="card-eyebrow">Mat Talk • Standards</div>
    <h1 class="card-title">Respect</h1>
    <p class="card-sub">One click adds this to On-Mat and Off-Mat.</p>
  </div>

  <div class="card-toolbar">
    <a href="/coaches/execution/clipboard-2.0/">← Clipboard</a>
    <a href="/coaches/cards/mat-talk/"index.html">Youth Mat Talk</a>
    <a href="/coaches/cards/master/index.html">Cards</a>
  </div>

  <div class="card-body">
    <div class="card-section">
      <h2>On-Mat</h2>
      <p class="card-line">Respect the room.</p>
      <p class="card-note">Respect the coach, teammates, and work.</p>
    </div>

    <div class="card-section">
      <h2>Off-Mat</h2>
      <p class="card-line">Did you carry yourself the right way today?</p>
      <p class="card-note">Respect shows before skill.</p>
    </div>
  </div>

  <div class="card-actions">
    <button
      data-card-id="standards-respect-01"
      data-title="Respect"
      data-category="mat-talk"
      data-lane="both"
    >
      + Add Mat Talk
    </button>
    <span id="addStatus" class="card-status" aria-live="polite"></span>
  </div>

</main>

<script src="/coaches/cards/mat-talk/shared/mat-talk-actions.js"></script>

</body>
</html>
