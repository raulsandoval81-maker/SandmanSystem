<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Conditioning | Sandman</title>

  <link rel="stylesheet" href="/assets/css/site.css" />

  <style>
    :root{
      color-scheme: dark;

      --bg:#071024;
      --panel:#101a30;
      --line:#1f2b46;

      --text:#f5f7fb;
      --muted:#98a4bb;

      --gold:#ffdd48;
      --red:#e63946;
      --link:#9ecbff;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    .wrap{
      width:min(100%,1200px);
      margin:0 auto;
      padding:18px 16px 80px;
    }

    .page-header{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:20px;
      margin-bottom:14px;
      box-shadow:0 10px 24px rgba(0,0,0,.22);
    }

    .page-header h1{
      margin:0 0 6px;
      color:var(--gold);
      font-size:clamp(2rem,6vw,3rem);
      text-align:center;
    }

    .muted{
      margin:0;
      color:var(--muted);
      text-align:center;
      font-size:.95rem;
    }

    .toplinks{
      margin-bottom:20px;
    }

    .toplinks a{
      display:inline-flex;
      align-items:center;
      gap:8px;

      text-decoration:none;

      color:var(--link);

      background:var(--panel);
      border:1px solid var(--line);

      padding:10px 14px;
      border-radius:12px;

      font-weight:700;
      font-size:.92rem;

      transition:.18s ease;
    }

    .toplinks a:hover{
      border-color:var(--red);
      box-shadow:0 0 12px rgba(230,57,70,.24);
    }

    .section-title{
      margin:0 0 14px;
      color:var(--gold);
      font-size:1rem;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .hub-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }

    .hub-tile{
      display:flex;
      flex-direction:column;
      justify-content:center;

      min-height:120px;

      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;

      padding:18px;

      text-decoration:none;

      box-shadow:0 10px 20px rgba(0,0,0,.2);

      transition:.18s ease;
    }

    .hub-tile:hover{
      border-color:var(--red);
      box-shadow:0 0 14px rgba(230,57,70,.26);
      transform:translateY(-2px);
    }

    .hub-tile h2{
      margin:0 0 8px;
      color:var(--gold);
      font-size:1.2rem;
    }

    .hub-tile p{
      margin:0;
      color:var(--muted);
      line-height:1.45;
      font-size:.95rem;
    }

    @media (min-width:900px){

      .wrap{
        padding-top:28px;
      }

      .hub-grid{
        grid-template-columns:repeat(3,1fr);
      }

    }
  </style>
</head>

<body>

<main class="wrap">

  <section class="page-header">
    <h1>Conditioning</h1>
    <p class="muted">
      Choose a category
    </p>
  </section>

  <div class="toplinks">
    <a href="/coaches/execution/clipboard-2.0/">
      ← Back to Clipboard
    </a>
  </div>

  <h2 class="section-title">Categories</h2>

  <section class="hub-grid">

    <a class="hub-tile" href="/coaches/cards/support/grappling/conditioning/strength/index.html">
      <h2>Strength</h2>
      <p>
        Bodyweight + wrestling strength.
      </p>
    </a>

    <a class="hub-tile" href="/coaches/cards/support/grappling/conditioning/endurance/index.html">
      <h2>Endurance</h2>
      <p>
        Output, pace, and conditioning rounds.
      </p>
    </a>

    <a class="hub-tile" href="/coaches/cards/support/grappling/conditioning/partner/index.html">
      <h2>Partner</h2>
      <p>
        Resistance, carries, and pressure work.
      </p>
    </a>

  </section>

</main>

</body>
</html>
