<body>
  <h1>Front Headlock</h1>
  <p><strong>Concept:</strong> Control the head before the finish.</p>
  <ul>
    <li>Snap and secure head control</li>
    <li>Keep weight forward</li>
    <li>Circle, don’t chase</li>
    <li>Look for spin, go-behind, or snap again</li>
  </ul>
  <p><strong>Focus:</strong> Pressure and position</p>
</body>
