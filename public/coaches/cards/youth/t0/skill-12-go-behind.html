<body>
  <h1>Go Behind</h1>
  <p><strong>Concept:</strong> Clear the front, get to the back.</p>
  <ul>
    <li>Circle, do not stop in front</li>
    <li>Keep chest pressure forward</li>
    <li>Control hips when you get behind</li>
    <li>Finish with balance</li>
  </ul>
  <p><strong>Focus:</strong> Angle and control</p>
