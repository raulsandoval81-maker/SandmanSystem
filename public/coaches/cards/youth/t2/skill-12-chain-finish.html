<h1>Chain Finish</h1>

<p><strong>Concept:</strong> First attack rarely scores. Second does.</p>

<ul>
  <li>Shot → opponent defends</li>
  <li>Immediate transition (double → single → go-behind)</li>
  <li>No reset</li>
  <li>Flow until score</li>
</ul>

<p><strong>Focus:</strong> Continuation, not perfection</p>
