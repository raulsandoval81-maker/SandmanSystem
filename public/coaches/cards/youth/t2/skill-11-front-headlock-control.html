<h1>Front Headlock Control</h1>

<p><strong>Concept:</strong> Control before finish.</p>

<ul>
  <li>Snap → secure head + arm</li>
  <li>Keep weight forward</li>
  <li>Circle, don’t chase</li>
  <li>Look for spin, go-behind, or snap repeat</li>
</ul>

<p><strong>Focus:</strong> Pressure + positioning</p>
