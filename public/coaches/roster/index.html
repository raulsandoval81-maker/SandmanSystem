<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Coach · Roster</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>

  <link rel="stylesheet" href="/assets/css/site.css"/>
  <link rel="stylesheet" href="/coaches/roster/roster.css"/>
  <link rel="stylesheet" href="/assets/css/belts.css"/>
  <link rel="icon" href="data:,">
</head>

<body>
<main class="wrap">

  <nav class="top-nav">
    <a class="pill" href="/coaches/index.html">← Coach Index</a>
    <button class="pill" type="button" id="toggleAttendanceMode">Take Attendance</button>
    <button class="pill" type="button" id="toggleArchiveView">Archived</button>
    <a class="pill" href="/coaches/attendance/">Attendance History</a>
  </nav>

  <h1>Team Roster</h1>
  <p class="muted">Firestore · <code>athletes</code></p>

  <section id="attendancePanel" class="card" hidden>
    <h2>Attendance</h2>

    <label>
      Practice Type
      <select id="practiceType">
        <option value="wrestling">Wrestling</option>
        <option value="boxing">Boxing</option>
        <option value="strength">Strength</option>
        <option value="open_mat">Open Mat</option>
        <option value="competition">Competition</option>
      </select>
    </label>

    <label>
      Coach
      <input id="coachName" type="text" value="Raul"/>
    </label>

    <label>
      Notes
      <textarea id="practiceNotes" rows="3" placeholder="Optional notes"></textarea>
    </label>

    <div class="top-nav">
      <button id="selectAll" class="pill" type="button">Select All</button>
      <button id="clearAll" class="pill" type="button">Clear All</button>
      <button id="saveAttendance" class="pill" type="button">Save Attendance</button>
      <span id="presentCount" class="muted">0 selected</span>
    </div>

    <p id="saveStatus" class="muted"></p>
  </section>

  <div class="controls-row">
    <label class="canon-toggle">
      <input id="trackF8Only" type="checkbox"/>
      <span class="muted">Foundry 8 only</span>
    </label>
    <span id="countMeta" class="muted count-meta"></span>
  </div>

  <section class="roster-summary" aria-label="Roster summary">
    <div class="summary-pill">🟢 Active: <strong id="summaryActive">0</strong></div>
    <div class="summary-pill">🟡 Warning: <strong id="summaryWarning">0</strong></div>
    <div class="summary-pill">🟠 At Risk: <strong id="summaryRisk">0</strong></div>
    <div class="summary-pill">🔴 Edge Loss: <strong id="summaryEdgeLoss">0</strong></div>
    <div class="summary-pill">❄️ Frozen: <strong id="summaryFrozen">0</strong></div>
    <div class="summary-pill">⚪ No Attendance: <strong id="summaryUnknown">0</strong></div>
  </section>

  <div class="status-filters">
    <button class="pill status-filter is-active" data-status-filter="all">All</button>
    <button class="pill status-filter" data-status-filter="unknown">⚪ No Attendance</button>
    <button class="pill status-filter" data-status-filter="warning">🟡 Warning</button>
    <button class="pill status-filter" data-status-filter="at-risk">🟠 At Risk</button>
    <button class="pill status-filter" data-status-filter="edge-loss">🔴 Edge Loss</button>
    <button class="pill status-filter" data-status-filter="frozen">🔵 Frozen</button>
    <button class="pill status-filter" data-status-filter="active">🟢 Active</button>
  </div>

  <table class="roster-table">
    <thead>
      <tr>
        <th class="attendance-only" hidden>Present</th>
        <th>Athlete</th>
        <th>Tier / Rank</th>
        <th>XP</th>
        <th>Attendance</th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="5" class="muted">Loading…</td></tr>
    </tbody>
  </table>

</main>

<script type="module" src="/coaches/roster/roster.js"></script>
</body>
</html>
