<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Coach · Attendance History</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>

  <link rel="stylesheet" href="/assets/css/site.css"/>
  <link rel="stylesheet" href="/coaches/roster/roster.css"/>
  <link rel="icon" href="data:,">
</head>

<body>
<main class="wrap">

  <nav class="top-nav">
    <a class="pill" href="/coaches/index.html">← Coach Index</a>
    <a class="pill" href="/coaches/roster/">Roster</a>
  </nav>

  <h1>Attendance History</h1>
  <p class="muted">Firestore · <code>attendance_sessions</code></p>

  <section class="card">
    <div id="historyMeta" class="muted">Loading sessions…</div>
  </section>

  <table class="roster-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Type</th>
        <th>Coach</th>
        <th>Count</th>
        <th>Session</th>
      </tr>
    </thead>
    <tbody id="historyRows">
      <tr><td colspan="5" class="muted">Loading…</td></tr>
    </tbody>
  </table>

  <section id="sessionDetail" class="card" hidden>
    <h2 id="sessionTitle">Session</h2>
    <p id="sessionNotes" class="muted"></p>
    <div id="sessionAthletes"></div>
  </section>

</main>

<script type="module" src="/coaches/attendance/attendance-history.js"></script>
</body>
</html>
