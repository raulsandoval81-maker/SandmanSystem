<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  />

  <title>Parent Updates</title>

  <link
    rel="stylesheet"
    href="/parent/parent.css"
  />
</head>

<body>
  <main class="wrap">

    <section class="hero">
      <h1>Parent Updates</h1>

      <p>
        Important updates regarding your athlete's progress,
        testing status, promotions, and program activity.
      </p>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Recent Updates</h2>

        <span
          id="unread-count"
          class="badge"
          hidden
        >
          0 unread
        </span>
      </div>

      <div id="updates-list">
        Loading...
      </div>
    </section>

    <section class="card">
      <a
        class="btn"
        href="/parent/"
      >
        Return to Parent Center
      </a>
    </section>

  </main>

  <script
    type="module"
    src="./updates.js"
  ></script>
</body>
</html>
