<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Onboarding — Smart</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="./onboarding.css"/>
  <link rel="stylesheet" href="/intake-shared/shared.css"/>
</head>
<body>
  <main class="wrap">
    <h1>Are you smart?</h1>
    <p class="sub">Rate yourself from 1 to 10.</p>
    <div class="progress"><span class="pill">Step 5 of 8</span></div>

    <div class="card">
      <h2>How smart ?</h2>

      <label class="small muted" for="smart-score">Score (1–10)</label>
      <div class="scale">
        <input id="smart-score" type="range" min="1" max="10" step="1" value="7">
        <div class="scale-readout"><span class="pill">Score: <strong id="smart-val">7</strong></span></div>
      </div>

      <p id="status" class="status"></p>
      <button id="btn-next" class="btn solid-gold" type="button">Next</button>
    </div>
  </main>

  <script type="module" src="./step-5.js"></script>
</body>
</html>
