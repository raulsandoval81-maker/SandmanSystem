<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Join Inbox • Para-Comms</title>

  <link rel="stylesheet" href="/communications/shared/comms.css">
  <link rel="icon" href="data:,">
  <style>
    :root{
      --bg:#0a1833;
      --panel:#111c35;
      --deep:#0b1120;
      --line:#27304a;
      --gold:#ffdd48;
      --text:#f0f4f8;
      --muted:#9aa4b1;
      --hover:#1d2a4a;
    }
    body{
      background:var(--bg);
      color:var(--text);
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    .pc-header{
      background:var(--panel);
      border-bottom:1px solid var(--line);
      box-shadow:0 2px 8px rgba(0,0,0,.35);
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 18px;
      position:sticky;
      top:0;
      z-index:10;
    }
    .pc-header h1{
      font-size:1.1rem;
      color:var(--gold);
      margin:0;
      letter-spacing:.04em;
    }
    .pc-back{
      background:transparent;
      border:0;
      color:var(--text);
      font-size:1rem;
      cursor:pointer;
      padding:6px 10px;
      border-radius:10px;
    }
    .pc-back:hover{
      background:rgba(255,255,255,.06);
    }
    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:18px 14px 40px;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px 18px;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
    }
    .panel + .panel{margin-top:14px;}
    h2{
      color:var(--gold);
      margin:0 0 8px;
    }
    #inbox-search{
      width:100%;
      padding:10px;
      background:var(--deep);
      border:1px solid var(--line);
      color:var(--text);
      border-radius:10px;
      outline:none;
      margin-top:10px;
    }
    #inbox-search:focus{
      border-color:var(--gold);
      box-shadow:0 0 0 2px rgba(255,221,72,.12);
    }

    .inbox-filters{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .filter-btn{
      background:var(--deep);
      border:1px solid var(--line);
      color:var(--text);
      border-radius:999px;
      padding:7px 12px;
      font:inherit;
      cursor:pointer;
      transition:.15s;
    }
    .filter-btn:hover{
      border-color:var(--gold);
      background:var(--hover);
    }
    .filter-btn.is-active{
      border-color:var(--gold);
      color:var(--gold);
      box-shadow:0 0 0 1px rgba(255,221,72,.18);
    }

    .inbox-list{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:10px;
    }

    .inbox-row-wrap{
      margin-bottom:2px;
    }

    .inbox-item{
      background:var(--deep);
      border:1px solid var(--line);
      padding:14px 16px;
      border-radius:12px;
      cursor:pointer;
      transition:.15s;
      text-decoration:none;
      color:inherit;
      display:block;
    }
    .inbox-item:hover{
      border-color:var(--gold);
      background:var(--hover);
    }
    .inbox-item.unread{
      border-color:var(--gold);
      box-shadow:0 0 0 1px rgba(255,221,72,.18);
    }
    .inbox-item.read{
      border-color:#334155;
      opacity:.85;
    }

    .inbox-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .inbox-subject{
      font-weight:900;
    }
    .inbox-meta{
      color:var(--muted);
      font-size:.78rem;
      margin-top:6px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .inbox-preview{
      margin-top:8px;
      color:var(--text);
      opacity:.92;
      line-height:1.4;
      white-space:pre-wrap;
    }

    .pill{
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      font-size:.65rem;
      font-weight:900;
      flex:0 0 auto;
    }
    .pill-unread{
      background:var(--gold);
      color:#111;
    }
    .pill-read{
      background:#334155;
      color:var(--text);
    }
    .pill-approved{
      background:#173b2d;
      color:#8ff0c2;
    }
    .pill-archived{
      background:#5b4a14;
      color:#ffec9a;
    }
    .pill-deleted{
      background:#5a2323;
      color:#ffd7d7;
    }

    .intent {
  font-weight: 800;
  letter-spacing: .04em;
}

.intent-high {
  color: #22c55e; /* green */
}

.intent-mid {
  color: #f59e0b; /* amber */
}

.intent-low {
  color: #94a3b8; /* muted */
}

    .empty{
      opacity:.75;
      text-align:center;
      padding:18px;
    }

    .inbox-actions{
      display:flex;
      gap:8px;
      margin-top:8px;
      padding-left:4px;
      flex-wrap:wrap;
    }

    .inbox-actions button{
      border:1px solid #33415c;
      background:#10182b;
      color:#fff;
      border-radius:10px;
      padding:8px 12px;
      font:inherit;
      cursor:pointer;
      transition:.15s;
    }

    .inbox-actions button:hover{
      opacity:.92;
      border-color:var(--gold);
    }

    .btn-approve-trial,
    .btn-approve-join{
      background:#18263f;
      border-color:#41557d;
    }

    .empty-state{
      opacity:.75;
      text-align:center;
      padding:18px;
    }
  </style>
</head>

<body>
<header class="pc-header">
  <button class="pc-back" type="button" onclick="history.back()">← Back</button>
  <h1>Join Inbox</h1>
  <span style="opacity:.75;font-weight:700;">LAW</span>
</header>

<div class="wrap">
  <section class="panel">
<h2>Join & Trial Requests</h2>
    <div style="opacity:.8;">
      Review trial and join requests, open threads, and approve the next step.
    </div>

    <input id="inbox-search" placeholder="Search join requests…" autocomplete="off">

    <div class="inbox-filters">
      <button type="button" class="filter-btn is-active" data-filter="pending">Pending</button>
      <button type="button" class="filter-btn" data-filter="approved">Approved</button>
      
      <button type="button" class="filter-btn" data-filter="archived">Archived</button>
      <button type="button" class="filter-btn" data-filter="deleted">Deleted</button>
      <button type="button" class="filter-btn" data-filter="all">All</button>
    </div>

    <div id="inbox-list" class="inbox-list"></div>
    <div id="inbox-empty" class="empty" style="display:none;">No join requests yet.</div>
  </section>
</div>

<script type="module" src="/communications/coach/inbox.js"></script>
</body>
</html>
