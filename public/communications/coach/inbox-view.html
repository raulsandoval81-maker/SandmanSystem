<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Join Request • Para-Comms</title>

  <link rel="stylesheet" href="/communications/shared/comms.css">
  <link rel="icon" href="data:,">

  <style>
    :root{
      --bg:#0a1833;
      --panel:#111c35;
      --line:#27304a;
      --text:#eef2f7;
      --gold:#ffdd48;
      --muted:#9aa4b1;
      --deep:#0b1120;
      --ok:#22c55e;
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Roboto,Arial,sans-serif;
      margin:0;
    }

    .pc-header{
      background:var(--panel);
      border-bottom:1px solid var(--line);
      padding:12px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 2px 8px rgba(0,0,0,.4);
    }

    .pc-header h1{
      margin:0;
      font-size:1.1rem;
      color:var(--gold);
    }

    .pc-back,
    .pc-home{
      color:var(--gold);
      text-decoration:none;
      font-size:1rem;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:22px 14px 40px;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr);
      gap:16px;
      align-items:start;
    }

    .main-stack,
    .side-stack{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:18px;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
    }

    h2,h3{
      margin:0 0 10px;
      color:var(--gold);
    }

    .thread-box{
      background:var(--deep);
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px;
      min-height:180px;
      max-height:520px;
      overflow:auto;
    }

    .thread-empty{
      color:var(--muted);
      font-style:italic;
    }

    .msg{
      padding:12px 14px;
      background:var(--deep);
      border:1px solid var(--line);
      border-radius:12px;
      margin-bottom:14px;
    }

    .msg .meta{
      font-size:.82rem;
      color:var(--gold);
      margin-bottom:6px;
      font-weight:700;
    }

    .msg .body{
      font-size:.95rem;
      line-height:1.45;
      white-space:pre-wrap;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:12px;
    }

    .label{
      font-size:.82rem;
      color:var(--muted);
      font-weight:700;
    }

    #reply-subject,
    #reply-body{
      width:100%;
      padding:10px 12px;
      background:var(--deep);
      border:1px solid var(--line);
      border-radius:10px;
      color:var(--text);
      font-size:.95rem;
      box-sizing:border-box;
    }

    #reply-body{
      min-height:180px;
      resize:vertical;
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .btn{
      padding:10px 14px;
      border-radius:10px;
      border:1px solid var(--line);
      background:var(--deep);
      color:var(--text);
      font-weight:700;
      cursor:pointer;
    }

    .btn:hover{
      border-color:var(--gold);
      color:var(--gold);
    }

    .btn-primary{background:#13213f;}
    .btn-ok{border-color:#1f5132;color:#dcfce7;}

    .mini-card{
      background:var(--deep);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
    }

    .mini-card p{
      margin:.45rem 0;
      line-height:1.35;
    }

    .intent{
      font-weight:900;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .intent-high{ color:#22c55e; }
    .intent-mid{ color:#f59e0b; }
    .intent-low{ color:#94a3b8; }

    #status{
      font-weight:700;
      color:var(--gold);
      margin-bottom:12px;
    }

    @media (max-width:860px){
      .layout{grid-template-columns:1fr;}
    }
  </style>
</head>

<body>

<header class="pc-header">
  <a class="pc-back" href="/communications/coach/inbox.html">← Back</a>
  <h1>Join Request</h1>
  <a class="pc-home" href="/coach/index.html">🏠</a>
</header>

<div class="wrap">
  <div id="status"></div>

  <div class="layout">
    <div class="main-stack">
      <section class="panel">
        <h2>Conversation</h2>
        <div id="thread" class="thread-box">
          <div class="thread-empty">Loading request...</div>
        </div>
      </section>

      <section class="panel">
        <h2>Reply</h2>

        <div class="field">
          <label class="label" for="reply-subject">Subject</label>
          <input id="reply-subject" type="text" placeholder="Join Request Follow-Up"/>
        </div>

        <div class="field">
          <label class="label" for="reply-body">Reply Message</label>
          <textarea id="reply-body" placeholder="Write your reply here..."></textarea>
        </div>

        <div class="btn-row">
          <button id="btn-send-reply" class="btn btn-primary" type="button">Send Reply</button>
          <button id="btn-mark-done" class="btn btn-ok" type="button">Archive</button>
          <button id="btn-got-it" class="btn" type="button">Got It</button>
          <button id="btn-review" class="btn" type="button">Review</button>
          <button id="btn-approve-trial" class="btn">Approve Trial</button>
          <button id="btn-approve-join" class="btn">Approve Join</button>
          <button id="btn-noted" class="btn" type="button">Noted</button>
        </div>
      </section>
    </div>

    <div class="side-stack">
      <section class="panel">
        <h2>Request Snapshot</h2>
        <div class="mini-card">
          <p><strong>Parent:</strong> <span id="vol-name">—</span></p>
          <p><strong>Athlete:</strong> <span id="vol-athlete">—</span></p>
          <p><strong>Intent:</strong> <span id="vol-type" class="intent">—</span></p>
          <p><strong>Submitted:</strong> <span id="vol-time">—</span></p>
          <p><strong>Track / Interest:</strong> <span id="vol-availability">—</span></p>
        </div>
      </section>
    </div>
  </div>
</div>

<script type="module" src="/communications/coach/inbox-view.js"></script>

</body>
</html>
