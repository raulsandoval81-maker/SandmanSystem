<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Message Thread</title>

  <!-- Shared thread styling -->
  <link rel="stylesheet" href="/communications/shared/comms.css"/>
<link rel="icon" href="data:,"> 
  <style>
    /* Page wrap */
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header cleanup */
    .pc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: #0b1428;
      border-bottom: 1px solid #1f2c45;
    }
    .pc-header h1 {
      color: #ffdd48;
      font-size: 1.3rem;
      margin: 0;
      letter-spacing: .5px;
    }
    .pc-back, .pc-home {
      color: #ffdd48;
      text-decoration: none;
      font-size: 1rem;
    }

    /* Thread block container */
    .thread-box {
      background: #0f1a33;
      border: 1px solid #27304a;
      padding: 18px;
      border-radius: 14px;
      margin-top: 20px;
    }

    .msg-block {
      background: #111c35;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #27304a;
      margin-bottom: 18px;
    }

    .msg-from {
      font-weight: bold;
      color: #ffdd48;
      margin-bottom: 6px;
    }

    .msg-timestamp {
      color: #9aa4b1;
      font-size: .85rem;
      margin-bottom: 8px;
    }

    .msg-body {
      color: #d8e1ee;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    /* Reply area */
    .reply-box {
      margin-top: 26px;
      background: #0f1a33;
      padding: 18px;
      border-radius: 14px;
      border: 1px solid #27304a;
    }

    textarea {
      width: 100%;
      background: #111c35;
      color: #fff;
      border: 1px solid #27304a;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      resize: vertical;
    }

    .btn-send {
      width: 100%;
      margin-top: 12px;
      background: #ffdd48;
      color: #111;
      padding: 12px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
    }

    #reply-success {
      display: none;
      margin-top: 12px;
      color: #ffdd48;
      font-size: .95rem;
    }
  </style>
</head>

<body>

<header class="pc-header">
  <a class="pc-back" href="/communications/parent/index.html">← Back</a>
  <h1>Message Thread</h1>
  <a class="pc-home" href="/communications/parent/index.html">🏠</a>
</header>

<div class="wrap">

  <!-- Thread content -->
  <div id="thread" class="thread-box"></div>

  <!-- Reply area -->
  <div class="reply-box">
    <textarea id="reply-text" rows="4" placeholder="Write your reply…"></textarea>
    <button id="reply-send" class="btn-send">Send Reply</button>

    <p id="reply-success">✓ Reply sent!</p>
  </div>
<a href="/communications/coach/inbox.html" style="color:yellow;">
  Open Coach Inbox (Dev)
</a>
</div>

<script type="module" src="/communications/parent/receipt.js"></script>

</body>
</html>
