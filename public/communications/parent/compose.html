<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Message Coach • Para-Comms</title>

  <link rel="stylesheet" href="/communications/shared/comms.css">
  <link rel="icon" href="data:,">

  <style>
    :root{
      --bg:#0a1833;
      --panel:#111c35;
      --deep:#0b1120;
      --line:#27304a;
      --gold:#ffdd48;
      --text:#f0f4f8;
      --muted:#9aa4b1;
    }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    .wrap{
      max-width:800px;
      margin:0 auto;
      padding:24px 16px 60px;
    }
    h1{
      margin:0 0 12px;
      color:var(--gold);
      font-size:1.25rem;
      text-transform:uppercase;
      text-align:center;
    }
    .intro{
      text-align:center;
      color:var(--muted);
      margin:0 0 18px;
      line-height:1.45;
      font-size:.95rem;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:18px 20px;
      margin-bottom:22px;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
    }
    label{
      font-size:.92rem;
      color:var(--muted);
      margin-top:12px;
      display:block;
    }
    input, textarea{
      width:100%;
      background:var(--deep);
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px;
      color:var(--text);
      font-size:.95rem;
      margin-top:4px;
      outline:none;
    }
    input:focus, textarea:focus{
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(255,221,72,.18);
    }
    .btn-row{
      display:flex;
      gap:10px;
      margin-top:18px;
    }
    .btn{
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-size:.92rem;
      border:none;
    }
    .btn-send{
      background:var(--gold);
      color:#111;
      font-weight:800;
      flex:1;
    }
    .btn-cancel{
      background:#1d2a4a;
      color:var(--text);
      border:1px solid var(--line);
    }
    .msg-ok{
      color:#79f29b;
      font-weight:800;
      margin-top:14px;
      display:none;
    }
    .msg-err{
      color:#ff6b6b;
      font-weight:800;
      margin-top:14px;
      display:none;
    }
    .link-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-top:14px;
    }
    .link-row a{
      color:var(--gold);
      font-size:.9rem;
      text-decoration:none;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Message Coach</h1>
    <p class="intro">
      Send a private message to coach with questions, updates, or absences.
    </p>

    <section class="panel">
      <label>Your Name</label>
      <input id="pc-name" type="text" placeholder="Your full name…"/>

      <label>Your Email <span style="color:var(--gold)">*</span></label>
      <input id="pc-email" type="email" placeholder="name@example.com" required/>

      <label>Subject (optional)</label>
      <input id="pc-subject" type="text" placeholder="Absence / Question / Update…"/>

      <label>Message <span style="color:var(--gold)">*</span></label>
      <textarea id="pc-body" rows="7" placeholder="Type your message…" required></textarea>

      <div class="btn-row">
        <button id="pc-send" class="btn btn-send">Send</button>
        <button id="pc-cancel" class="btn btn-cancel">Cancel</button>
      </div>

      <p id="pc-success" class="msg-ok">Sent. Opening thread…</p>
      <p id="pc-error" class="msg-err">Error — please try again.</p>
    </section>
  </div>

  <script type="module" src="/communications/parent/compose.js"></script>
</body>
</html>
