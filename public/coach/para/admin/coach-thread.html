<!-- ----------------------------------------------------------
 /coach/para/admin/coach-thread.html  (V1 — UNIFIED + SHIPPABLE)
 Coach view of one parent thread + Quick Reply dropdown
----------------------------------------------------------- -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Coach Thread • Para-Comms</title>

  <link rel="stylesheet" href="/coach/shared/comms.css" />
  <link rel="icon" href="data:," />
</head>

<body>
  <div class="wrap">

    <header class="panel pc-header">
      <div>
        <div class="pc-title">Coach Thread</div>
        <div class="pc-subtitle">Unified thread: paraParentInbox</div>
      </div>

      <div class="pc-actions">
        <button id="btn-archive" class="btn btn-secondary">Archive</button>
        <button id="btn-delete" class="btn btn-secondary">Delete</button>
        <a class="btn btn-secondary" href="/coach/para/admin/hub.html">Back</a>
      </div>
    </header>

    <!-- Thread messages -->
    <section class="panel">
      <div id="thread-container" class="thread-scroll thread-bubbles"></div>
    </section>

    <!-- Quick Reply Dropdown -->
    <section class="panel">
      <div class="pc-muted">Quick Reply (optional)</div>

      <div class="qr-row">
        <select id="qr-select" class="qr-select">
          <option value="">Select a quick response…</option>

          <option value="Got it. Thank you for the update. I’ll follow up shortly.">
            Got it. Thank you for the update. I’ll follow up shortly.
          </option>

          <option value="Thanks for reaching out. Please send a couple dates and times that work for a quick call.">
            Thanks for reaching out. Please send a couple dates and times that work for a quick call.
          </option>

          <option value="I want to make sure I understand correctly. What day and time did this happen?">
            I want to make sure I understand correctly. What day and time did this happen?
          </option>

          <option value="I received your message. I’ll handle this and circle back if needed.">
            I received your message. I’ll handle this and circle back if needed.
          </option>

          <option value="Let’s bring this up at practice so we can address it in person and move forward clearly.">
            Let’s bring this up at practice so we can address it in person and move forward clearly.
          </option>
        </select>

        <button id="qr-insert" class="btn btn-primary">Insert</button>
      </div>
    </section>

    <!-- Reply -->
    <section class="panel">
      <label class="pc-label">Reply</label>
      <textarea id="reply-body" rows="4"></textarea>

      <div class="btn-row">
        <button id="btn-send-reply" class="btn btn-primary" style="flex:1;">Send</button>
      </div>
    </section>

  </div>

  <script type="module" src="/coach/para/admin/coach-thread.js"></script>
</body>
</html>
