<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Athlete Inbox • Para-Comms</title>

  <link rel="stylesheet" href="/coach/shared/comms.css">
<link rel="icon" href="data:,"> 
  <style>
    :root{
      --bg:#0a1833;
      --panel:#111c35;
      --deep:#0b1120;
      --line:#27304a;
      --gold:#ffdd48;
      --text:#f0f4f8;
      --muted:#9aa4b1;
      --hover:#1d2a4a;
    }
    body{background:var(--bg);color:var(--text);margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
    .pc-header{
      background:var(--panel);
      border-bottom:1px solid var(--line);
      box-shadow:0 2px 8px rgba(0,0,0,.35);
      display:flex;justify-content:space-between;align-items:center;
      padding:14px 18px;position:sticky;top:0;z-index:10;
    }
    .pc-header h1{font-size:1.1rem;color:var(--gold);margin:0;letter-spacing:.04em;}
    .pc-back{
      background:transparent;border:0;color:var(--text);
      font-size:1rem;cursor:pointer;padding:6px 10px;border-radius:10px;
    }
    .pc-back:hover{background: rgba(255,255,255,.06);}
    .wrap{max-width:900px;margin:0 auto;padding:18px 14px 40px;}
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px 18px;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
    }
    .panel + .panel{margin-top:14px;}
    h2{color:var(--gold);margin:0 0 8px;}
    #inbox-search{
      width:100%;
      padding:10px;
      background:var(--deep);
      border:1px solid var(--line);
      color:var(--text);
      border-radius:10px;
      outline:none;
      margin-top:10px;
    }
    #inbox-search:focus{
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(255,221,72,.12);
    }
    .inbox-list{display:flex;flex-direction:column;gap:12px;margin-top:10px;}
    .inbox-item{
      background:var(--deep);
      border:1px solid var(--line);
      padding:14px 16px;
      border-radius:12px;
      cursor:pointer;
      transition:.15s;
      text-decoration:none;color:inherit;
      display:block;
    }
    .inbox-item:hover{border-color:var(--gold);background:var(--hover);}
    .inbox-item.unread{border-color:var(--gold);box-shadow:0 0 0 1px rgba(255,221,72,.18);}
    .inbox-item.read{border-color:#334155;opacity:.85;}
    .inbox-head{display:flex;justify-content:space-between;align-items:center;gap:10px;}
    .inbox-subject{font-weight:900;}
    .inbox-meta{color:var(--muted);font-size:.78rem;margin-top:6px;}
    .pill{
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      font-size:.65rem;
      font-weight:900;
      flex:0 0 auto;
    }
    .pill-unread{background:var(--gold);color:#111;}
    .pill-read{background:#334155;color:var(--text);}
    .empty{opacity:.75;text-align:center;padding:18px;}
  </style>
</head>

<body>
<header class="pc-header">
  <button class="pc-back" type="button" onclick="history.back()">← Back</button>
  <h1>Athlete Inbox</h1>
  <span style="opacity:.75;font-weight:700;">LAW</span>
</header>

<div class="wrap">
  <section class="panel">
    <h2>Coach Messages</h2>
    <div style="opacity:.8;">Short questions only. If the thread hits the cap, schedule face-to-face.</div>
    <input id="inbox-search" placeholder="Search…" autocomplete="off">
    <div id="inbox-list" class="inbox-list"></div>
    <div id="inbox-empty" class="empty" style="display:none;">No messages yet.</div>
  </section>
</div>

<script type="module" src="/coach/para/athlete/inbox.js"></script>
</body>
</html>
