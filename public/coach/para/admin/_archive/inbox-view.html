<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Coach Message • Para-Comms</title>

  <link rel="stylesheet" href="/coach/shared/comms.css">

  <style>
    :root{
      --bg:#0a1833;
      --panel:#111c35;
      --line:#27304a;
      --text:#eef2f7;
      --gold:#ffdd48;
      --muted:#9aa4b1;
      --deep:#0b1120;
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:system-ui, -apple-system, Roboto, Arial, sans-serif;
    }

    .pc-header{
      background:var(--panel);
      border-bottom:1px solid var(--line);
      padding:12px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 2px 8px rgba(0,0,0,.4);
    }
    .pc-header h1{
      margin:0;
      font-size:1.1rem;
      color:var(--gold);
    }
    .pc-back, .pc-home{
      color:var(--gold);
      text-decoration:none;
      font-size:1rem;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:22px 14px 40px;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:18px;
      margin-bottom:20px;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
    }

    .thread-msg{
      padding:12px 14px;
      background:var(--deep);
      border:1px solid var(--line);
      border-radius:12px;
      margin-bottom:14px;
    }
    .thread-msg .from{
      font-size:.85rem;
      font-weight:600;
      color:var(--gold);
    }
    .thread-msg .timestamp{
      font-size:.75rem;
      color:var(--muted);
      margin:4px 0;
    }
    .thread-msg .body{
      font-size:.95rem;
      line-height:1.45;
      margin-top:6px;
      white-space:pre-wrap;
    }

    /* Reply Box */
    #reply-box textarea{
      width:100%;
      padding:10px;
      background:var(--deep);
      border:1px solid var(--line);
      border-radius:10px;
      color:var(--text);
      font-size:.95rem;
      outline:none;
    }

    #reply-send{
      margin-top:12px;
      background:var(--gold);
      color:#111;
      border:none;
      padding:10px 14px;
      border-radius:10px;
      font-size:.9rem;
      cursor:pointer;
      font-weight:700;
      transition:.2s;
    }
    #reply-send:hover{
      background:#ffe46a;
      box-shadow:0 0 10px rgba(255,221,72,.3);
    }

    /* Quick Replies */
    .quick-replies{
      display:flex;
      gap:10px;
      margin:20px 0;
    }
    .quick-btn{
      background:#1f2a44;
      border:1px solid #33415c;
      color:var(--gold);
      padding:6px 10px;
      border-radius:6px;
      cursor:pointer;
      font-size:.8rem;
      font-weight:700;
    }
    .quick-btn:hover{
      filter:brightness(1.15);
    }

    .pc-footer{
      text-align:center;
      margin:34px 0 40px;
    }
    .pc-footer-link{
      display:inline-block;
      padding:10px 18px;
      background:var(--deep);
      border:1px solid var(--line);
      border-radius:10px;
      font-size:.9rem;
      color:var(--muted);
      text-decoration:none;
      transition:.2s;
    }
    .pc-footer-link:hover{
      background:#1e2a4a;
      border-color:var(--gold);
      color:var(--gold);
    }
  </style>
</head>

<body>

<header class="pc-header">
  <a class="pc-back" href="./inbox.html">← Back</a>
  <h1>Message Thread</h1>
  <a class="pc-home" href="/coach/index.html">🏠</a>
</header>

<div class="wrap">

  <!-- THREAD -->
  <section class="panel">
    <h2 style="margin:0 0 10px;color:var(--gold);font-size:1rem;">Conversation</h2>
    <div id="thread-container"></div>
  </section>

  <!-- REPLY BOX -->
  <section id="reply-box" class="panel">
    <h2 style="margin:0 0 10px;color:var(--gold);font-size:1rem;">Reply</h2>
    <textarea id="reply-text" rows="4" placeholder="Type reply…"></textarea>
    <button id="reply-send">Send Reply</button>
  </section>

  <!-- QUICK REPLIES FIXED HERE -->
  <div class="quick-replies">
    <button class="quick-btn" data-fill="Got it, thank you!">👍 Got it</button>
    <button class="quick-btn" data-fill="I'll review and get back to you.">📝 Review</button>
    <button class="quick-btn" data-fill="Thank you — noted.">✔️ Noted</button>
  </div>

</div>

<footer class="pc-footer">
  <a class="pc-footer-link" href="/coach/para/coach/index.html">← Back to Coach Portal</a>
</footer>

<script type="module" src="/coach/para/admin/inbox-view.js"></script>

</body>
</html>
