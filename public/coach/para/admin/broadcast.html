<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Broadcast Console</title>

  <link rel="stylesheet" href="/assets/css/site.css" />
  <link rel="icon" href="data:,">

  <style>
    :root{
      --bg:#0a1833;
      --panel:#111c35;
      --deep:#0b1120;
      --line:#27304a;
      --gold:#ffdd48;
      --text:#f0f4f8;
    }

    body{ background:var(--bg); color:var(--text); }
    .wrap{ max-width:900px; margin:0 auto; padding:20px; }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px 20px;
      margin:16px 0;
    }

    h1{ color:var(--gold); margin-bottom:12px; }
    h2{ color:var(--gold); margin-bottom:10px; }

    label{ display:block; margin-top:10px; }
    input, select, textarea{
      width:100%;
      padding:10px;
      margin-top:6px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--deep);
      color:var(--text);
    }

    textarea{ min-height:110px; resize:vertical; }

    button{
      margin-top:14px;
      padding:10px 14px;
      border-radius:12px;
      border:1px solid rgba(255,221,72,.5);
      background:rgba(255,221,72,.12);
      color:var(--gold);
      font-weight:800;
      cursor:pointer;
    }

    button:hover{
      border-color:var(--gold);
      background:rgba(255,221,72,.18);
      color:#fff;
    }

    /* Hybrid Feed Card */
    .feed-card{
      background:#0f172a;
      border:1px solid #334155;
      border-radius:18px;
      padding:18px 20px;
      margin:16px 0;
      box-shadow:0 6px 20px rgba(0,0,0,.35);
      transition:transform .15s ease, box-shadow .15s ease;
    }

    .feed-card:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 26px rgba(0,0,0,.45);
    }

    .feed-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
    }

    .feed-title{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      font-size:1.1rem;
    }

    .feed-icon{ font-size:1.2rem; }

    .feed-tag{
      font-size:.72rem;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      opacity:.7;
      padding:3px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
    }

    .feed-body{ margin:10px 0 12px; white-space:pre-wrap; }

    .feed-foot{
      display:flex;
      justify-content:space-between;
      font-size:.82rem;
      opacity:.6;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <h1>Broadcast Console</h1>

    <section class="card">
      <h2>Create Broadcast</h2>

      <div id="bc-status" style="opacity:.75;margin-bottom:.5rem;"></div>

      <label>Category</label>
      <select id="bc-category">
        <option value="">Select category</option>
        <option value="Practice Update">Practice Update</option>
        <option value="Tournament Info">Tournament Info</option>
        <option value="Schedule Change">Schedule Change</option>
        <option value="Gear Reminder">Gear Reminder</option>
        <option value="Team Announcement">Team Announcement</option>
        <option value="Important Notice">Important Notice</option>
        <option value="Other">Other</option>
      </select>

      <label>Custom Title</label>
      <input id="bc-title" placeholder="Custom title…" />

      <label>Audience</label>
      <select id="bc-audience-type">
        <option value="all">All</option>
        <option value="parents">Parents</option>
        <option value="athletes">Athletes</option>
      </select>

      <label>Message</label>
      <textarea id="bc-message" rows="4"></textarea>

      <button id="bc-post">Post</button>
    </section>

    <section class="card">
      <h2>Live Broadcast Feed</h2>
      <div id="bc-feed"></div>
    </section>
  </main>

  <script type="module" src="/coach/para/admin/broadcast.js"></script>
</body>
</html>
