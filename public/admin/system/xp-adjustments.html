<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>XP Adjustments | Sandman System</title>

  <link rel="stylesheet" href="/assets/css/site.css" />

  <style>
    :root{
      color-scheme:dark;
    }

    body{
      background:#06080d;
      color:#f5f5f5;
      margin:0;
      font-family:system-ui,-apple-system,sans-serif;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:28px 16px 48px;
    }

    .hero{
      background:#0f141b;
      border:1px solid #1d2430;
      border-radius:18px;
      padding:20px;
      margin-bottom:20px;
      text-align:center;
    }

    .hero h1{
      margin:0;
      color:#ffd633;
      font-size:clamp(2.25rem, 8vw, 4rem);
      line-height:1;
      font-weight:1000;
    }

    .hero p{
      color:#d1d5db;
      margin:14px auto 0;
      line-height:1.5;
      max-width:680px;
      font-weight:700;
    }

    .panel{
      background:#0b1017;
      border:1px solid #1f2937;
      border-radius:16px;
      padding:20px;
    }

    .grid{
      display:grid;
      gap:16px;
    }

    label{
      display:flex;
      flex-direction:column;
      gap:8px;
      font-size:.85rem;
      font-weight:800;
      color:#d1d5db;
    }

    input,
    select,
    textarea{
      width:100%;
      background:#06080d;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:.85rem 1rem;
      color:#fff;
      font:inherit;
      font-weight:700;
      box-sizing:border-box;
    }

    input:focus,
    select:focus,
    textarea:focus{
      outline:2px solid #ffd633;
      border-color:#ffd633;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .athlete-preview{
      margin-top:-6px;
      min-height:0;
    }

    .athlete-preview-card{
      border:1px solid rgba(255,255,255,.18);
      border-radius:14px;
      padding:.9rem 1rem;
      background:rgba(255,255,255,.06);
      display:grid;
      gap:.25rem;
      color:#e5e7eb;
    }

    .athlete-preview-card strong{
      color:#ffd633;
      font-size:1.05rem;
    }

    .bad{
      color:#ff8a8a;
      font-weight:900;
    }

    .actions{
      display:flex;
      gap:12px;
      margin-top:18px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:.8rem 1.2rem;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn-red{
      background:#e53935;
      color:#fff;
    }

    .btn-dark{
      background:#111827;
      color:#fff;
      border:1px solid #1f2937;
    }

    .status{
      margin-top:16px;
      font-size:.85rem;
      color:#9ca3af;
      background:#111827;
      border-radius:10px;
      padding:.75rem 1rem;
    }
  </style>
</head>

<body>

<main class="wrap">

  <section class="hero">
    <h1>XP Adjustments</h1>

    <p>
      Admin-only reconciliation lane for delayed testing,
      paper recovery, and correction handling.
    </p>
  </section>

  <section class="panel">

    <div class="grid">

      <label>
        Athlete ID
        <input id="uid" type="text" placeholder="F4_0001" autocomplete="off" />
      </label>

      <div id="athletePreview" class="athlete-preview"></div>

      <label>
        XP Amount
        <input id="amount" type="number" placeholder="25" />
      </label>

      <label>
  Kind
  <select id="kind">


    <option value="PAPER_RECONCILE_ARENA">
      PAPER_RECONCILE_ARENA
    </option>

    <option value="PAPER_RECONCILE_GRIND">
      PAPER_RECONCILE_GRIND
    </option>

    <option value="OTHER">
      OTHER
    </option>

  </select>
</label>


      <label>
        Notes
        <textarea
          id="note"
          placeholder="Reason for adjustment..."
        ></textarea>
      </label>

    </div>

    <div class="actions">
      <button id="btnApply" class="btn btn-red">
        Apply Adjustment
      </button>

      <a class="btn btn-dark" href="/admin/hub/dashboard.html">
        Back
      </a>
    </div>

    <div class="status" id="status">
      Ready.
    </div>

  </section>

</main>

<script type="module" src="./xp-adjustments.page.js?v=2"></script>
</body>
</html>
