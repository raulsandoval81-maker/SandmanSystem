<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Coach Admin · Questionnaires</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="./questionnaire-admin.css">
</head>

<body>
  <header class="admin-header">
    <h1>Questionnaire Results</h1>
    <p class="muted">Destiny (F8) + Reflection (F4)</p>
  </header>

  <main class="wrap">

    <!-- === Athlete List === -->
    <section class="panel">
      <h2>Athletes</h2>
      <div id="athleteList" class="list"></div>
    </section>

    <!-- === Response Viewer === -->
    <section class="panel">
      <h2>Responses</h2>
      <div id="responseBox" class="response-box empty">
        <p>Select an athlete to view their questionnaire.</p>
      </div>

      <div class="actions">
        <button id="btnExport" class="btn" disabled>Export PDF</button>
        <button id="btnMark" class="btn" disabled>Mark as Archived</button>
      </div>
    </section>

  </main>

  <script src="/__/firebase/10.13.1/firebase-app-compat.js"></script>
  <script src="/__/firebase/10.13.1/firebase-firestore-compat.js"></script>
  <script src="./pdf-lib.min.js"></script>
  <script src="./pdf-export.js"></script>
  <script src="./questionnaire-admin.js"></script>

</body>
</html>
