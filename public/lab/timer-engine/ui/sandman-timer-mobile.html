<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>Sandman Timer — Mobile</title>
  <link rel="stylesheet" href="/lab/timer-engine/ui/sandman-timer-mobile.css" />
  <link rel="icon" href="data:,"> 
</head>

<body class="theme-night stop">

  <main class="app">

    <!-- HEADER -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-kicker">Sandman Combat</div>
        <div class="brand-title">Combat Timer</div>
      </div>
      <button id="gearBtn" class="icon-btn" type="button" aria-label="Open settings">⚙️</button>
    </header>

    <!-- TRAINER STRIP -->
    <section class="trainer-strip">
      <div class="trainer-card">
        <span class="label">Track</span>
        <span id="trainerTrack">—</span>
      </div>
      <div class="trainer-card">
        <span class="label">Tier</span>
        <span id="trainerTier">—</span>
      </div>
      <div class="trainer-card">
        <span class="label">Mode</span>
        <span id="trainerMode">Coach</span>
      </div>
      <div class="trainer-card">
        <span class="label">Sequence</span>
        <span id="trainerSequence">—</span>
      </div>
    </section>

    <!-- CLOCK -->
    <section class="clock-shell">
      <div id="status" class="status">IDLE</div>
      <div id="roundLabel" class="round-label">READY</div>
      <div id="roundFlash" class="round-flash" aria-hidden="true"></div>
      <div id="clock" class="clock">01:00</div>

      <div id="intervalPill" class="interval-pill" hidden>
        <span id="intervalClock">00:00</span>
      </div>
    </section>

    <!-- CONTROLS -->
    <section class="controls">
      <button id="startBtn" class="btn btn-primary" type="button">Start</button>
      <button id="stopBtn" class="btn btn-danger" type="button">Stop</button>
      <button id="resetBtn" class="btn btn-secondary" type="button">Reset</button>
      <button id="stageToggle" class="btn btn-secondary" type="button">Big Clock</button>
    </section>

    <!-- MODE -->
    <section class="audio-strip">
      <label class="mode-wrap">
        <span class="mode-label">Mode</span>
        <select id="modeSelect" class="select">
          <option value="coach" selected>Coach Calls</option>
          <option value="music">Music</option>
          <option value="silent">Silent</option>
        </select>
      </label>
    </section>

    <!-- 🔥 COACH FEED -->
    <section class="coach-feed-wrap">
      <div id="coachFeed" class="coach-feed"></div>
    </section>

    <!-- SETTINGS PANEL -->
    <section id="settings" class="settings" hidden>
      <div class="settings-card">
        <div class="settings-head">
          <h2>Timer Settings</h2>
          <button id="closeSettings" class="icon-btn" type="button" aria-label="Close settings">✕</button>
        </div>

        <div class="settings-grid">

          <label class="field">
            <span>Voice Prompts</span>
            <select id="voiceToggle">
              <option value="on" selected>On</option>
              <option value="off">Off</option>
            </select>
          </label>

          <label class="field">
            <span>Voice / FX Volume</span>
            <input id="volume" type="range" min="0" max="1" step="0.05" value="0.9" />
          </label>

          <label class="field">
            <span>Music Enabled</span>
            <input id="musicToggle" type="checkbox" />
          </label>

          <label class="field">
            <span>Music Source</span>
            <input id="musicSrc" type="text" placeholder="/lab/timer-engine/audio/beat.mp3" />
          </label>

          <label class="field">
            <span>Music Volume</span>
            <input id="musicVolume" type="range" min="0" max="1" step="0.05" value="0.6" />
          </label>

          <label class="field inline">
            <input id="colorMode" type="checkbox" checked />
            <span>State Colors On</span>
          </label>

          <div class="field">
            <button id="defaultsBtn" class="btn btn-secondary" type="button">Restore Defaults</button>
          </div>

        </div>
      </div>
    </section>

  </main>

  <script type="module" src="/lab/timer-engine/ui/sandman-timer-mobile.js"></script>

</body>
</html>
