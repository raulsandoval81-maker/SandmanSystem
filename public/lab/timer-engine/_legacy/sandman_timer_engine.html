<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sandman Timer Engine</title>

  <style>
  :root{
    color-scheme: dark;
    --bg:#020617;
    --panel:#020617;
    --card:#020617;
    --ink:#e5e7eb;
    --muted:#9ca3af;
    --accent:#ffdd48;
    --line:#1f2937;
    --soft:#374151;

    --btn-main:#e63946;
    --btn-main-text:#fff;
    --btn-ghost-bg:transparent;
    --btn-ghost-text:#e5e7eb;
    --btn-ghost-border:#374151;

    --pill-bg:#020617;
    --pill-border:#1f2937;

    --row-active-bg:rgba(55,65,81,.4);
    --row-active-border:#ffdd48;
    --row-active-shadow:rgba(255,221,72,.25);
  }

  body.theme-day{
    color-scheme: light;
    --bg:#f3f6fb;
    --panel:#ffffff;
    --card:#ffffff;
    --ink:#111827;
    --muted:#6b7280;
    --accent:#1d4ed8;
    --line:#d1d5db;
    --soft:#94a3b8;

    --btn-main:#dc2626;
    --btn-main-text:#ffffff;
    --btn-ghost-bg:#ffffff;
    --btn-ghost-text:#111827;
    --btn-ghost-border:#cbd5e1;

    --pill-bg:#f8fafc;
    --pill-border:#d1d5db;

    --row-active-bg:rgba(29,78,216,.08);
    --row-active-border:#1d4ed8;
    --row-active-shadow:rgba(29,78,216,.10);
  }

  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    transition:background .2s ease,color .2s ease;
  }

  .wrap{
    max-width:760px;
    margin:0 auto;
    padding:18px 14px 28px;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:12px;
  }

  h1{
    margin:0 0 4px;
    font-size:1.1rem;
    color:var(--accent);
    letter-spacing:.06em;
    text-transform:uppercase;
  }

  .sub{
    margin:0;
    font-size:.8rem;
    color:var(--muted);
  }

  .top-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .chip-btn{
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--ink);
    border-radius:999px;
    padding:7px 12px;
    font-size:.78rem;
    font-weight:700;
    cursor:pointer;
  }

  .timer-box{
    margin-top:8px;
    padding:14px 10px 12px;
    border-radius:16px;
    background:var(--card);
    border:1px solid var(--line);
    box-shadow:0 12px 30px rgba(0,0,0,.22);
    text-align:center;
  }

  .block-label{
    font-size:.8rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.08em;
    margin-bottom:4px;
  }

  .block-name{
    font-size:1.05rem;
    font-weight:700;
    margin-bottom:6px;
    color:var(--ink);
  }

  .time-display{
    font-size:2.6rem;
    font-weight:800;
    letter-spacing:.08em;
    margin:4px 0 8px;
  }

  .pill-strip{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin-bottom:4px;
    font-size:.75rem;
  }

  .pill{
    padding:4px 10px;
    border-radius:999px;
    border:1px solid var(--pill-border);
    background:var(--pill-bg);
  }

  .pill strong{
    color:var(--accent);
  }

  .controls{
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    margin-top:8px;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:7px 12px;
    font-size:.8rem;
    font-weight:700;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:4px;
  }

  .btn-main{
    background:var(--btn-main);
    color:var(--btn-main-text);
    box-shadow:0 0 10px rgba(230,57,70,.22);
  }

  .btn-ghost{
    background:var(--btn-ghost-bg);
    color:var(--btn-ghost-text);
    border:1px solid var(--btn-ghost-border);
  }

  .btn-small{
    padding:4px 8px;
    font-size:.75rem;
  }

  .btn-run{
    background:var(--accent);
    color:#111827;
    border:none;
    border-radius:999px;
    padding:5px 10px;
    font-size:.72rem;
    font-weight:800;
    cursor:pointer;
    margin-top:6px;
  }

  .status{
    margin-top:6px;
    font-size:.78rem;
    color:var(--muted);
    text-align:center;
    min-height:1.1em;
  }

  .block-list-wrap{
    margin-top:14px;
    border-radius:14px;
    border:1px solid var(--line);
    background:var(--card);
    padding:10px;
    max-height:320px;
    overflow:auto;
  }

  .block-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:8px 10px;
    border-radius:10px;
    border:1px solid transparent;
    font-size:.8rem;
  }

  .block-row + .block-row{
    margin-top:6px;
  }

  .block-left{
    min-width:0;
    flex:1;
  }

  .block-right{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:2px;
    flex-shrink:0;
  }

  .block-row span.slot{
    text-transform:uppercase;
    letter-spacing:.08em;
    font-size:.7rem;
    color:var(--muted);
  }

  .block-row span.name{
    font-weight:600;
    color:var(--ink);
    word-break:break-word;
  }

  .block-row span.mins{
    font-variant-numeric:tabular-nums;
    color:#cbd5f5;
  }

  body.theme-day .block-row span.mins{
    color:#1d4ed8;
  }

  .block-row.active{
    border-color:var(--row-active-border);
    background:var(--row-active-bg);
    box-shadow:0 0 10px var(--row-active-shadow);
  }

  .empty{
    padding:12px;
    text-align:center;
    font-size:.8rem;
    color:var(--muted);
  }

  @media (max-width:560px){
    .wrap{padding:16px 10px 26px}
    .time-display{font-size:2.2rem}
    .topbar{flex-direction:column}
    .top-actions{justify-content:flex-start}
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div>
        <h1>SANDMAN TIMER</h1>
        <p class="sub" id="planLabel">Loading practice plan…</p>
      </div>

      <div class="top-actions">
        <button class="chip-btn" id="themeToggle" type="button">Day mode</button>
      </div>
    </div>

    <section class="timer-box">
      <div class="block-label" id="currentSlotLabel">BLOCK</div>
      <div class="block-name" id="currentBlockName">—</div>
      <div class="time-display" id="timeDisplay">00:00</div>

      <div class="pill-strip">
        <div class="pill">
          <strong>Block</strong>&nbsp;<span id="blockIndexLabel">0 / 0</span>
        </div>
        <div class="pill">
          <strong>Total</strong>&nbsp;<span id="totalMinutesLabel">0 min</span>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-main" id="btnStartPause">▶ Start</button>
        <button class="btn btn-ghost" id="btnReset">⟳ Reset</button>
        <button class="btn btn-ghost btn-small" id="btnPrev">⟵ Prev</button>
        <button class="btn btn-ghost btn-small" id="btnNext">Next ⟶</button>
        <button class="btn btn-ghost btn-small" id="btnMinus1">−1 min</button>
        <button class="btn btn-ghost btn-small" id="btnPlus1">+1 min</button>
      </div>

      <div class="status" id="statusLine"></div>
    </section>

    <section class="block-list-wrap" id="blockList"></section>
  </main>

  <script type="module">
    import { db, doc, getDoc } from "/assets/js/firebase-init.js";

    let blocks = [];
    let totalMinutes = 0;
    let currentIndex = 0;
    let remainingSeconds = 0;
    let timerId = null;
    let currentKey = null;

    const planLabelEl       = document.getElementById("planLabel");
    const currentSlotLabel  = document.getElementById("currentSlotLabel");
    const currentBlockName  = document.getElementById("currentBlockName");
    const timeDisplay       = document.getElementById("timeDisplay");
    const blockIndexLabel   = document.getElementById("blockIndexLabel");
    const totalMinutesLabel = document.getElementById("totalMinutesLabel");
    const statusLine        = document.getElementById("statusLine");
    const blockListEl       = document.getElementById("blockList");

    const btnStartPause = document.getElementById("btnStartPause");
    const btnReset      = document.getElementById("btnReset");
    const btnPrev       = document.getElementById("btnPrev");
    const btnNext       = document.getElementById("btnNext");
    const btnMinus1     = document.getElementById("btnMinus1");
    const btnPlus1      = document.getElementById("btnPlus1");

    function fmtTime(sec){
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }

    function speakPing(){
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine";
        o.frequency.value = 800;
        o.connect(g);
        g.connect(ctx.destination);
        g.gain.setValueAtTime(0.2, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        o.start();
        o.stop(ctx.currentTime + 0.25);
      } catch(e){}
    }

    function getTrackFromQuery(){
      const params = new URLSearchParams(location.search);
      return params.get("track") || "teen";
    }

    function getTierFromQuery(){
      const params = new URLSearchParams(location.search);
      return params.get("tier") || "t0";
    }

    function getModeForSlot(slot){
      if (slot === "warmup") return "shadow";
      if (slot === "drills") return "flow";
      if (slot === "tech" || slot === "technique") return "flow";
      if (slot === "live") return "fight";
      if (slot === "cond") return "fight";
      if (slot === "solo") return "solo";
      return "shadow";
    }

    function renderBlockList(){
      blockListEl.innerHTML = "";
      if (!blocks.length){
        const div = document.createElement("div");
        div.className = "empty";
        div.textContent = "No blocks in this plan.";
        blockListEl.appendChild(div);
        return;
      }

      blocks.forEach((b, idx)=>{
        const row = document.createElement("div");
        row.className = "block-row" + (idx === currentIndex ? " active" : "");
        row.dataset.idx = idx;

        const mode = getModeForSlot(b.slot);

        row.innerHTML = `
          <div class="block-left">
            <span class="slot">${(b.slot || "").toUpperCase()}</span><br/>
            <span class="name">${b.label || b.slot || "Block"}</span>
          </div>
          <div class="block-right">
            <div class="mins">${b.minutes} min</div>
            <button class="btn-run" data-mode="${mode}" data-slot="${b.slot || ""}" data-idx="${idx}">
              Run ${mode}
            </button>
          </div>
        `;
        blockListEl.appendChild(row);
      });
    }

    function updateHeader(){
      if (!blocks.length){
        currentSlotLabel.textContent = "BLOCK";
        currentBlockName.textContent = "—";
        timeDisplay.textContent = "00:00";
        blockIndexLabel.textContent = "0 / 0";
        totalMinutesLabel.textContent = `${totalMinutes} min`;
        return;
      }

      const b = blocks[currentIndex];
      currentSlotLabel.textContent = (b.slot || "BLOCK").toUpperCase();
      currentBlockName.textContent = b.label || b.slot || "Block";
      timeDisplay.textContent = fmtTime(remainingSeconds);
      blockIndexLabel.textContent = `${currentIndex + 1} / ${blocks.length}`;
      totalMinutesLabel.textContent = `${totalMinutes} min`;
      renderBlockList();
    }

    function stopTimer(){
      if (timerId){
        clearInterval(timerId);
        timerId = null;
      }
      btnStartPause.textContent = "▶ Start";
    }

    function startTimer(){
      if (!blocks.length) return;
      if (timerId) return;
      if (remainingSeconds <= 0){
        remainingSeconds = (blocks[currentIndex].minutes || 0) * 60;
      }

      btnStartPause.textContent = "⏸ Pause";
      timerId = setInterval(()=>{
        remainingSeconds--;
        if (remainingSeconds <= 0){
          remainingSeconds = 0;
          updateHeader();
          speakPing();
          nextBlock(true);
          return;
        }
        timeDisplay.textContent = fmtTime(remainingSeconds);
      }, 1000);
    }

    function nextBlock(fromTimer = false){
      stopTimer();
      if (!blocks.length) return;

      if (currentIndex < blocks.length - 1){
        currentIndex++;
        remainingSeconds = (blocks[currentIndex].minutes || 0) * 60;
        statusLine.textContent = fromTimer ? "Next block started." : "";
        updateHeader();
        if (fromTimer) startTimer();
      } else {
        remainingSeconds = 0;
        updateHeader();
        statusLine.textContent = "Practice complete.";
      }
    }

    function prevBlock(){
      stopTimer();
      if (!blocks.length) return;
      if (currentIndex > 0){
        currentIndex--;
        remainingSeconds = (blocks[currentIndex].minutes || 0) * 60;
        statusLine.textContent = "Backed up one block.";
        updateHeader();
      }
    }

    function resetCurrentBlock(){
      stopTimer();
      if (!blocks.length) return;
      remainingSeconds = (blocks[currentIndex].minutes || 0) * 60;
      statusLine.textContent = "Block reset.";
      updateHeader();
    }

    function adjustCurrentBlock(deltaMinutes){
      if (!blocks.length) return;
      const b = blocks[currentIndex];
      let newMin = (b.minutes || 0) + deltaMinutes;
      if (newMin < 1) newMin = 1;
      if (newMin > 60) newMin = 60;
      const diff = newMin - (b.minutes || 0);
      b.minutes = newMin;

      totalMinutes += diff;
      remainingSeconds += diff * 60;
      if (remainingSeconds < 10) remainingSeconds = 10;

      statusLine.textContent = `Adjusted block by ${diff >= 0 ? "+" : ""}${diff} min.`;
      updateHeader();
    }

    function openModeForBlock(idx, slot, mode){
      const track = getTrackFromQuery();
      const tier = getTierFromQuery();

      const params = new URLSearchParams({
        track,
        tier,
        trainer: "shadow",
        mode
      });

      statusLine.textContent = `Opening ${mode} for ${(slot || "block").toUpperCase()}…`;
      window.open(`/timer-engine/sandman_timer_engine.html?${params.toString()}`, "_blank");
    }

    async function loadPlan(planKey){
      currentKey = planKey;
      statusLine.textContent = "Loading plan…";
      planLabelEl.textContent = `Plan: ${planKey}`;

      try{
        const ref = doc(db,"practicePlans", planKey);
        const snap = await getDoc(ref);

        if (!snap.exists()){
          blocks = [
            { slot:"onmat",   label:"On-Mat Talk",           minutes:3 },
            { slot:"warmup",  label:"Warm-Up",               minutes:10 },
            { slot:"drills",  label:"Drills (Old Moves)",    minutes:15 },
            { slot:"tech",    label:"Technique (New Moves)", minutes:15 },
            { slot:"water",   label:"Water / Reset",         minutes:2 },
            { slot:"live",    label:"Live / Situations",     minutes:10 },
            { slot:"cond",    label:"Conditioning / Finish", minutes:5 }
          ];
          totalMinutes = blocks.reduce((s,b)=>s+b.minutes,0);
          currentIndex = 0;
          remainingSeconds = blocks[0].minutes * 60;
          statusLine.textContent = "No saved plan found — using default layout.";
          updateHeader();
          return;
        }

        const data = snap.data() || {};
        const savedBlocks = Array.isArray(data.blocks) ? data.blocks : [];

        if (!savedBlocks.length){
          statusLine.textContent = "Plan has no blocks — using default layout.";
          blocks = [
            { slot:"onmat",   label:"On-Mat Talk",           minutes:3 },
            { slot:"warmup",  label:"Warm-Up",               minutes:10 },
            { slot:"drills",  label:"Drills (Old Moves)",    minutes:15 },
            { slot:"tech",    label:"Technique (New Moves)", minutes:15 },
            { slot:"water",   label:"Water / Reset",         minutes:2 },
            { slot:"live",    label:"Live / Situations",     minutes:10 },
            { slot:"cond",    label:"Conditioning / Finish", minutes:5 }
          ];
        } else {
          const labelMap = {
            onmat:"On-Mat Talk",
            warmup:"Warm-Up",
            drills:"Drills (Old Moves)",
            technique:"Technique (New Moves)",
            tech:"Technique (New Moves)",
            live:"Live / Situations",
            cond:"Conditioning / Finisher",
            offmat:"Off-Mat Talk",
            solo:"Solo Work"
          };

          blocks = savedBlocks.map(b => ({
            slot: b.slot || "",
            label: b.label || labelMap[b.slot] || "Block",
            minutes: Number(b.minutes || 0) || 1
          }));
        }

        totalMinutes = (typeof data.totalMinutes === "number" && data.totalMinutes > 0)
          ? data.totalMinutes
          : blocks.reduce((s,b)=>s + (b.minutes||0), 0);

        currentIndex = 0;
        remainingSeconds = (blocks[0]?.minutes || 0) * 60;
        statusLine.textContent = "Plan loaded. Press Start when ready.";
        updateHeader();
      } catch(err){
        console.error(err);
        statusLine.textContent = "Error loading plan. Check network/emulator.";
      }
    }

    btnStartPause.addEventListener("click", () => {
      if (timerId){
        stopTimer();
        statusLine.textContent = "Paused.";
      } else {
        startTimer();
        statusLine.textContent = "";
      }
    });

    btnReset.addEventListener("click", resetCurrentBlock);
    btnPrev.addEventListener("click", prevBlock);
    btnNext.addEventListener("click", () => nextBlock(false));
    btnMinus1.addEventListener("click", () => adjustCurrentBlock(-1));
    btnPlus1.addEventListener("click", () => adjustCurrentBlock(1));

    blockListEl.addEventListener("click", (e)=>{
      const btn = e.target.closest(".btn-run");
      if (!btn) return;
      const idx = Number(btn.dataset.idx || 0);
      const slot = btn.dataset.slot || "";
      const mode = btn.dataset.mode || "shadow";
      openModeForBlock(idx, slot, mode);
    });

    themeToggle.addEventListener("click", ()=>{
      document.body.classList.toggle("theme-day");
      themeToggle.textContent = document.body.classList.contains("theme-day")
        ? "Night mode"
        : "Day mode";
    });

    function todayKey(){
      return new Date().toISOString().slice(0,10);
    }

    const params = new URLSearchParams(location.search);
    const qsPlan = params.get("plan") || todayKey();

    loadPlan(qsPlan);

    window.startSandmanPlan = function(planKey){
      loadPlan(planKey || todayKey());
    };
    
  </script>
  <script>
  const themeToggle = document.getElementById("themeToggle");

  function applyTheme(theme){
    const isDay = theme === "day";
    document.body.classList.toggle("theme-day", isDay);
    themeToggle.textContent = isDay ? "Night mode" : "Day mode";
    localStorage.setItem("sandmanTimerTheme", theme);
  }

  const savedTheme = localStorage.getItem("sandmanTimerTheme") || "night";
  applyTheme(savedTheme);

  themeToggle.addEventListener("click", () => {
    const nextTheme = document.body.classList.contains("theme-day") ? "night" : "day";
    applyTheme(nextTheme);
  });
</script>
</body>
</html>
