<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lompoc Wrestling – Bracket Manager</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg:#f3f4f6;
      --panel:#ffffff;
      --ink:#111827;
      --muted:#6b7280;
      --border:#d1d5db;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--ink);
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:12px 12px 24px;
    }
    h1{
      margin:0 0 4px;
      font-size:1rem;
      letter-spacing:.16em;
      text-transform:uppercase;
    }
    .muted{
      font-size:.7rem;
      color:var(--muted);
      margin-bottom:10px;
    }
    .layout{
      display:grid;
      grid-template-columns:260px minmax(0,1fr) 260px;
      gap:10px;
    }
    @media(max-width:960px){
      .layout{
        grid-template-columns:1fr;
      }
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:10px;
      padding:8px 10px;
    }
    .panel h2{
      margin:0 0 6px;
      font-size:.85rem;
      letter-spacing:.12em;
      text-transform:uppercase;
    }
    .field-group{
      margin-bottom:6px;
      font-size:.75rem;
    }
    .field-group label{
      display:block;
      font-size:.7rem;
      text-transform:uppercase;
      letter-spacing:.11em;
      color:var(--muted);
      margin-bottom:2px;
    }
    .field-group input,
    .field-group select{
      width:100%;
      padding:3px 5px;
      font-size:.8rem;
      border-radius:6px;
      border:1px solid var(--border);
      background:#f9fafb;
    }
    .btn{
      display:inline-block;
      padding:5px 9px;
      font-size:.75rem;
      border-radius:999px;
      border:1px solid var(--border);
      background:#e5e7eb;
      cursor:pointer;
    }
    .btn-primary{
      background:#111827;
      color:#f9fafb;
      border-color:#111827;
    }
    .btn-sm{
      padding:3px 7px;
      font-size:.72rem;
    }
    .seed-table{
      width:100%;
      border-collapse:collapse;
      font-size:.72rem;
      margin-top:4px;
    }
    .seed-table th,
    .seed-table td{
      border:1px solid var(--border);
      padding:2px 4px;
    }
    .seed-table th{
      background:#f9fafb;
      font-size:.68rem;
      text-transform:uppercase;
      letter-spacing:.1em;
      color:var(--muted);
    }

    /* BRACKET VIEW */
    #bracketView{
      min-height:240px;
      font-size:.75rem;
    }
    .round-col{
      display:flex;
      flex-direction:column;
      gap:8px;
      flex:1;
    }
    .bracket-grid{
      display:flex;
      gap:8px;
      align-items:flex-start;
    }
    .match-card{
      border:1px solid var(--border);
      border-radius:8px;
      background:#f9fafb;
      padding:4px 5px;
      cursor:pointer;
    }
    .match-card.selected{
      outline:2px solid #111827;
    }
    .match-head{
      display:flex;
      justify-content:space-between;
      font-size:.68rem;
      color:var(--muted);
      margin-bottom:2px;
    }
    .match-line{
      display:flex;
      justify-content:space-between;
      gap:4px;
    }
    .match-line span.name{
      flex:1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .match-line span.seed{
      font-size:.68rem;
      color:var(--muted);
      min-width:20px;
      text-align:right;
    }
    .winner-tag{
      font-size:.65rem;
      color:#16a34a;
    }
    .empty{
      color:var(--muted);
      font-size:.72rem;
      font-style:italic;
      padding:4px 0;
    }

    /* ENTRY PANEL */
    .entry-body{
      font-size:.75rem;
    }
    .entry-meta{
      font-size:.7rem;
      color:var(--muted);
      margin-bottom:4px;
    }
    .entry-meta strong{
      color:var(--ink);
    }
    .entry-names{
      margin-bottom:6px;
    }
    .entry-names div{
      margin-bottom:2px;
    }
    .entry-names span.label{
      font-size:.68rem;
      text-transform:uppercase;
      letter-spacing:.1em;
      color:var(--muted);
      margin-right:4px;
    }
    .entry-row{
      margin-bottom:4px;
    }
    .entry-row label{
      display:block;
      font-size:.68rem;
      text-transform:uppercase;
      letter-spacing:.1em;
      color:var(--muted);
      margin-bottom:2px;
    }
    .entry-row input,
    .entry-row select{
      width:100%;
      padding:3px 5px;
      font-size:.78rem;
      border-radius:6px;
      border:1px solid var(--border);
      background:#f9fafb;
    }
    .entry-actions{
      display:flex;
      gap:6px;
      margin-top:6px;
    }
    .entry-note{
      font-size:.66rem;
      color:var(--muted);
      margin-top:4px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Lompoc Wrestling – Bracket Manager</h1>
    <div class="muted">
      Paper bout sheets at the table. Results typed here. Bracket advances winners automatically.
    </div>

    <div class="layout">
      <!-- LEFT: SETUP / SEEDS -->
      <section class="panel">
        <h2>Setup & Seeds</h2>

        <div class="field-group">
          <label for="eventName">Event</label>
          <input id="eventName" type="text" value="Brave Challenge" />
        </div>

        <div class="field-group">
          <label for="weightClass">Weight Class</label>
          <input id="weightClass" type="text" placeholder="106, 126, etc." />
        </div>

        <div class="field-group">
          <label for="bracketSize">Bracket Size</label>
          <select id="bracketSize">
            <option value="8">8-man</option>
            <option value="16">16-man</option>
          </select>
        </div>

        <div class="field-group">
          <button id="btnNewBracket" class="btn btn-primary btn-sm">Start New Bracket</button>
          <button id="btnLoadSaved" class="btn btn-sm">Load Saved</button>
        </div>

        <table class="seed-table">
          <thead>
            <tr>
              <th style="width:40px;">Seed</th>
              <th>Wrestler / Team</th>
            </tr>
          </thead>
          <tbody id="seedTableBody">
            <!-- filled by JS -->
          </tbody>
        </table>
      </section>

      <!-- CENTER: BRACKET VIEW -->
      <section class="panel">
        <h2>Bracket</h2>
        <div id="bracketView">
          <div class="empty">No bracket yet. Set seeds and click “Start New Bracket”.</div>
        </div>
      </section>

      <!-- RIGHT: BOUT ENTRY -->
      <section class="panel">
        <h2>Bout Entry</h2>
        <div id="entryPanel">
          <div class="empty">
            Click a bout in the bracket to enter the result.
          </div>
        </div>
      </section>
    </div>
  </div>

  <script type="module" src="./bracket.js"></script>
</body>
</html>
