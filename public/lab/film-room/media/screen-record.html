<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>FilmRoom · Screen Recorder</title>

  <style>
    :root { color-scheme: dark; }
    body{
      margin:0;background:#05070c;color:#e5e7eb;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
    }
    .wrap{max-width:900px;margin:0 auto;padding:24px 16px 50px;}

    h1{margin:0 0 10px;color:#ffdd48;text-shadow:0 0 8px rgba(255,221,72,.25);}
    .muted{color:#9ca3af;font-size:.78rem;margin-bottom:16px;}

    .top-nav{display:flex;gap:10px;margin-bottom:18px;}
    .pill{
      background:#1a1d23;border:1px solid #2d3648;
      padding:6px 14px;border-radius:999px;color:#fff;
      font-weight:700;text-decoration:none;
      cursor:pointer;transition:.15s;
    }
    .pill:hover{background:#e63946;border-color:#e63946}

    video{
      width:100%;height:auto;
      background:#000;border-radius:12px;
      margin-top:16px;
    }

    .controls{margin-top:16px;display:flex;gap:10px;}
    button{
      padding:10px 18px;border-radius:10px;
      border:none;cursor:pointer;font-weight:700;font-size:.9rem;
      transition:.15s;
    }
    .rec{background:#e63946;color:#fff;}
    .rec:hover{filter:brightness(1.1);}
    .stop{background:#ffdd48;color:#000;}
    .stop:hover{filter:brightness(1.1);}
  </style>
</head>

<body>
<main class="wrap">

  <div class="top-nav">
    <a class="pill" href="../index.html">← Media</a>
    <a class="pill" href="../../video-vault/index.html">Video Vault</a>
  </div>

  <h1>Screen Recorder</h1>
  <p class="muted">Record your screen or camera to create instant breakdown clips.</p>

  <video id="preview" autoplay muted></video>

  <div class="controls">
    <button class="rec" id="btnStart">● Start</button>
    <button class="stop" id="btnStop">■ Stop</button>
  </div>

  <div id="status" class="muted" style="margin-top:12px"></div>

</main>

<script type="module">
  // Safe placeholder crumbs — real recorder comes later
  document.getElementById("btnStart").onclick = ()=>{
    document.getElementById("status").textContent = "Recording… (placeholder)";
  };
  document.getElementById("btnStop").onclick = ()=>{
    document.getElementById("status").textContent = "Stopped. Clip saved (placeholder)";
  };
</script>

</body>
</html>
